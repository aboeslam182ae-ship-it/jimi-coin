<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin - Jolt Edition</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        body { 
            /* خلفية زرقاء داكنة كقاعدة */
            background: #0a1a3d; 
            color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; 
        }

        /* 1. حاوية الخلفية (البرق والقاعدة الثابتة) */
        .game-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* استخدم رابط صورتك التي فيها البرق والخلفية الزرقاء */
            background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/jolt-bg.png') center/cover no-repeat;
            z-index: -1;
        }

        /* 2. حاوية الشخصية المتحركة (الجولتي) */
        .character-container {
            position: fixed;
            top: 45%; /* تعديل الارتفاع ليقف فوق القاعدة */
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: transform 0.1s ease-out; /* حركة ناعمة */
            cursor: pointer;
            width: 250px;
            height: 250px;
        }

        /* 3. الشخصية ذات الخلفية الشفافة (الصورة التي ولّدتها لك الآن) */
        .jolt-img {
            width: 100%;
            height: 100%;
            /* ضع رابط صورتك للجولتي الشفاف هنا */
            background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/jolt_pockets.png') center/contain no-repeat;
            z-index: 11;
        }

        /* الكلاس الذي يُضاف بالضغط لحركة النزول */
        .character-container.active {
            transform: translate(-50%, -45%); /* نزول لأسفل قليلاً */
        }

        /* -- باقي تنسيقات الواجهة -- */
        .header { text-align: center; padding: 50px 15px 10px; z-index: 20; position: relative; }
        #main-balance { font-size: 65px; font-weight: 900; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .profit { color: #FFD700; font-size: 18px; font-weight: bold; }

        .footer { position: fixed; bottom: 100px; width: 100%; display: flex; justify-content: center; z-index: 20; }
        .energy-bar { 
            width: 80%; height: 20px; background: rgba(0,0,0,0.6); 
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); overflow: hidden; position: relative;
        }
        #energy-fill { position: absolute; right: 0; height: 100%; background: linear-gradient(90deg, #00f2fe, #4facfe); width: 100%; transition: width 0.2s; }
        #energy-text { position: absolute; width: 100%; text-align: center; font-size: 12px; font-weight: bold; line-height: 20px; text-shadow: 1px 1px 2px #000; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(13, 27, 56, 0.98); display: flex; border-top: 1px solid #1e4a9e; z-index: 30; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; color: #fff; }
        .nav-active { opacity: 1; color: #FFD700; }

        .plus-one { position: absolute; color: #FFD700; font-size: 40px; font-weight: 900; animation: fadeOutUp 0.8s forwards; pointer-events: none; z-index: 100; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        @keyframes fadeOutUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body onload="initApp()">

    <div class="game-background"></div>

    <div style="display: flex; flex-direction: column; height: 100vh;">
        <div class="header">
            <div id="main-balance">0</div>
            <div class="profit">💰 +0/ساعة</div>
        </div>

        <div class="character-container" id="tap-area">
            <div class="jolt-img"></div>
        </div>

        <div class="footer">
            <div class="energy-bar">
                <div id="energy-text">1000 / 1000</div>
                <div id="energy-fill"></div>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item"><span>⛏️</span><span>تعدين</span></div>
        <div class="nav-item"><span>🛋️</span><span>مكتب</span></div>
        <div class="nav-item nav-active"><span>💰</span><span>نقر</span></div>
    </nav>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyDAf1rFiwTwZmEkWv6ykgr2msEmIaOELs",
        authDomain: "jolt-coin.firebaseapp.com",
        databaseURL: "https://jolt-coin-default-rtdb.firebaseio.com",
        projectId: "jolt-coin",
        appId: "1:523210485636:web:30a3f782afdbddfb4037d1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userId = window.Telegram.WebApp.initDataUnsafe.user ? window.Telegram.WebApp.initDataUnsafe.user.id : "dev_user";

    let score = 0; let energy = 1000;

    function initApp() {
        db.ref('users/' + userId).once('value', (s) => {
            const d = s.val();
            if(d) { score = d.score || 0; energy = d.energy || 1000; }
            updateUI();
        });
        setInterval(() => {
            if(energy < 1000) { energy = Math.min(1000, energy + 1.2); updateUI(); }
        }, 1000);
        setInterval(() => db.ref('users/' + userId).update({ score, energy, lastSeen: Date.now() }), 5000);
    }

    function updateUI() {
        document.getElementById('main-balance').innerText = Math.floor(score).toLocaleString();
        document.getElementById('energy-text').innerText = `${Math.floor(energy)} / 1000`;
        document.getElementById('energy-fill').style.width = (energy/10) + "%";
    }

    const tapArea = document.getElementById('tap-area');
    tapArea.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(energy >= 1) {
            score++; energy--;
            updateUI();
            
            // 1. إضافة تأثير الحركة لأسفل
            tapArea.classList.add('active');
            setTimeout(() => tapArea.classList.remove('active'), 100);

            // 2. إنشاء تأثير +1
            createPop(e.touches[0].pageX, e.touches[0].pageY);

            if(window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }
    });

    function createPop(x, y) {
        const el = document.createElement('div'); el.className = 'plus-one'; el.innerText = '+1';
        el.style.left = (x - 20) + 'px'; el.style.top = y + 'px';
        document.body.appendChild(el); setTimeout(() => el.remove(), 800);
    }
</script>
</body>
</html>

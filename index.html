<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin - Hamster Style</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background: #0c1a33; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        .game-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0c1a33 url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/jolt-bg.png') center/cover no-repeat;
            z-index: -1;
        }

        .header { text-align: center; padding: 50px 15px 10px; position: relative; z-index: 10; }
        #main-balance { font-size: 55px; font-weight: 900; text-shadow: 2px 2px 10px #000; color: #fff; }

        /* منطقة اللعب */
        .play-section {
            height: 55vh; display: flex; justify-content: center; align-items: center; position: relative;
        }

        /* حاوية الحركة المرتدة (نمط الهامستر) */
        .hamster-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
        }

        /* تأثير الانضغاط عند اللمس */
        .hamster-container:active {
            transform: scale(0.92) translateY(10px);
        }

        /* صورة الجولتي */
        .jolt-character {
            width: 280px;
            height: 350px;
            background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/Jolt_pockets.png') center/contain no-repeat;
            z-index: 5;
            margin-bottom: -50px; /* لدمج الأقدام مع المنصة */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        /* المنصة الدائرية (مثل الفيديو) */
        .podium {
            width: 250px;
            height: 70px;
            background: radial-gradient(circle, #00f2fe 0%, #004e92 100%);
            border-radius: 50%;
            border: 5px solid #4facfe;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 0 0 20px rgba(255,255,255,0.5);
            z-index: 4;
        }

        /* شريط الطاقة المصلح */
        .energy-wrapper { position: fixed; bottom: 100px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .energy-bar-bg { width: 85%; height: 20px; background: rgba(0,0,0,0.5); border-radius: 10px; border: 1px solid #4facfe; overflow: hidden; position: relative; }
        #energy-fill { position: absolute; right: 0; height: 100%; background: linear-gradient(90deg, #00f2fe, #4facfe); transition: width 0.3s ease; }
        #energy-info { margin-top: 8px; font-weight: bold; font-size: 16px; color: #00f2fe; }

        .footer-nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #07132e; display: flex; border-top: 1px solid #1e4a9e; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; color: #fff; font-size: 12px; }
        .nav-item.active { opacity: 1; color: #FFD700; }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }

        /* تأثير رقم الـ +1 */
        .plus-one { position: absolute; color: #fff; font-size: 40px; font-weight: 900; animation: hamsterPop 0.7s ease-out forwards; pointer-events: none; z-index: 100; text-shadow: 0 0 10px #00f2fe; }
        @keyframes hamsterPop { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-150px) scale(1.5); } }
    </style>
</head>
<body onload="initGame()">

    <div class="game-bg"></div>

    <div class="header">
        <div id="main-balance">0</div>
    </div>

    <div class="play-section">
        <div class="hamster-container" id="tap-target">
            <div class="jolt-character"></div>
            <div class="podium"></div>
        </div>
    </div>

    <div class="energy-wrapper">
        <div class="energy-bar-bg">
            <div id="energy-fill"></div>
        </div>
        <div id="energy-info">1000 / 1000</div>
    </div>

    <nav class="footer-nav">
        <div class="nav-item"><i>⛏️</i>تعدين</div>
        <div class="nav-item active"><i>💰</i>نقر</div>
        <div class="nav-item"><i>🏠</i>مكتب</div>
    </nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAf1rFiwTwZmEkWv6ykgr2msEmIaOELs",
        authDomain: "jolt-coin.firebaseapp.com",
        databaseURL: "https://jolt-coin-default-rtdb.firebaseio.com",
        projectId: "jolt-coin",
        appId: "1:523210485636:web:30a3f782afdbddfb4037d1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userId = window.Telegram.WebApp.initDataUnsafe.user ? window.Telegram.WebApp.initDataUnsafe.user.id : "dev_user";

    let score = 0; let energy = 1000;

    function initGame() {
        db.ref('users/' + userId).once('value', (s) => {
            if(s.val()) { score = s.val().score || 0; energy = s.val().energy || 1000; }
            syncUI();
        });
        setInterval(() => { if(energy < 1000) { energy += 1.5; syncUI(); } }, 1000);
        setInterval(() => db.ref('users/' + userId).update({ score: score, energy: Math.floor(energy) }), 4000);
    }

    function syncUI() {
        document.getElementById('main-balance').innerText = Math.floor(score).toLocaleString();
        document.getElementById('energy-info').innerText = `${Math.floor(energy)} / 1000`;
        document.getElementById('energy-fill').style.width = (energy/10) + "%";
    }

    document.getElementById('tap-target').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(energy >= 1) {
            score++; energy--;
            syncUI();
            
            // إضافة تأثير الرقم
            const touch = e.touches[0];
            const p = document.createElement('div');
            p.className = 'plus-one'; p.innerText = '+1';
            p.style.left = touch.pageX + 'px'; p.style.top = touch.pageY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);

            // اهتزاز الموبايل
            if(window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }
        }
    });
</script>
</body>
</html>

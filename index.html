<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jolt Coin - Pure Version</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; text-align: center; overflow: hidden; }

        /* 1. شاشة التحميل - تظهر أولاً */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #051937; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .jaguar-img { width: 200px; height: 200px; border-radius: 50%; border: 3px solid #f3ba2f; margin-bottom: 20px; }
        .loading-bar-bg { width: 250px; height: 12px; background: #111; border: 1px solid #fff; border-radius: 10px; overflow: hidden; }
        .loading-bar-fill { width: 0%; height: 100%; background: #f3ba2f; animation: startLoad 3s forwards; }

        @keyframes startLoad { to { width: 100%; } }

        /* 2. واجهة اللعبة - تظهر بعد التحميل */
        #game-ui { display: none; padding-top: 20px; }
        .header-box { padding: 10px; }
        .energy-border { width: 85%; height: 22px; background: #000; border: 2px solid #fff; border-radius: 15px; margin: 15px auto; overflow: hidden; }
        .energy-blue { height: 100%; background: #007bff; width: 100%; }

        .coin-btn { width: 200px; height: 200px; background: #f3ba2f; border-radius: 50%; margin: 40px auto; display: flex; align-items: center; justify-content: center; font-size: 80px; cursor: pointer; box-shadow: 0 0 20px #f3ba2f; }
        .score-txt { font-size: 32px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="https://i.ibb.co/L6M7XmF/DALL-E-2025-10-27-21-44-33-A-realistic-cinematic-portrait-of-a-fierce-jaguar-made-of-solid-polished.webp" class="jaguar-img">
        <div style="color:#f3ba2f; margin-bottom:10px;">Loading Jolt Coin...</div>
        <div class="loading-bar-bg">
            <div class="loading-bar-fill"></div>
        </div>
    </div>

    <div id="game-ui">
        <div class="header-box">
            <div style="font-size: 20px;">Level: <span style="color:#f3ba2f">Bronze</span></div>
            <div class="energy-border">
                <div class="energy-blue" id="energyBar"></div>
            </div>
            <div id="energyVal">1000 / 1000</div>
        </div>

        <div class="coin-btn" onclick="tap()">⚡</div>
        <div class="score-txt"><span id="score">0</span> 💰</div>
    </div>

    <script>
        // كود الانتقال من التحميل للعبة
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
        }, 3000);

        let score = 0;
        let energy = 1000;

        function tap() {
            if (energy > 0) {
                score++;
                energy -= 2;
                document.getElementById('score').innerText = score;
                document.getElementById('energyBar').style.width = (energy/10) + "%";
                document.getElementById('energyVal').innerText = energy + " / 1000";
            }
        }
    </script>
</body>
</html>

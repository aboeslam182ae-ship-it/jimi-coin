<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>
        Jimi Coin Professional
    </title>
    <style>
        /* --- GLOBAL SETTINGS --- */
        * {
            box-sizing: border-box;
        }
        * {
            margin: 0;
        }
        * {
            padding: 0;
        }
        * {
            user-select: none;
        }
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
        }
        body {
            color: #ffffff;
        }
        body {
            font-family: sans-serif;
        }
        body {
            overflow: hidden;
        }
        body {
            height: 100vh;
        }

        /* --- LOADER SCREEN SECTION (BOTTOM ALIGNED) --- */
        #loader-screen {
            position: fixed;
        }
        #loader-screen {
            inset: 0;
        }
        #loader-screen {
            background-color: #000000;
        }
        #loader-screen {
            z-index: 10000;
        }
        #loader-screen {
            display: flex;
        }
        #loader-screen {
            flex-direction: column;
        }
        #loader-screen {
            align-items: center;
        }
        #loader-screen {
            justify-content: flex-end;
        }
        #loader-screen {
            padding-bottom: 100px;
        }

        /* --- SPLASH BACKGROUND --- */
        #splash-bg {
            position: absolute;
        }
        #splash-bg {
            inset: 0;
        }
        #splash-bg {
            background-image: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/splash.png');
        }
        #splash-bg {
            background-size: cover;
        }
        #splash-bg {
            background-position: center;
        }
        #splash-bg {
            z-index: -1;
        }

        /* --- LOADING PERCENTAGE (MODIFIED SIZE) --- */
        #load-percent {
            font-size: 38px; /* تم تصغير الحجم هنا */
        }
        #load-percent {
            font-weight: 800;
        }
        #load-percent {
            color: #FFD700;
        }
        #load-percent {
            margin-bottom: 12px;
        }
        #load-percent {
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        /* --- LOADER BAR (MODIFIED SIZE) --- */
        .bar-outer {
            width: 220px; /* تم تصغير عرض الشريط هنا */
        }
        .bar-outer {
            height: 7px; /* تم تقليل سمك الشريط هنا */
        }
        .bar-outer {
            background-color: rgba(255, 255, 255, 0.1);
        }
        .bar-outer {
            border-radius: 15px;
        }
        .bar-outer {
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .bar-outer {
            overflow: hidden;
        }

        #bar-inner {
            width: 0%;
        }
        #bar-inner {
            height: 100%;
        }
        #bar-inner {
            background-color: #FFD700;
        }
        #bar-inner {
            box-shadow: 0 0 10px #FFD700;
        }

        /* --- MAIN PAGE LAYOUT --- */
        .page {
            display: none;
        }
        .page {
            height: 100vh;
        }
        .page {
            flex-direction: column;
        }
        .page {
            align-items: center;
        }
        .page {
            padding-top: 50px;
        }

        .page-active {
            display: flex !important;
        }

        #coin-main {
            width: 280px;
        }
        #coin-main {
            height: 280px;
        }
        #coin-main {
            border-radius: 50%;
        }
        #coin-main {
            border: 8px solid #cd7f32;
        }
        #coin-main {
            background-image: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png');
        }
        #coin-main {
            background-size: 82%;
        }
        #coin-main {
            background-position: center;
        }
        #coin-main {
            background-repeat: no-repeat;
        }
        #coin-main {
            box-shadow: 0 0 40px rgba(205, 127, 50, 0.4);
        }

        /* --- NAVIGATION BAR --- */
        .nav-container {
            position: fixed;
        }
        .nav-container {
            bottom: 25px;
        }
        .nav-container {
            left: 20px;
        }
        .nav-container {
            right: 20px;
        }
        .nav-container {
            height: 80px;
        }
        .nav-container {
            background-color: #0f0f0f;
        }
        .nav-container {
            display: flex;
        }
        .nav-container {
            border-radius: 20px;
        }
        .nav-container {
            border: 1px solid #222;
        }

        .nav-item {
            flex: 1;
        }
        .nav-item {
            display: flex;
        }
        .nav-item {
            flex-direction: column;
        }
        .nav-item {
            align-items: center;
        }
        .nav-item {
            justify-content: center;
        }
        .nav-item {
            color: #555;
        }
        
        .active-link {
            color: #FFD700;
        }
    </style>
</head>
<body onload="startApp()">

    <div id="loader-screen">
        <div id="splash-bg"></div>
        <div id="load-percent">
            0%
        </div>
        <div class="bar-outer">
            <div id="bar-inner"></div>
        </div>
    </div>

    <div id="page-tap" class="page page-active">
        <div id="balance" style="font-size: 60px; font-weight: 800; margin-bottom: 5px;">
            0
        </div>
        <div id="rank" style="font-size: 14px; letter-spacing: 1px; color: #FFD700; margin-bottom: 40px;">
            BRONZE LEVEL
        </div>
        <div id="coin-main"></div>
    </div>

    <div class="nav-container">
        <div class="nav-item active-link" onclick="tab('tap', this)">
            <div style="font-size: 22px;">💰</div>
            <div style="font-size: 10px; font-weight: bold;">TAP</div>
        </div>
        <div class="nav-item" onclick="tab('tasks', this)">
            <div style="font-size: 22px;">📜</div>
            <div style="font-size: 10px; font-weight: bold;">TASKS</div>
        </div>
        <div class="nav-item" onclick="tab('boost', this)">
            <div style="font-size: 22px;">🚀</div>
            <div style="font-size: 10px; font-weight: bold;">BOOST</div>
        </div>
        <div class="nav-item" onclick="tab('top', this)">
            <div style="font-size: 22px;">🏆</div>
            <div style="font-size: 10px; font-weight: bold;">TOP</div>
        </div>
    </div>

    <script>
        /* --- APP LOGIC --- */
        let score = parseInt(localStorage.getItem('coin_score')) || 0;

        function startApp() {
            let progress = 0;
            /* تم تعديل السرعة هنا لتصبح أبطأ (الزيادة بـ 1 كل 50 مللي ثانية) */
            let loader = setInterval(function() {
                progress = progress + 1; /* الزيادة أصبحت 1 بدل 2 */
                document.getElementById('bar-inner').style.width = progress + "%";
                document.getElementById('load-percent').innerText = progress + "%";
                
                if (progress >= 100) {
                    clearInterval(loader);
                    document.getElementById('loader-screen').style.display = 'none';
                }
            }, 50); /* الوقت أصبح 50 بدل 30 ليكون أبطأ وأكثر نعومة */
        }

        function tab(id, el) {
            document.querySelectorAll('.nav-item').forEach(function(n) {
                n.classList.remove('active-link');
            });
            el.classList.add('active-link');
        }

        document.getElementById('coin-main').addEventListener('touchstart', function(e) {
            e.preventDefault();
            score = score + 1;
            document.getElementById('balance').innerText = score.toLocaleString();
            localStorage.setItem('coin_score', score);
        });
    </script>
</body>
</html>

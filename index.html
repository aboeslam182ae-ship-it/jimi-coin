<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jolt Coin Final</title>
    <style>
        body { background: #000; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; }
        #splash img { width: 100%; height: 100%; object-fit: cover; }
        #game { display: none; text-align: center; }
        #score { font-size: 80px; color: #FFD700; margin-bottom: 20px; font-weight: bold; }
        .coin-btn { width: 280px; height: 280px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .coin-btn img { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #FFD700; }
    </style>
</head>
<body onload="startApp()">

    <div id="splash">
        <img src="splash.png" onerror="this.src='https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/splash.png'">
    </div>

    <div id="game">
        <div id="score">0</div>
        <div class="coin-btn" id="coinArea">
            <img src="coin.png" onerror="this.src='https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png'">
        </div>
        <p style="color: #555; letter-spacing: 5px;">JOLT COIN</p>
    </div>

    <script>
        function startApp() {
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('game').style.display = 'block';
            }, 3000);
        }

        let pts = parseInt(localStorage.getItem('jolt_v12')) || 0;
        const display = document.getElementById('score');
        display.innerText = pts;

        document.getElementById('coinArea').addEventListener('touchstart', function(e) {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                pts++;
            }
            display.innerText = pts;
            localStorage.setItem('jolt_v12', pts);
        }, { passive: false });
    </script>
</body>
</html>

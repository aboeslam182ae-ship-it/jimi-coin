<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Jimi Coin - Ultimate Fix</title>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: Arial, sans-serif; overflow: hidden; -webkit-user-select: none; user-select: none; }
        
        /* شاشة التحميل */
        #splash { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        #splash img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        .loader-bar { width: 80%; height: 8px; background: #222; border-radius: 10px; margin-bottom: 60px; border: 1px solid gold; overflow: hidden; }
        #loader-fill { width: 0%; height: 100%; background: gold; transition: width 0.1s; }

        #app { display: none; height: 100vh; flex-direction: column; }
        .page { display: none; flex: 1; flex-direction: column; align-items: center; padding-top: 30px; }
        .active-page { display: flex !important; }

        /* الصفحة الرئيسية */
        #score { font-size: 70px; color: gold; font-weight: bold; margin-bottom: 5px; }
        .level { color: #888; letter-spacing: 2px; margin-bottom: 40px; font-size: 14px; }
        
        .coin-box { position: relative; width: 250px; height: 250px; display: flex; align-items: center; justify-content: center; }
        .coin-box img { width: 160px; z-index: 10; border-radius: 50%; }
        .glow { position: absolute; width: 260px; height: 150px; border: 2px solid gold; border-radius: 50%; box-shadow: 0 0 20px gold; }

        /* الطاقة */
        .energy-wrap { width: 90%; position: absolute; bottom: 100px; }
        .bar-bg { height: 10px; background: #111; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        #bar-fill { width: 100%; height: 100%; background: #00d2ff; }

        /* القائمة السفلية - تم تعديلها لضمان النقر */
        .navbar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0a0a0a; display: flex; border-top: 1px solid #222; z-index: 5000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; cursor: pointer; font-weight: bold; font-size: 12px; border: none; background: none; outline: none; }
        .nav-item.active { color: gold; }

        /* صفحة البوست */
        .card { background: #111; border: 1px solid #333; border-radius: 15px; width: 85%; padding: 20px; margin-top: 20px; text-align: center; }
        .up-btn { background: gold; color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; font-size: 16px; }

        .float { position: absolute; color: #00d2ff; font-size: 30px; font-weight: bold; pointer-events: none; animation: up 0.5s forwards; }
        @keyframes up { to { transform: translateY(-80px); opacity: 0; } }
    </style>
</head>
<body onload="start()">

    <div id="splash">
        <img src="https://i.ibb.co/L6M7XmF/DALL-E-2025-10-27-21-44-33-A-realistic-cinematic-portrait-of-a-fierce-jaguar-made-of-solid-polished.webp">
        <div class="loader-bar"><div id="loader-fill"></div></div>
    </div>

    <div id="app">
        <div id="page-tap" class="page active-page">
            <div id="score">15</div>
            <div class="level">BRONZE LEVEL</div>
            <div class="coin-box" id="clickArea">
                <div class="glow"></div>
                <img src="https://i.ibb.co/Kzs676k/DALL-E-2025-10-27-21-38-16-A-close-up-design-of-a-round-golden-coin-for-a-digital-game-called-Jolt-Coi.webp">
            </div>
            <div class="energy-wrap">
                <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px">
                    <span>⚡ ENERGY</span>
                    <span id="e-text">2000 / 2000</span>
                </div>
                <div class="bar-bg"><div id="bar-fill"></div></div>
            </div>
        </div>

        <div id="page-boost" class="page">
            <h2 style="color:gold">BOOSTERS</h2>
            <div class="card">
                <h3>Multitap 🚀</h3>
                <p>Increase points per tap</p>
                <button class="up-btn" id="upgradeBtn">Upgrade (1,000 💰)</button>
            </div>
        </div>

        <div class="navbar">
            <div class="nav-item active" id="nav-tap" onclick="show('tap')">
                <span style="font-size:24px">💰</span>
                <span>TAP</span>
            </div>
            <div class="nav-item" id="nav-boost" onclick="show('boost')">
                <span style="font-size:24px">🚀</span>
                <span>BOOST</span>
            </div>
        </div>
    </div>

    <script>
        let pts = parseInt(localStorage.getItem('j_pts')) || 15;
        let pwr = parseInt(localStorage.getItem('j_pwr')) || 1;
        let en = parseFloat(localStorage.getItem('j_en')) || 2000;
        let max = 2000;

        function start() {
            let f = document.getElementById('loader-fill');
            let p = 0;
            let i = setInterval(() => {
                p += 5; f.style.width = p + "%";
                if(p >= 100) {
                    clearInterval(i);
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                    update();
                }
            }, 40);
        }

        // دالة التنقل - تم إصلاحها لتعمل 100%
        function show(target) {
            document.getElementById('page-tap').classList.remove('active-page');
            document.getElementById('page-boost').classList.remove('active-page');
            document.getElementById('nav-tap').classList.remove('active');
            document.getElementById('nav-boost').classList.remove('active');

            if(target === 'tap') {
                document.getElementById('page-tap').classList.add('active-page');
                document.getElementById('nav-tap').classList.add('active');
            } else {
                document.getElementById('page-boost').classList.add('active-page');
                document.getElementById('nav-boost').classList.add('active');
                renderBoost();
            }
        }

        function update() {
            document.getElementById('score').innerText = pts.toLocaleString();
            document.getElementById('e-text').innerText = `${Math.floor(en)} / ${max}`;
            document.getElementById('bar-fill').style.width = (en/max*100) + "%";
        }

        // النقر على العملة
        document.getElementById('clickArea').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(en >= pwr) {
                pts += pwr; en -= pwr;
                let t = e.touches[0];
                let d = document.createElement('div');
                d.className = 'float'; d.innerText = '+' + pwr;
                d.style.left = t.pageX + 'px'; d.style.top = t.pageY + 'px';
                document.body.appendChild(d);
                setTimeout(() => d.remove(), 500);
                update(); save();
            }
        });

        function renderBoost() {
            let cost = pwr * 1000;
            let b = document.getElementById('upgradeBtn');
            b.innerText = `Upgrade (${cost.toLocaleString()} 💰)`;
            b.onclick = () => {
                if(pts >= cost) {
                    pts -= cost; pwr++;
                    alert('Done! Power is now: ' + pwr);
                    renderBoost(); update(); save();
                } else { alert('Need more coins!'); }
            };
        }

        function save() {
            localStorage.setItem('j_pts', pts);
            localStorage.setItem('j_pwr', pwr);
            localStorage.setItem('j_en', en);
        }

        setInterval(() => { if(en < max) { en = Math.min(max, en + 2); update(); } }, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jimi Coin Official</title>
    <style>
        /* التنسيقات الأساسية لتجربة مستخدم سلسة */
        body { 
            background: #000; 
            color: #fff; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: sans-serif; 
            touch-action: none; 
        }
        
        /* شاشة التحميل (الجاغوار) */
        #splash { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            z-index: 1000; 
            display: flex; 
            transition: opacity 0.8s ease; 
        }
        #splash img { width: 100%; height: 100%; object-fit: cover; }

        /* واجهة اللعبة */
        #game { display: none; text-align: center; opacity: 0; transition: opacity 0.8s ease; }
        #score { 
            font-size: 75px; 
            color: #FFD700; 
            margin-bottom: 20px; 
            font-weight: bold; 
            text-shadow: 0 0 20px rgba(255,215,0,0.5); 
        }
        
        /* تصميم زر العملة */
        .coin-btn { 
            width: 280px; 
            height: 280px; 
            cursor: pointer; 
            transition: transform 0.05s; 
            -webkit-tap-highlight-color: transparent; 
        }
        .coin-btn:active { transform: scale(0.92); }
        .coin-btn img { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            border: 4px solid #333; 
            box-shadow: 0 0 30px rgba(255,215,0,0.2);
        }

        /* تأثير النقر (+1) */
        .tap-text { 
            position: absolute; 
            color: #FFD700; 
            font-size: 40px; 
            font-weight: bold; 
            pointer-events: none; 
            animation: fly 0.6s ease-out forwards; 
            z-index: 2000; 
        }
        @keyframes fly { to { transform: translateY(-150px); opacity: 0; } }
    </style>
</head>
<body onload="initGame()">

    <div id="splash">
        <img src="1776797524661.png" alt="Loading...">
    </div>

    <div id="game">
        <div id="score">0</div>
        <div class="coin-btn" onclick="handleTap(event)" ontouchstart="handleTap(event)">
            <img src="IMG_٢٠٢٦٠٤٢١_٢١٤٢٤٦.png" onerror="this.src='coin.png'" alt="Coin">
        </div>
        <div style="margin-top:30px; color:#555; letter-spacing:8px; font-weight:bold;">JOLT COIN</div>
    </div>

    <script>
        function initGame() {
            // عرض شاشة التحميل لمدة 3 ثوانٍ
            setTimeout(() => {
                const splash = document.getElementById('splash');
                const game = document.getElementById('game');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    game.style.display = 'block';
                    setTimeout(() => game.style.opacity = '1', 50);
                }, 800);
            }, 3000);
        }

        // استرجاع النقاط المخزنة أو البدء من الصفر
        let pts = parseInt(localStorage.getItem('jolt_v_final_points')) || 0;
        const display = document.getElementById('score');
        display.innerText = pts.toLocaleString();

        function handleTap(e) {
            e.preventDefault();
            // دعم النقر المتعدد (Multi-touch)
            const touches = e.changedTouches ? e.changedTouches : [e];
            for (let i = 0; i < touches.length; i++) {
                pts++;
                createEffect(touches[i].clientX, touches[i].clientY);
            }
            display.innerText = pts.toLocaleString();
            localStorage.setItem('jolt_v_final_points', pts);
        }

        function createEffect(x, y) {
            const t = document.createElement('div');
            t.innerText = '+1';
            t.className = 'tap-text';
            t.style.left = (x - 20) + 'px';
            t.style.top = (y - 50) + 'px';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 600);
        }

        // منع القائمة المنبثقة عند الضغط المطول
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>

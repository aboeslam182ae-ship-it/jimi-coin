<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jolt Coin Official</title>
    <style>
        body { background: #000; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; transition: 0.8s; }
        #splash img { width: 100%; height: 100%; object-fit: cover; }
        #game { display: none; text-align: center; opacity: 0; transition: 0.8s; }
        #score { font-size: 60px; color: #FFD700; margin-bottom: 20px; font-weight: bold; text-shadow: 0 0 20px rgba(255,215,0,0.5); }
        .coin-btn { width: 280px; height: 280px; cursor: pointer; transition: 0.05s; -webkit-tap-highlight-color: transparent; }
        .coin-btn:active { transform: scale(0.92); }
        .coin-btn img { width: 100%; height: 100%; border-radius: 50%; }
    </style>
</head>
<body onload="startApp()">

    <div id="splash">
        <img src="1000025206.png"> 
    </div>

    <div id="game">
        <div id="score">0</div>
        <div class="coin-btn" onclick="tap(event)" ontouchstart="tap(event)">
            <img src="1000025201.png"> 
        </div>
        <div style="margin-top:20px; color:#444; letter-spacing:5px;">JOLT COIN</div>
    </div>

    <script>
        function startApp() {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('game').style.display = 'block';
                    setTimeout(() => document.getElementById('game').style.opacity = '1', 50);
                }, 800);
            }, 3000);
        }

        let pts = parseInt(localStorage.getItem('jolt_v_final')) || 0;
        const scoreEl = document.getElementById('score');
        scoreEl.innerText = pts.toLocaleString();

        function tap(e) {
            e.preventDefault();
            const touches = e.changedTouches ? e.changedTouches : [e];
            for (let i = 0; i < touches.length; i++) {
                pts++;
            }
            scoreEl.innerText = pts.toLocaleString();
            localStorage.setItem('jolt_v_final', pts);
        }
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>

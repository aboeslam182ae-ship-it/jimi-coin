<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin Pro</title>
    <style>
        /* RESET SECTION */
        * {
            box-sizing: border-box;
        }
        * {
            margin: 0;
        }
        * {
            padding: 0;
        }
        * {
            user-select: none;
        }
        * {
            -webkit-tap-highlight-color: transparent;
        }
        * {
            touch-action: none;
        }

        body {
            background-color: #000000;
        }
        body {
            color: #ffffff;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            overflow: hidden;
        }
        body {
            height: 100vh;
        }

        /* LOADER SECTION */
        #loader-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #000000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 120px;
        }

        #load-percent {
            font-size: 42px;
            font-weight: 900;
            color: #FFD700;
            margin-bottom: 15px;
        }

        .bar-outer {
            width: 240px;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
        }

        #bar-inner {
            width: 0%;
            height: 100%;
            background-color: #FFD700;
        }

        /* PAGE SYSTEM */
        .page {
            display: none;
            height: 100vh;
            width: 100%;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .page-active {
            display: flex !important;
        }

        /* TAP PAGE */
        #main-balance {
            font-size: 64px;
            font-weight: 900;
            margin-top: 10px;
        }

        #level-label {
            font-size: 15px;
            margin-bottom: 45px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #coin-container {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #coin-click {
            width: 270px;
            height: 270px;
            border-radius: 50%;
            border: 8px solid #cd7f32;
            background-image: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png');
            background-size: cover;
            background-position: center;
            z-index: 10;
            transition: transform 0.05s ease;
        }

        /* PLUS ONE EFFECT */
        .plus-one {
            position: absolute;
            color: #ffffff;
            font-size: 34px;
            font-weight: 900;
            pointer-events: none;
            z-index: 100;
            animation: floatAnim 0.8s ease-out forwards;
        }

        @keyframes floatAnim {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-160px);
            }
        }

        /* ENERGY BAR */
        .energy-wrapper {
            width: 85%;
            margin-top: 50px;
        }

        .energy-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .energy-bg {
            width: 100%;
            height: 14px;
            background-color: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
        }

        #energy-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
        }

        /* LISTS (TASKS & TOP) */
        .header-title {
            font-size: 32px;
            font-weight: 900;
            color: #FFD700;
            margin-bottom: 30px;
        }

        .scroll-area {
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .item-card {
            background-color: #111;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #222;
        }

        .btn-go {
            background-color: #FFD700;
            color: #000;
            padding: 10px 25px;
            border-radius: 15px;
            font-weight: 900;
        }

        /* FOOTER NAVIGATION */
        .footer-nav {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            height: 85px;
            background-color: #0d0d0d;
            display: flex;
            border-radius: 25px;
            border: 1px solid #222;
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #444;
        }

        .nav-item-active {
            color: #FFD700;
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .nav-text {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }

    </style>
</head>
<body onload="init()">

    <div id="loader-screen">
        <div id="load-percent">0%</div>
        <div class="bar-outer">
            <div id="bar-inner"></div>
        </div>
    </div>

    <div id="tab-tap" class="page page-active">
        <div id="main-balance">0</div>
        <div id="level-label">BRONZE LEVEL</div>
        <div id="coin-container">
            <div id="coin-click"></div>
        </div>
        <div class="energy-wrapper">
            <div class="energy-info">
                <span style="color:#888">ENERGY</span>
                <span id="energy-text">2000 / 2000</span>
            </div>
            <div class="energy-bg">
                <div id="energy-fill"></div>
            </div>
        </div>
    </div>

    <div id="tab-tasks" class="page">
        <div class="header-title">TASKS</div>
        <div class="scroll-area">
            <div class="item-card" onclick="doTask(50000, 'https://t.me/yourchannel')">
                <div>
                    <div style="font-weight:700; font-size:17px">Join Telegram</div>
                    <div style="color:#FFD700; font-weight:800">+50,000</div>
                </div>
                <div class="btn-go">GO</div>
            </div>
        </div>
    </div>

    <div id="tab-top" class="page">
        <div class="header-title">TOP PLAYERS</div>
        <div class="scroll-area">
            <div class="item-card">
                <span style="font-weight:600">1. Muhammad Koca</span>
                <span style="color:#FFD700; font-weight:800">2,500,000</span>
            </div>
        </div>
    </div>

    <div class="footer-nav">
        <div class="nav-item nav-item-active" onclick="switchPage('tap', this)">
            <div class="nav-icon">💰</div>
            <div class="nav-text">Tap</div>
        </div>
        <div class="nav-item" onclick="switchPage('tasks', this)">
            <div class="nav-icon">📜</div>
            <div class="nav-text">Tasks</div>
        </div>
        <div class="nav-item" onclick="switchPage('top', this)">
            <div class="nav-icon">🏆</div>
            <div class="nav-text">Top</div>
        </div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('j_score')) || 0;
        let energy = parseFloat(localStorage.getItem('j_energy')) || 2000;

        function init() {
            let p = 0;
            let inv = setInterval(() => {
                p++;
                document.getElementById('bar-inner').style.width = p + "%";
                document.getElementById('load-percent').innerText = p + "%";
                if(p >= 100) {
                    clearInterval(inv);
                    document.getElementById('loader-screen').style.display = 'none';
                    updateUI();
                }
            }, 15);

            setInterval(() => {
                if(energy < 2000) {
                    energy = Math.min(2000, energy + 1.2);
                    updateUI();
                }
            }, 1000);
        }

        function updateUI() {
            document.getElementById('main-balance').innerText = score.toLocaleString();
            document.getElementById('energy-text').innerText = Math.floor(energy) + " / 2000";
            document.getElementById('energy-fill').style.width = (energy / 20) + "%";
            
            const lbl = document.getElementById('level-label');
            const coin = document.getElementById('coin-click');
            
            if(score >= 1000000) {
                lbl.innerText = "DIAMOND LEVEL";
                lbl.style.color = "#b9f2ff";
                coin.style.borderColor = "#b9f2ff";
            } else if(score >= 50000) {
                lbl.innerText = "SILVER LEVEL";
                lbl.style.color = "#C0C0C0";
                coin.style.borderColor = "#C0C0C0";
            } else {
                lbl.innerText = "BRONZE LEVEL";
                lbl.style.color = "#cd7f32";
                coin.style.borderColor = "#cd7f32";
            }

            localStorage.setItem('j_score', score);
            localStorage.setItem('j_energy', energy);
        }

        function switchPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-item-active'));
            document.getElementById('tab-' + id).classList.add('page-active');
            el.classList.add('nav-item-active');
        }

        function doTask(r, u) {
            window.open(u, '_blank');
            score += r;
            updateUI();
        }

        const clickTarget = document.getElementById('coin-click');
        clickTarget.addEventListener('touchstart', function(e) {
            e.preventDefault();
            const touches = e.changedTouches;
            for(let i = 0; i < touches.length; i++) {
                if(energy >= 1) {
                    score++;
                    energy--;
                    const t = touches[i];
                    const p = document.createElement('div');
                    p.className = 'plus-one';
                    p.innerText = '+1';
                    p.style.left = (t.clientX - 20) + 'px';
                    p.style.top = (t.clientY - 40) + 'px';
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 800);
                }
            }
            updateUI();
            this.style.transform = "scale(0.95)";
            setTimeout(() => this.style.transform = "scale(1)", 50);
        }, {passive: false});

    </script>
</body>
    </html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin - Professional Tasks Edition</title>
    <style>
        /* --- 1. GLOBAL SETTINGS (Line 10+) --- */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            touch-action: none; 
        }
        
        body { 
            background: #000; 
            color: #fff; 
            margin: 0; 
            font-family: 'Arial', sans-serif; 
            overflow: hidden; 
            text-align: center; 
        }

        /* --- 2. LOADER STYLES (Line 25+) --- */
        #loader { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 99999; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-end; 
            padding-bottom: 25%; 
        }
        
        #loader-bg { 
            position: absolute; 
            inset: 0; 
            background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/splash.png') center/cover no-repeat; 
            opacity: 0.8; 
            z-index: -1; 
        }
        
        #pct { color: gold; font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        .bar-o { width: 220px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 1px solid gold; overflow: hidden; }
        #bar-i { width: 0%; height: 100%; background: gold; }

        /* --- 3. PAGES LAYOUT (Line 45+) --- */
        .page { 
            display: none; 
            height: 100vh; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 40px; 
            padding-bottom: 120px;
        }
        .active { display: flex !important; }

        /* --- 4. TAP PAGE STYLES (Line 55+) --- */
        .score { font-size: 80px; color: gold; font-weight: bold; margin: 0; text-shadow: 0 0 20px gold; }
        
        #tap-area { 
            width: 280px; 
            height: 280px; 
            margin-top: 30px; 
            border-radius: 50%; 
            border: 5px solid gold; 
            box-shadow: 0 0 30px gold;
            background: #111 url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png') center/112% no-repeat;
            position: relative; 
            z-index: 100; 
            transition: transform 0.05s;
        }

        /* --- 5. TASKS PAGE STYLES (Line 75+) --- */
        .task-container { width: 90%; margin-top: 20px; overflow-y: auto; touch-action: pan-y; }
        
        .task-item { 
            background: #0a0a0a; 
            border: 1px solid #222; 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        
        .task-text { text-align: left; }
        .task-name { font-weight: bold; font-size: 16px; }
        .task-val { color: gold; font-size: 13px; margin-top: 4px; }
        
        .task-go { 
            background: gold; 
            color: #000; 
            padding: 8px 18px; 
            border-radius: 10px; 
            font-weight: bold; 
            text-decoration: none; 
            font-size: 14px; 
        }
        
        .task-done { background: #222 !important; color: #555 !important; pointer-events: none; }

        /* --- 6. ENERGY UI (Line 100+) --- */
        .en-ui { width: 85%; margin-top: 40px; }
        .en-bg { width: 100%; height: 16px; background: #1a1a1a; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        #en-f { width: 100%; height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); }

        /* --- 7. NAVIGATION BAR (Line 110+) --- */
        .nav { 
            position: fixed; 
            bottom: 30px; 
            left: 10px; 
            right: 10px; 
            height: 80px; 
            background: #0a0a0a; 
            display: flex; 
            z-index: 1000; 
            border-radius: 20px; 
            border: 1px solid #222; 
        }
        
        .nav-i { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: #555; 
            font-size: 11px; 
            font-weight: bold; 
        }
        
        .nav-i.on { color: gold; }

        /* --- 8. POPUP EFFECT (Line 130+) --- */
        .pop { position: absolute; color: #00d2ff; font-size: 45px; font-weight: bold; animation: up 0.6s forwards; pointer-events: none; z-index: 2000; }
        @keyframes up { to { transform: translateY(-130px); opacity: 0; } }
    </style>
</head>
<body onload="init()">

    <div id="loader">
        <div id="loader-bg"></div>
        <div id="pct">0%</div>
        <div class="bar-o"><div id="bar-i"></div></div>
    </div>

    <div id="p-tap" class="page active">
        <div id="sc" class="score">0</div>
        <div style="color:#00d2ff; font-weight:bold; letter-spacing:1px">BRONZE LEVEL</div>
        <div id="tap-area"></div>
        <div class="en-ui">
            <div style="display:flex; justify-content:space-between; font-size:14px; color:#aaa; margin-bottom:6px">
                <span>⚡ ENERGY</span><span id="ev">2000 / 2000</span>
            </div>
            <div class="en-bg"><div id="en-f"></div></div>
        </div>
    </div>

    <div id="p-tasks" class="page">
        <h2 style="color:gold; font-size: 28px;">TASKS</h2>
        <div class="task-container">
            <div class="task-item">
                <div class="task-text">
                    <div class="task-name">Subscribe Channel</div>
                    <div class="task-val">+10,000 Coins</div>
                </div>
                <a href="https://t.me/YourChannel" target="_blank" class="task-go" onclick="finishTask(this, 10000)">GO</a>
            </div>
            <div class="task-item">
                <div class="task-text">
                    <div class="task-name">Follow Twitter</div>
                    <div class="task-val">+5,000 Coins</div>
                </div>
                <a href="https://x.com/YourProfile" target="_blank" class="task-go" onclick="finishTask(this, 5000)">GO</a>
            </div>
            <div class="task-item">
                <div class="task-text">
                    <div class="task-name">Invite 5 Friends</div>
                    <div class="task-val">+20,000 Coins</div>
                </div>
                <a href="#" class="task-go" onclick="finishTask(this, 20000)">GO</a>
            </div>
        </div>
    </div>

    <div id="p-lead" class="page">
        <h2 style="color:gold">TOP PLAYERS</h2>
        <div style="width:85%; background:#0a0a0a; padding:20px; border-radius:20px; border:1px solid #222">
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid #111; padding:10px 0;"><span>1. Ahmed</span><span style="color:gold">1,250,000</span></div>
            <div style="display:flex; justify-content:space-between; padding:20px 0; font-weight:bold; color:gold"><span>YOU</span><span id="my-sc">0</span></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-i on" onclick="go('tap', this)">💰 TAP</div>
        <div class="nav-i" onclick="go('tasks', this)">📜 TASKS</div>
        <div class="nav-i" onclick="go('lead', this)">🏆 LEADERS</div>
    </div>

    <script>
        let s = parseInt(localStorage.getItem('js_s')) || 0;
        let e = parseFloat(localStorage.getItem('js_e')) || 2000;

        function init() {
            let p = 0;
            let itv = setInterval(() => {
                p += 5;
                document.getElementById('bar-i').style.width = p + "%";
                document.getElementById('pct').innerText = p + "%";
                if(p >= 100) { 
                    clearInterval(itv); 
                    document.getElementById('loader').remove(); 
                    upd(); 
                }
            }, 30);
        }

        function go(id, el) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-i').forEach(ni => ni.classList.remove('on'));
            document.getElementById('p-' + id).classList.add('active');
            el.classList.add('on');
            if(navigator.vibrate) navigator.vibrate(10);
        }

        function upd() {
            document.getElementById('sc').innerText = s.toLocaleString();
            document.getElementById('my-sc').innerText = s.toLocaleString();
            document.getElementById('ev').innerText = Math.floor(e) + " / 2000";
            document.getElementById('en-f').style.width = (e/20) + "%";
        }

        function finishTask(btn, reward) {
            s += reward;
            btn.innerText = "DONE";
            btn.classList.add('task-done');
            localStorage.setItem('js_s', s);
            upd();
        }

        const area = document.getElementById('tap-area');
        area.addEventListener('touchstart', (ev) => {
            ev.preventDefault();
            for (let i = 0; i < ev.changedTouches.length; i++) {
                if(e >= 1) {
                    s++; e--;
                    let t = ev.changedTouches[i];
                    createPop(t.pageX, t.pageY);
                }
            }
            upd();
            localStorage.setItem('js_s', s);
            localStorage.setItem('js_e', e);
            if(navigator.vibrate) navigator.vibrate(12);
            area.style.transform = "scale(0.95)";
            setTimeout(() => area.style.transform = "scale(1)", 50);
        }, { passive: false });

        function createPop(x, y) {
            let n = document.createElement('div');
            n.className = 'pop'; n.innerText = '+1';
            n.style.left = x + 'px'; n.style.top = y + 'px';
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 600);
        }

        setInterval(() => { if(e < 2000) { e = Math.min(2000, e + 1.2); upd(); } }, 1000);
    </script>
</body>
    </html>

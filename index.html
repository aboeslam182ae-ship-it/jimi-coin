<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jolt Coin - Reset</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #f3ba2f; --bg: #051937; --card: #102a51; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }

        /* الهيدر المستقر */
        .header { background: rgba(0,0,0,0.5); padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--gold); }
        
        .user-profile { position: relative; width: 60px; height: 60px; background: #222; border: 2px solid var(--gold); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .lvl { position: absolute; bottom: -8px; background: var(--gold); color: #000; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; }

        .user-stats { flex-grow: 1; text-align: right; margin-right: 15px; }
        .progress-bar { width: 100%; height: 12px; background: #000; border-radius: 10px; border: 1px solid #fff; overflow: hidden; margin-top: 5px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #f3ba2f, #ffea00); width: 40%; }

        /* منطقة العملة */
        .main-tap { margin: 40px 0; }
        .coin { width: 200px; height: 200px; background: radial-gradient(circle, var(--gold), #8a6d3b); border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(243, 186, 47, 0.4); cursor: pointer; }

        /* الشبكة السفلية */
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .menu-card { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .menu-card i { font-size: 28px; color: var(--gold); display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-stats">
            <div style="display: flex; justify-content: space-between; font-size: 14px;">
                <span style="color:var(--gold)">19.45B <i class="fas fa-coins"></i></span>
                <span>[A&A] Syria</span>
            </div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <small style="color:#00ff00; font-size:11px;">باقي 3.48B للمستوى التالي</small>
        </div>

        <div class="user-profile">
            <i class="fas fa-user"></i>
            <div class="lvl">LVL 32</div>
        </div>
    </div>

    <div class="main-tap">
        <h2 style="color:var(--gold)">JOLT COIN</h2>
        <div class="coin"><i class="fas fa-bolt" style="font-size: 70px; color: #fff;"></i></div>
    </div>

    <div class="footer-grid">
        <div class="menu-card"><i class="fas fa-tshirt"></i> <span>Skins</span></div>
        <div class="menu-card"><i class="fas fa-users"></i> <span>Friends</span></div>
    </div>

    <div style="display:flex; justify-content:center; gap:20px; padding: 20px;">
        <i class="fab fa-telegram fa-2x"></i>
        <i class="fab fa-youtube fa-2x"></i>
        <i class="fab fa-x-twitter fa-2x"></i>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jolt Coin - Ultimate Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        /* الهيدر */
        .header { text-align: center; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; }
        #main-balance { font-size: 40px; font-weight: 900; }
        .profit-info { color: #FFD700; font-size: 13px; }

        /* الصفحات */
        .page { display: none; height: calc(100vh - 160px); width: 100%; overflow-y: auto; padding: 20px; flex-direction: column; align-items: center; }
        .page-active { display: flex !important; }

        /* صفحة النقر */
        #coin-click { width: 260px; height: 260px; border-radius: 50%; border: 8px solid #cd7f32; 
            background: #111 url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png') center/cover;
            box-shadow: 0 0 40px rgba(205, 127, 50, 0.4); margin-top: 50px; transition: transform 0.05s; }
        #coin-click:active { transform: scale(0.95); }

        /* الكروت والمهام */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .card { background: #111; border-radius: 15px; padding: 15px; border: 1px solid #222; text-align: center; }
        .task-card { background: #111; width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #222; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .btn-buy { background: #FFD700; color: #000; border: none; padding: 8px 12px; border-radius: 10px; font-weight: bold; font-size: 12px; width: 100%; margin-top: 10px; }
        .btn-task { background: #248bcf; color: #fff; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; }

        /* القائمة السفلية */
        .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: #050505; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 12px; }
        .nav-item-active { color: #FFD700; }
        .nav-item span:first-child { font-size: 24px; }
    </style>
</head>
<body onload="initApp()">

    <div class="header">
        <div id="main-balance">0</div>
        <div class="profit-info">💰 +<span id="pph-value">0</span>/ساعة</div>
    </div>

    <div id="tab-tap" class="page page-active">
        <div id="coin-click"></div>
    </div>

    <div id="tab-mine" class="page">
        <h3 style="margin-bottom: 20px;">سوق التطوير ⛏️</h3>
        <div class="grid">
            <div class="card">
                <div style="font-size:30px">📟</div>
                <div style="font-weight:bold; font-size:14px">كرت شاشة</div>
                <div style="color:#FFD700; font-size:11px">+300/ساعة</div>
                <button class="btn-buy" onclick="buyItem('GPU', 2000, 300)">💰 2,000</button>
            </div>
            <div class="card">
                <div style="font-size:30px">🏢</div>
                <div style="font-weight:bold; font-size:14px">مكتب تعدين</div>
                <div style="color:#FFD700; font-size:11px">+1,200/ساعة</div>
                <button class="btn-buy" onclick="buyItem('Office', 10000, 1200)">💰 10,000</button>
            </div>
        </div>
    </div>

    <div id="tab-tasks" class="page">
        <h3 style="margin-bottom: 20px;">المهام والجوائز 📜</h3>
        
        <div class="task-card">
            <div>
                <p style="font-weight:bold">متابعة القناة</p>
                <p style="color:#FFD700; font-size:12px">+50,000 نقطة</p>
            </div>
            <button class="btn-task" onclick="doTask('channel', 50000)">ابدأ</button>
        </div>

        <div class="task-card">
            <div>
                <p style="font-weight:bold">دعوة صديق</p>
                <p style="color:#FFD700; font-size:12px">+25,000 نقطة</p>
            </div>
            <button class="btn-task" onclick="shareInvite()">دعوة</button>
        </div>
    </div>

    <nav class="footer-nav">
        <div class="nav-item" onclick="switchTab('tasks', this)"><span>📜</span><span>المهام</span></div>
        <div class="nav-item" onclick="switchTab('mine', this)"><span>⛏️</span><span>تعدين</span></div>
        <div class="nav-item nav-item-active" onclick="switchTab('tap', this)"><span>💰</span><span>نقر</span></div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDAf1rFiwTwZmEkWv6ykgr2msEmIaOELs",
            authDomain: "jolt-coin.firebaseapp.com",
            databaseURL: "https://jolt-coin-default-rtdb.firebaseio.com",
            projectId: "jolt-coin",
            appId: "1:523210485636:web:30a3f782afdbddfb4037d1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "dev_test";

        let score = 0;
        let pph = 0;

        function initApp() {
            db.ref('users/' + userId).once('value', (s) => {
                const d = s.val();
                if(d) { 
                    score = d.score || 0; 
                    pph = d.pph || 0; 
                    updateUI(); 
                }
            });
            
            // الربح التلقائي كل ثانية
            setInterval(() => {
                if(pph > 0) {
                    score += (pph / 3600);
                    updateUI();
                }
            }, 1000);

            // حفظ البيانات كل 8 ثواني
            setInterval(() => {
                db.ref('users/' + userId).update({ score: score, pph: pph });
            }, 8000);
        }

        function switchTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-item-active'));
            document.getElementById('tab-' + id).classList.add('page-active');
            el.classList.add('nav-item-active');
        }

        function updateUI() {
            document.getElementById('main-balance').innerText = Math.floor(score).toLocaleString();
            document.getElementById('pph-value').innerText = Math.floor(pph).toLocaleString();
        }

        // النقر
        document.getElementById('coin-click').addEventListener('touchstart', (e) => {
            e.preventDefault();
            score++; 
            updateUI();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        });

        // الشراء
        function buyItem(name, cost, profit) {
            if(score >= cost) {
                score -= cost;
                pph += profit;
                updateUI();
                tg.showAlert(`تم تطوير ${name}!`);
            } else {
                tg.showAlert("النقاط غير كافية!");
            }
        }

        // المهام
        function doTask(type, reward) {
            if(type === 'channel') {
                tg.openTelegramLink("https://t.me/YourChannelLink"); // ضع رابط قناتك هنا
                setTimeout(() => {
                    score += reward;
                    updateUI();
                    tg.showAlert("مبروك! حصلت على جائزة المتابعة.");
                }, 5000);
            }
        }

        function shareInvite() {
            const link = `https://t.me/YourBotUser?start=${userId}`; // ضع يوزر بوتك هنا
            tg.openTelegramLink(`https://t.me/share/url?url=${link}&text=انضم إلي واجمع Jolt Coin!`);
        }
    </script>
</body>
    </html>

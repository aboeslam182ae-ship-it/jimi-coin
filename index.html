<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Jimi Coin - Final Fix</title>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
        
        /* شاشة التحميل - تم تعديل الرابط لرابط GitHub المباشر */
        #splash { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        #splash img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.9; }
        .loader-bar { width: 80%; height: 8px; background: #1a1a1a; border-radius: 10px; margin-bottom: 60px; border: 1px solid #FFD700; overflow: hidden; }
        #loader-fill { width: 0%; height: 100%; background: gold; transition: width 0.1s; }

        #app { display: none; height: 100vh; flex-direction: column; }
        .page { display: none; flex: 1; flex-direction: column; align-items: center; padding-top: 40px; }
        .active-page { display: flex !important; }

        /* الواجهة الرئيسية */
        #score { font-size: 80px; color: #FFD700; font-weight: bold; margin: 0; }
        .level-tag { color: #888; letter-spacing: 3px; font-size: 14px; margin-bottom: 40px; }
        
        /* العملة */
        .coin-container { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; }
        .coin-img { width: 100%; z-index: 10; border-radius: 50%; filter: drop-shadow(0 0 15px gold); }
        .glow-ring { position: absolute; width: 320px; height: 180px; border: 2px solid rgba(255, 215, 0, 0.4); border-radius: 50%; box-shadow: 0 0 25px rgba(255, 215, 0, 0.2); }

        /* الطاقة */
        .energy-box { width: 90%; position: absolute; bottom: 110px; }
        .bar-bg { height: 12px; background: #111; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        #bar-fill { width: 100%; height: 100%; background: #00d2ff; }

        /* شريط التنقل */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #000; display: flex; border-top: 1px solid #222; z-index: 10000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-weight: bold; font-size: 12px; }
        .nav-item.active { color: #FFD700; }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }

        .tap-pop { position: absolute; color: #00d2ff; font-size: 32px; font-weight: bold; pointer-events: none; animation: fly 0.6s ease-out forwards; }
        @keyframes fly { to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body onload="init()">

    <div id="splash">
        <img src="https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/splash.png">
        <div class="loader-bar"><div id="loader-fill"></div></div>
    </div>

    <div id="app">
        <div id="page-tap" class="page active-page">
            <h1 id="score">0</h1>
            <div class="level-tag">BRONZE LEVEL</div>
            
            <div class="coin-container" id="tapArea">
                <div class="glow-ring"></div>
                <img src="https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/splash.png" class="coin-img" style="width: 200px;">
            </div>

            <div class="energy-box">
                <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px; color:#aaa">
                    <span>⚡ ENERGY</span>
                    <span id="e-text">2000 / 2000</span>
                </div>
                <div class="bar-bg"><div id="bar-fill"></div></div>
            </div>
        </div>

        <div id="page-boost" class="page">
            <h2 style="color:gold">BOOSTERS</h2>
            <div style="background:#111; padding:20px; border-radius:15px; width:80%; text-align:center; border:1px solid #333">
                <span style="font-size:40px">🚀</span>
                <h3>Multitap</h3>
                <button id="upBtn" style="background:gold; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold">Upgrade</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" id="btn-tap">
                <span class="nav-icon">💰</span>TAP
            </div>
            <div class="nav-item" id="btn-boost">
                <span class="nav-icon">🚀</span>BOOST
            </div>
        </div>
    </div>

    <script>
        let pts = parseInt(localStorage.getItem('j_pts')) || 15;
        let pwr = parseInt(localStorage.getItem('j_pwr')) || 1;
        let en = parseFloat(localStorage.getItem('j_en')) || 2000;
        let max = 2000;

        function init() {
            let p = 0;
            let t = setInterval(() => {
                p += 5; document.getElementById('loader-fill').style.width = p + "%";
                if(p >= 100) {
                    clearInterval(t);
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                    ui();
                }
            }, 30);
        }

        // أزرار التنقل المصلحة
        document.getElementById('btn-tap').addEventListener('touchstart', (e) => { e.preventDefault(); nav('tap'); });
        document.getElementById('btn-boost').addEventListener('touchstart', (e) => { e.preventDefault(); nav('boost'); });

        function nav(to) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(to === 'tap') {
                document.getElementById('page-tap').classList.add('active-page');
                document.getElementById('btn-tap').classList.add('active');
            } else {
                document.getElementById('page-boost').classList.add('active-page');
                document.getElementById('btn-boost').classList.add('active');
                renderB();
            }
        }

        function ui() {
            document.getElementById('score').innerText = pts.toLocaleString();
            document.getElementById('e-text').innerText = `${Math.floor(en)} / ${max}`;
            document.getElementById('bar-fill').style.width = (en/max*100) + "%";
        }

        document.getElementById('tapArea').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(en >= pwr) {
                pts += pwr; en -= pwr;
                let touch = e.changedTouches[0];
                let d = document.createElement('div');
                d.className = 'tap-pop'; d.innerText = '+' + pwr;
                d.style.left = touch.pageX + 'px'; d.style.top = touch.pageY + 'px';
                document.body.appendChild(d);
                setTimeout(() => d.remove(), 500);
                ui(); save();
            }
        });

        function renderB() {
            let cost = pwr * 1000;
            let btn = document.getElementById('upBtn');
            btn.innerText = `Upgrade (${cost.toLocaleString()})`;
            btn.onclick = () => {
                if(pts >= cost) { pts -= cost; pwr++; renderB(); ui(); save(); alert('Success!'); }
            };
        }

        function save() {
            localStorage.setItem('j_pts', pts);
            localStorage.setItem('j_pwr', pwr);
            localStorage.setItem('j_en', en);
        }

        setInterval(() => { if(en < max) { en = Math.min(max, en + 1.5); ui(); } }, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jolt Coin - Hamster Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #f3ba2f; --blue-bg: #0b2447; --card-bg: #19376d; }
        body { background: var(--blue-bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; text-align: center; user-select: none; }

        /* الهيدر العلوي */
        .top-info { background: rgba(0,0,0,0.3); padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--gold); }
        .user-profile { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .user-avatar { width: 55px; height: 55px; border-radius: 15px; border: 2px solid var(--gold); box-shadow: 0 0 10px var(--gold); }
        .lvl-badge { background: var(--gold); color: #000; font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 5px; margin-top: -10px; z-index: 2; }

        .stats-area { flex-grow: 1; margin-right: 15px; text-align: right; }
        .level-bar-container { width: 100%; height: 12px; background: #000; border-radius: 10px; border: 1px solid #fff; overflow: hidden; margin-top: 5px; position: relative; }
        .level-bar-fill { height: 100%; background: linear-gradient(90deg, #f3ba2f, #ffea00); width: 45%; transition: 0.5s; }
        .next-lvl-txt { font-size: 10px; color: #00ff00; margin-top: 3px; display: block; font-weight: bold; }

        /* العملة الكبيرة للتنقر */
        .coin-section { margin: 40px 0; position: relative; }
        .main-jaguar { width: 240px; filter: drop-shadow(0 0 20px rgba(243, 186, 47, 0.4)); cursor: pointer; transition: 0.1s; }
        .main-jaguar:active { transform: scale(0.92); }

        /* شبكة المربعات (مثل الصورة 3) */
        .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .feature-card { background: var(--card-bg); border-radius: 15px; padding: 10px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .feature-card img { width: 100%; border-radius: 10px; height: 80px; object-fit: cover; }
        .feature-card h4 { margin: 8px 0 0; font-size: 14px; color: var(--gold); }

        /* المربعات المنبثقة */
        .modal { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--blue-bg); border-top: 3px solid var(--gold); border-radius: 30px 30px 0 0; padding: 30px 20px; z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-img { width: 150px; height: 150px; margin-bottom: 20px; }
        .close-btn { position: absolute; top: 15px; left: 20px; font-size: 25px; color: #fff; cursor: pointer; }

        /* الفوتر (أيقونات التواصل) */
        .footer-socials { margin-top: 20px; padding-bottom: 30px; }
        .social-btn { display: inline-flex; align-items: center; justify-content: center; width: 45px; height: 45px; background: #19376d; border-radius: 50%; margin: 0 10px; color: #fff; font-size: 20px; text-decoration: none; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="top-info">
        <div class="user-profile" onclick="openModal('friendsModal')">
            <img src="https://i.ibb.co/L6M7XmF/DALL-E-2025-10-27-21-44-33-A-realistic-cinematic-portrait-of-a-fierce-jaguar-made-of-solid-polished.webp" class="user-avatar">
            <div class="lvl-badge">32 LVL</div>
        </div>

        <div class="stats-area">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 14px; font-weight: bold;">[A&A] Syria</span>
                <span style="color: var(--gold); font-weight: bold;"><i class="fas fa-coins"></i> 19.45B</span>
            </div>
            <div class="level-bar-container">
                <div class="level-bar-fill" id="pFill"></div>
            </div>
            <span class="next-lvl-txt" id="nextTxt">3.48B to next level</span>
        </div>
    </div>

    <div style="margin-top: 20px;">
        <h2 style="margin:0; color:var(--gold);">JOLT COIN</h2>
        <p style="margin:5px 0; font-size:12px; color:#aaa;">More info on our official channels</p>
    </div>

    <div class="coin-section">
        <img src="https://i.ibb.co/L6M7XmF/DALL-E-2025-10-27-21-44-33-A-realistic-cinematic-portrait-of-a-fierce-jaguar-made-of-solid-polished.webp" class="main-jaguar" onclick="tap(event)">
    </div>

    <div class="features-grid">
        <div class="feature-card" onclick="openModal('friendsModal')">
            <img src="https://i.ibb.co/F4Zp8mX/DALL-E-2024-04-22-Jaguars-shaking-hands.webp">
            <h4>Friends 👥</h4>
        </div>
        <div class="feature-card">
            <img src="https://i.ibb.co/L6M7XmF/DALL-E-2025-10-27-21-44-33-A-realistic-cinematic-portrait-of-a-fierce-jaguar-made-of-solid-polished.webp">
            <h4>Skins 👕</h4>
        </div>
    </div>

    <div class="footer-socials">
        <a href="#" class="social-btn"><i class="fab fa-telegram"></i></a>
        <a href="#" class="social-btn"><i class="fab fa-youtube"></i></a>
        <a href="#" class="social-btn"><i class="fab fa-x-twitter"></i></a>
    </div>

    <div id="friendsModal" class="modal">
        <span class="close-btn" onclick="closeModal('friendsModal')">×</span>
        <img src="https://i.ibb.co/F4Zp8mX/DALL-E-2024-04-22-Jaguars-shaking-hands.webp" class="modal-img">
        <h2 style="color:var(--gold)">INVITE FRIENDS</h2>
        <p>قم بدعوة أصدقائك واحصل على 50,000 عملة!</p>
        <button style="width:100%; padding:15px; background:var(--gold); border:none; border-radius:15px; font-weight:bold; font-size:18px;">نسخ رابط الدعوة 🔗</button>
    </div>

    <script>
        let balance = 19.45; 
        function tap(e) {
            balance += 0.01;
            // تأثيرات بصرية هنا
        }

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jimi Coin Final</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; margin: 0; font-family: Arial, Helvetica, sans-serif; overflow: hidden; touch-action: none; }

        /* شاشة التحميل */
        #loader { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .bar-o { width: 200px; height: 10px; background: #222; border-radius: 10px; overflow: hidden; margin-top: 15px; border: 1px solid gold; }
        #bar-i { width: 0%; height: 100%; background: gold; }

        /* الصفحات */
        .page { display: none; height: 100vh; width: 100%; flex-direction: column; align-items: center; padding-top: 40px; }
        .active { display: flex !important; }

        /* الأرقام */
        .pts { font-size: 70px; color: gold; font-weight: bold; margin: 0; font-variant-numeric: tabular-nums; }
        
        /* العملة - الحل النهائي للمظهر والسواد */
        .c-wrap { 
            width: 260px; height: 260px; margin-top: 30px; 
            border-radius: 50%; border: 4px solid gold;
            box-shadow: 0 0 20px gold;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            background: #111;
            position: relative; z-index: 10;
        }
        #coin { 
            width: 100%; height: 100%; 
            object-fit: cover; /* يمسح السواد ويجعل الصورة تملأ الدائرة */
            transform: scale(1.1); /* تكبير بسيط لضمان عدم وجود حواف */
            transition: transform 0.05s;
        }

        /* الطاقة */
        .en-ui { width: 80%; margin-top: 50px; }
        .eb-o { width: 100%; height: 12px; background: #222; border-radius: 10px; overflow: hidden; }
        #eb-i { width: 100%; height: 100%; background: #00d2ff; }

        /* الأزرار السفلية - طبقة عليا جداً */
        .nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; 
            background: #080808; display: flex; z-index: 99999; 
            border-top: 1px solid #333; pointer-events: auto;
        }
        .nav-i { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; color: #555; font-size: 12px; font-weight: bold;
            cursor: pointer;
        }
        .nav-i.on { color: gold; }
        .nav-i span { font-size: 24px; margin-bottom: 4px; }

        .pop { position: absolute; color: #00d2ff; font-size: 40px; font-weight: bold; animation: up 0.5s forwards; pointer-events: none; z-index: 50; }
        @keyframes up { to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body onload="start()">

    <div id="loader">
        <h2 id="pct" style="color:gold">0%</h2>
        <div class="bar-o"><div id="bar-i"></div></div>
    </div>

    <div id="pg-tap" class="page active">
        <div id="sc" class="pts">0</div>
        <div style="color:#00d2ff; font-size:14px; letter-spacing:2px">BRONZE</div>
        <div class="c-wrap" id="tap-btn">
            <img src="https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png" id="coin">
        </div>
        <div class="en-ui">
            <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:13px; color:#aaa">
                <span>⚡ ENERGY</span><span id="ev">2000/2000</span>
            </div>
            <div class="eb-o"><div id="eb-i"></div></div>
        </div>
    </div>

    <div id="pg-lead" class="page">
        <h2 style="color:gold">LEADERBOARD</h2>
        <div style="width:80%; background:#111; padding:20px; border-radius:10px">
            <p>1. Ahmed: 1,250,000</p>
            <p style="color:gold">3. You: <span id="my-sc">0</span></p>
        </div>
    </div>

    <div class="nav">
        <div class="nav-i on" onclick="go('tap', this)"><span>💰</span>TAP</div>
        <div class="nav-i" onclick="go('lead', this)"><span>🏆</span>LEADERS</div>
    </div>

    <script>
        let s = parseInt(localStorage.getItem('j_s')) || 0;
        let e = parseFloat(localStorage.getItem('j_e')) || 2000;

        function start() {
            let p = 0;
            let itv = setInterval(() => {
                p += 5;
                document.getElementById('bar-i').style.width = p + "%";
                document.getElementById('pct').innerText = p + "%";
                if(p >= 100) {
                    clearInterval(itv);
                    document.getElementById('loader').style.display = 'none';
                    upd();
                }
            }, 40);
        }

        // دالة التبديل - تم اختبارها لتعمل قسرياً
        function go(pg, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-i').forEach(n => n.classList.remove('on'));
            document.getElementById('pg-' + pg).classList.add('active');
            el.classList.add('on');
            if(navigator.vibrate) navigator.vibrate(10);
        }

        function upd() {
            document.getElementById('sc').innerText = s.toLocaleString('en-US');
            document.getElementById('my-sc').innerText = s.toLocaleString('en-US');
            document.getElementById('ev').innerText = Math.floor(e).toLocaleString('en-US') + " / 2000";
            document.getElementById('eb-i').style.width = (e/20) + "%";
        }

        const btn = document.getElementById('tap-btn');
        const img = document.getElementById('coin');

        btn.addEventListener('touchstart', (ev) => {
            ev.preventDefault();
            if(e < 1) return;

            if(navigator.vibrate) navigator.vibrate(15);
            s++; e--;
            upd();
            localStorage.setItem('j_s', s);
            localStorage.setItem('j_e', e);

            img.style.transform = "scale(0.9) rotate(2deg)";

            let t = ev.touches[0];
            let p = document.createElement('div');
            p.className = 'pop'; p.innerText = '+1';
            p.style.left = t.pageX + 'px'; p.style.top = t.pageY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 500);
        });

        btn.addEventListener('touchend', () => { img.style.transform = "scale(1.1) rotate(0deg)"; });

        setInterval(() => { if(e < 2000) { e = Math.min(2000, e + 1); upd(); } }, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimi Coin Game</title>
    <style>
        /* التنسيقات العامة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* الخلفية الجديدة مع صورة image_10.png وتأثير نيون متحرك */
        body {
            background-image: url('image_10.png'); /* رابط الصورة المباشر */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #fff;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            
            /* تأثير حركة النيون في الخلفية */
            animation: neonGlow 10s ease-in-out infinite alternate;
        }

        /* تعريف حركة النيون */
        @keyframes neonGlow {
            0% {
                filter: hue-rotate(0deg);
            }
            100% {
                filter: hue-rotate(360deg);
            }
        }

        /* رأس الصفحة (التسلسل الهرمي للمعلومات) */
        header {
            padding: 20px;
            text-align: center;
            border-bottom: none; /* إزالة الخط السفلي تماماً */
        }

        /* عدد النقاط الحالي */
        #points {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 5px;
            
            /* تأثير توهج نيون على النص */
            text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #0ff, 0 0 40px #0ff;
        }

        /* معدل الكسب للساعة مع أيقونة */
        #income-rate {
            color: #ccc;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* أيقونة النقود */
        #income-icon {
            margin-right: 8px;
            color: gold;
        }

        /* الليرة الذهبية (زر النقر) */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* حاوية الليرة */
        #coin-container {
            width: 80%;
            max-width: 300px;
            cursor: pointer;
            position: relative;
        }

        /* الليرة الذهبية */
        #coin {
            width: 100%;
            height: auto;
            border-radius: 50%;
            
            /* تأثير توهج نيون على الليرة */
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5), 0 0 40px rgba(0, 255, 255, 0.3), 0 0 60px rgba(0, 255, 255, 0.1);
            
            /* حركة نبض بسيطة لليرة */
            animation: pulse 2s ease-in-out infinite;
        }

        /* تعريف حركة النبض */
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        /* تأثير +1 عند النقر */
        .tap-effect {
            position: absolute;
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
            
            /* تأثير توهج نيون على تأثير +1 */
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #0ff;
            
            /* حركة تصاعدية وتلاشي للرمز */
            animation: floatAndFade 1s forwards;
            pointer-events: none; /* لمنع التأثير من اعتراض النقرات */
        }

        /* تعريف حركة التصاعد والتلاشي */
        @keyframes floatAndFade {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-50px);
                opacity: 0;
            }
        }

        /* شريط الطاقة المدمج */
        #energy-bar-container {
            position: absolute;
            bottom: 20px;
            left: 10%;
            width: 80%;
            height: 20px;
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #555;
            display: flex;
            align-items: center;
        }

        /* الجزء المعبأ من شريط الطاقة */
        #energy-bar-fill {
            height: 100%;
            background-color: #0ff; /* لون نيون للطاقة */
            width: 100%; /* يبدأ ممتلئاً */
            border-radius: 10px 0 0 10px;
            transition: width 0.5s ease-out; /* حركة ناعمة */
        }

        /* شريط تعبئة إضافي لتأثير البطارية */
        #energy-bar-fill-secondary {
            height: 100%;
            background-color: gold;
            width: 99.6%; /* يبدأ ممتلئاً بنسبة 99.6% */
            transition: width 0.5s ease-out; /* حركة ناعمة */
        }

        /* النص فوق شريط الطاقة */
        #energy-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-weight: bold;
            color: #fff;
            
            /* تأثير توهج نيون على نص الطاقة */
            text-shadow: 0 0 5px #000;
            z-index: 1;
        }

        /* أيقونة البطارية */
        #battery-icon {
            width: 24px;
            height: auto;
            margin-right: 5px;
            z-index: 1;
        }

        /* تذييل الصفحة (أيقونات التنقل) */
        footer {
            padding: 10px;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* أيقونة التنقل */
        .nav-icon {
            text-align: center;
            color: #ccc;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        /* أيقونة التنقل النشطة */
        .nav-icon.active {
            color: gold;
        }

        /* أيقونة التنقل مع تأثير التوهج عند التمرير */
        .nav-icon:hover {
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px #0ff;
        }

        /* الرمز داخل أيقونة التنقل */
        .nav-icon i {
            font-size: 1.5em;
            display: block;
            margin-bottom: 3px;
        }

        /* النص داخل أيقونة التنقل */
        .nav-icon span {
            font-size: 0.8em;
        }
        
        /* إخفاء القائمة المنسدلة */
        select {
            display: none;
        }
        
    </style>
</head>
<body>
    <header>
        <select>
            <option>Option 1</option>
            <option>Option 2</option>
            <option>Option 3</option>
        </select>
        
        <div id="points">979</div>
        <div id="income-rate">
            <span id="income-icon">💰</span> 0+/ساعة
        </div>
    </header>
    
    <main>
        <div id="coin-container" onclick="handleTap(event)">
            <img src="image_9.png" alt="Jimi Coin" id="coin">
        </div>
        
        <div id="energy-bar-container">
            <img src="image_9.png" alt="Battery" id="battery-icon">
            <div id="energy-bar-fill"></div>
            <div id="energy-bar-fill-secondary"></div>
            <div id="energy-text">1000 / 996</div>
        </div>
    </main>
    
    <footer>
        <div class="nav-icon active" onclick="navigate('tap')">
            <i>💰</i>
            <span>نقر</span>
        </div>
        <div class="nav-icon" onclick="navigate('office')">
            <i>🛋️</i>
            <span>مكتب</span>
        </div>
        <div class="nav-icon" onclick="navigate('mining')">
            <i>⛏️</i>
            <span>تعدين</span>
        </div>
    </footer>
    
    <script>
        let currentPoints = 979;
        
        // التعامل مع النقرات على الليرة
        function handleTap(event) {
            // إضافة نقاط
            currentPoints++;
            document.getElementById('points').innerText = currentPoints;
            
            // إضافة تأثير +1
            const mainBalanceContainer = document.getElementById('coin-container');
            const tapEffect = document.createElement('div');
            tapEffect.classList.add('tap-effect');
            tapEffect.innerText = '+1';
            
            // تحديد موقع التأثير بشكل عشوائي قليلاً حول مكان النقر
            const tapX = event.clientX;
            const tapY = event.clientY;
            const containerRect = mainBalanceContainer.getBoundingClientRect();
            tapEffect.style.left = (tapX - containerRect.left + (Math.random() - 0.5) * 50) + 'px';
            tapEffect.style.top = (tapY - containerRect.top + (Math.random() - 0.5) * 50) + 'px';
            
            mainBalanceContainer.appendChild(tapEffect);
            
            // إزالة التأثير بعد اكتمال الحركة
            setTimeout(() => {
                mainBalanceContainer.removeChild(tapEffect);
            }, 1000);
        }

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jolt Coin - Powering the Future</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* تصميم شاشة التحميل (Splash Screen) */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.8s ease-out;
        }

        #splash-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* تجعل الصورة تملأ الشاشة بالكامل */
        }

        /* تصميم محتوى اللعبة */
        #game-content {
            opacity: 0; /* مخفي في البداية */
            display: none;
            text-align: center;
            transition: opacity 0.8s ease-in;
        }

        #score-container {
            font-size: 52px;
            font-weight: 800;
            margin-bottom: 30px;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        #coin-container {
            position: relative;
            width: 300px;
            height: 300px;
            cursor: pointer;
            transition: transform 0.05s;
        }

        #coin-container:active {
            transform: scale(0.92);
        }

        #coin {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
            -webkit-user-drag: none;
        }

        .tap-text {
            position: absolute;
            font-size: 35px;
            font-weight: 900;
            color: #FFD700;
            pointer-events: none;
            user-select: none;
            animation: moveUp 0.6s ease-out forwards;
        }

        @keyframes moveUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-120px); }
        }

        #footer-text {
            margin-top: 40px;
            font-size: 18px;
            letter-spacing: 4px;
            color: #555;
            text-transform: uppercase;
        }
    </style>
</head>
<body onload="initGame()">

    <div id="splash-screen">
        <img src="https://i.ibb.co/V0jRzfVv/1000025206.png" id="splash-image" alt="Loading Jolt Coin">
    </div>

    <div id="game-content">
        <div id="score-container">0</div>

        <div id="coin-container" onclick="handleTap(event)" ontouchstart="handleTap(event)">
            <img src="https://i.ibb.co/68vM35v0/1000025201.png" id="coin" alt="Jolt Coin">
        </div>

        <div id="footer-text">Jolt Coin</div>
    </div>

    <script>
        function initGame() {
            // عرض شاشة التحميل لمدة 3 ثوانٍ
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const game = document.getElementById('game-content');
                
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    game.style.display = 'block';
                    setTimeout(() => { game.style.opacity = '1'; }, 50);
                }, 800);
            }, 3000);
        }

        // منطق اللعبة
        let score = parseInt(localStorage.getItem('jolt_v1_score')) || 0;
        const scoreDisplay = document.getElementById('score-container');
        scoreDisplay.innerText = score.toLocaleString();

        function handleTap(event) {
            event.preventDefault();
            const touches = event.changedTouches ? event.changedTouches : [event];
            for (let i = 0; i < touches.length; i++) {
                score++;
                createTapText(touches[i].clientX, touches[i].clientY);
            }
            scoreDisplay.innerText = score.toLocaleString();
            localStorage.setItem('jolt_v1_score', score);
        }

        function createTapText(x, y) {
            const tapText = document.createElement('div');
            tapText.innerText = '+1';
            tapText.className = 'tap-text';
            tapText.style.left = (x - 20) + 'px';
            tapText.style.top = (y - 40) + 'px';
            document.body.appendChild(tapText);
            setTimeout(() => { tapText.remove(); }, 600);
        }

        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jimi Coin</title>
    <style>
        body { background: #000; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; transition: 0.8s; }
        #splash img { width: 100%; height: 100%; object-fit: cover; }
        #game { display: none; text-align: center; }
        #score { font-size: 70px; color: #FFD700; margin-bottom: 20px; font-weight: bold; }
        .coin-btn { width: 260px; height: 260px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .coin-btn img { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #FF3E3E; }
    </style>
</head>
<body onload="startApp()">

    <div id="splash"><img src="splash.png"></div>

    <div id="game">
        <div id="score">0</div>
        <div class="coin-btn" onclick="tap()"><img src="coin.png"></div>
        <p style="color: #555; letter-spacing: 5px;">JOLT COIN</p>
    </div>

    <script>
        function startApp() {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('game').style.display = 'block';
                }, 800);
            }, 3000);
        }

        let p = parseInt(localStorage.getItem('j_pts')) || 0;
        document.getElementById('score').innerText = p;
        function tap() {
            p++;
            document.getElementById('score').innerText = p;
            localStorage.setItem('j_pts', p);
        }
    </script>
</body>
</html>

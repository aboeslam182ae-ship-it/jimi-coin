<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonic Jimi Coin</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: Arial, sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .score-container { font-size: 60px; font-weight: bold; color: #00bcff; text-shadow: 0 0 20px #00bcff; margin-bottom: 20px; }
        .character-container { width: 250px; height: 250px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s ease; -webkit-tap-highlight-color: transparent; }
        .character-container:active { transform: translateY(-30px); }
        img { width: 100%; height: auto; }
    </style>
</head>
<body>
    <div class="score-container" id="score">0</div>
    <div class="character-container" onclick="tapSonic()">
        <img src="https://assets.stickpng.com/images/580b57fbd9996e24bc43bd32.png" alt="Sonic">
    </div>
    <script>
        let count = parseInt(localStorage.getItem('jimiScore')) || 0;
        document.getElementById('score').innerText = count;
        function tapSonic() {
            count++;
            document.getElementById('score').innerText = count;
            localStorage.setItem('jimiScore', count);
            if (navigator.vibrate) { navigator.vibrate(15); }
        }
    </script>
</body>
</html>

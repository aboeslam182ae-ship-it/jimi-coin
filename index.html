<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Jimi Coin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<style>
* { 
box-sizing: border-box; 
margin: 0; 
padding: 0; 
user-select: none; 
-webkit-tap-highlight-color: transparent; 
}
body { 
/* وضعنا لون داكن كاحتياط في حال لم تتحمل الصورة */
background: #020111; 
background-image: url('image_10.png'); 
background-size: cover; 
background-position: center; 
background-attachment: fixed;
color: #fff; 
font-family: sans-serif; 
overflow: hidden; 
height: 100vh; 
}
/* إزالة أي خطوط أفقية في الأعلى */
.header { 
text-align: center; 
padding: 30px 15px 10px 15px; 
border: none !important; /* التأكيد على إلغاء الخط */
}
#main-balance { 
font-size: 55px; 
font-weight: 900; 
text-shadow: 0 0 15px rgba(255,255,255,0.4);
}
.profit-info { 
color: #FFD700; 
font-size: 14px; 
margin-top: -5px;
}
.page { 
display: none; 
height: calc(100vh - 180px); 
width: 100%; 
flex-direction: column; 
align-items: center; 
}
.page-active { 
display: flex !important; 
}
/* الليرة وتأثير النبض */
#coin-click { 
width: 270px; 
height: 270px; 
border-radius: 50%; 
border: 6px solid #cd7f32; 
background: rgba(0,0,0,0.4) url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png') center/cover; 
box-shadow: 0 0 40px rgba(205, 127, 50, 0.6); 
margin-top: 40px; 
transition: transform 0.05s;
}
#coin-click:active { 
transform: scale(0.92); 
}
/* شريط الطاقة النحيف والمحسن */
.energy-wrapper { 
width: 80%; 
margin-top: auto; 
margin-bottom: 40px;
}
.energy-bar-container { 
width: 100%; 
height: 24px; 
background: rgba(0,0,0,0.6); 
border-radius: 12px; 
position: relative; 
border: 1px solid rgba(255,255,255,0.1); 
overflow: hidden; 
display: flex; 
align-items: center; 
}
#energy-fill { 
position: absolute; 
right: 0; 
height: 100%; 
background: linear-gradient(90deg, #5bc0de, #2e6da4); 
width: 100%; 
transition: width 0.3s; 
}
#energy-num { 
position: absolute; 
width: 100%; 
text-align: center; 
font-weight: bold; 
font-size: 12px; 
z-index: 10; 
}
/* تأثير +1 */
.plus-one { 
position: absolute; 
color: #FFD700; 
font-size: 32px; 
font-weight: 900; 
pointer-events: none; 
animation: floatUp 0.8s ease-out forwards; 
z-index: 1000;
}
@keyframes floatUp { 
0% { opacity: 1; transform: translateY(0); } 
100% { opacity: 0; transform: translateY(-120px); } 
}
/* القائمة السفلية */
.footer-nav { 
position: fixed; 
bottom: 0; 
width: 100%; 
height: 80px; 
background: rgba(0,0,0,0.8); 
backdrop-filter: blur(10px);
display: flex; 
border-top: 1px solid rgba(255,255,255,0.05); 
}
.nav-item { 
flex: 1; 
display: flex; 
flex-direction: column; 
align-items: center; 
justify-content: center; 
opacity: 0.4; 
font-size: 12px;
}
.nav-active { 
opacity: 1; 
color: #FFD700; 
}
</style>
</head>
<body onload="initApp()">

<div class="header">
    <div id="main-balance">0</div>
    <div class="profit-info">💰 +<span id="pph-display">0</span>/ساعة</div>
</div>

<div id="tab-tap" class="page page-active">
    <div id="coin-click"></div>
    <div class="energy-wrapper">
        <div class="energy-bar-container">
            <div id="energy-num">1000 / 1000</div>
            <div id="energy-fill"></div>
        </div>
    </div>
</div>

<div id="tab-office" class="page">
    <div style="margin-top:50px">صفحة المكتب قيد التحديث...</div>
</div>

<nav class="footer-nav">
    <div class="nav-item" onclick="switchTab('mine', this)"><span>⛏️</span><span>تعدين</span></div>
    <div class="nav-item" onclick="switchTab('office', this)"><span>🛋️</span><span>مكتب</span></div>
    <div class="nav-item nav-active" onclick="switchTab('tap', this)"><span>💰</span><span>نقر</span></div>
</nav>

<script>
// --- نفس منطق البرمجة السابق (Firebase) لضمان عدم ضياع البيانات ---
let score = 0;
let pph = 0;
let energy = 1000;
const maxEnergy = 1000;

function initApp() {
    // استعادة البيانات من الذاكرة أو قاعدة البيانات هنا
    updateUI();
    setInterval(() => {
        if(energy < maxEnergy) energy = Math.min(maxEnergy, energy + 1);
        updateUI();
    }, 1000);
}

function updateUI() {
    document.getElementById('main-balance').innerText = Math.floor(score).toLocaleString();
    document.getElementById('energy-num').innerText = `${Math.floor(energy)} / ${maxEnergy}`;
    document.getElementById('energy-fill').style.width = (energy / maxEnergy * 100) + "%";
}

document.getElementById('coin-click').addEventListener('touchstart', (e) => {
    e.preventDefault();
    for(let i=0; i<e.changedTouches.length; i++) {
        if(energy >= 1) {
            score++;
            energy--;
            showPlusOne(e.changedTouches[i].pageX, e.changedTouches[i].pageY);
        }
    }
    updateUI();
});

function showPlusOne(x, y) {
    const p = document.createElement('div');
    p.className = 'plus-one';
    p.innerText = '+1';
    p.style.left = x + 'px';
    p.style.top = (y - 40) + 'px';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
}

function switchTab(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
    document.getElementById('tab-' + id).classList.add('page-active');
    el.classList.add('nav-active');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin Pro - Ultimate Version</title>
    <style>
        /* ---------------------------------- */
        /* --- CSS STYLES (DETAILED) --- */
        /* ---------------------------------- */

        * {
            box-sizing: border-box;
        }

        * {
            margin: 0;
        }

        * {
            padding: 0;
        }

        * {
            user-select: none;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        * {
            touch-action: none; /* Essential for multi-finger tapping */
        }

        body {
            background-color: #000000;
        }

        body {
            color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            overflow: hidden;
        }

        body {
            height: 100vh;
        }

        /* --- LOADER SECTION --- */

        #loader-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #000000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 120px;
        }

        #load-percent {
            font-size: 42px;
            font-weight: 900;
            color: #FFD700;
            margin-bottom: 15px;
            text-shadow: 0px 0px 10px rgba(255, 215, 0, 0.3);
        }

        .bar-outer {
            width: 240px;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #bar-inner {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            box-shadow: 0px 0px 10px #FFD700;
        }

        /* --- PAGE SYSTEM --- */

        .page {
            display: none;
            height: 100vh;
            width: 100%;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .page-active {
            display: flex !important;
        }

        /* --- TAB 1: TAP PAGE --- */

        #main-balance {
            font-size: 64px;
            font-weight: 900;
            margin-top: 10px;
            letter-spacing: -1px;
        }

        #level-label {
            font-size: 15px;
            margin-bottom: 45px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #coin-container {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #coin-click {
            width: 270px;
            height: 270px;
            border-radius: 50%;
            border: 8px solid #cd7f32; /* Bronze start */
            background-image: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png');
            background-size: cover;
            background-position: center;
            z-index: 10;
            transition: transform 0.05s ease, border 0.6s ease;
            box-shadow: 0px 0px 30px rgba(0,0,0,0.5);
        }

        .plus-one {
            position: absolute;
            color: #ffffff;
            font-size: 34px;
            font-weight: 900;
            pointer-events: none;
            z-index: 100;
            animation: floatAnimation 0.8s ease-out forwards;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes floatAnimation {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-160px) scale(1.2);
            }
        }

        /* --- ENERGY BAR --- */

        .energy-wrapper {
            width: 85%;
            margin-top: 50px;
        }

        .energy-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        #energy-text {
            font-size: 16px;
            font-weight: 800;
        }

        .energy-bg {
            width: 100%;
            height: 14px;
            background-color: #1a1a1a;
            border-radius: 12px;
            border: 1px solid #333;
            overflow: hidden;
        }

        #energy-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            transition: width 0.15s linear;
        }

        /* --- TAB 2: TASKS PAGE --- */

        .header-title {
            font-size: 32px;
            font-weight: 900;
            color: #FFD700;
            margin-bottom: 30px;
        }

        .scroll-area {
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .item-row {
            background-color: #111111;
            padding: 18px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #222222;
        }

        .item-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item-name {
            font-size: 17px;
            font-weight: 700;
        }

        .item-reward {
            font-size: 14px;
            color: #FFD700;
            font-weight: 800;
        }

        .action-btn {
            background-color: #FFD700;
            color: #000000;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 900;
        }

        /* --- TAB 4: TOP PLAYERS PAGE --- */

        .leader-card {
            background-color: #111111;
            padding: 16px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #222222;
            width: 100%;
        }

        .rank-name {
            font-size: 16px;
            font-weight: 600;
        }

        .rank-score {
            font-size: 16px;
            font-weight: 800;
            color: #FFD700;
        }

        /* --- NAVIGATION --- */

        .footer-nav {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            height: 85px;
            background-color: #0d0d0d;
            display: flex;
            border-radius: 22px;
            border: 1px solid #222;
            z-index: 1000;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.8);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #444;
            transition: all 0.2s;
        }

        .nav-item-active {
            color: #FFD700;
        }

        .nav-icon-box {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .nav-text-box {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }

    </style>
</head>
<body onload="startLoading()">

    <div id="loader-screen">
        <div id="load-percent">0%</div>
        <div class="bar-outer">
            <div id="bar-inner"></div>
        </div>
    </div>

    <div id="tab-tap" class="page page-active">
        <div id="main-balance">0</div>
        <div id="level-label">BRONZE LEVEL</div>
        
        <div id="coin-container">
            <div id="coin-click"></div>
        </div>

        <div class="energy-wrapper">
            <div class="energy-info">
                <span style="color: #888; font-weight: 800;">ENERGY</span>
                <span id="energy-text">2000 / 2000</span>
            </div>
            <div class="energy-bg">
                <div id="energy-fill"></div>
            </div>
        </div>
    </div>

    <div id="tab-tasks" class="page">
        <div class="header-title">TASKS</div>
        <div class="scroll-area">
            
            <div class="item-row" onclick="runTask(50000, 'https://t.me/yourchannel')">
                <div class="item-details">
                    <span class="item-name">Join Telegram Channel</span>
                    <span class="item-reward">+50,000 COINS</span>
                </div>
                <div class="action-btn">GO</div>
            </div>

            <div class="item-row" onclick="runTask(20000, 'https://twitter.com/')">
                <div class="item-details">
                    <span class="item-name">Follow on X</span>
                    <span class="item-reward">+20,000 COINS</span>
                </div>
                <div class="action-btn">GO</div>
            </div>

        </div>
    </div>

    <div id="tab-boost" class="page">
        <div class="header-title">BOOSTERS</div>
        <p style="color: #666; font-weight: bold; margin-top: 40px;">COMING SOON</p>
    </div>

    <div id="tab-top" class="page">
        <div class="header-title">LEADERBOARD</div>
        <div class="scroll-area">
            
            <div class="leader-card">
                <span class="rank-name">1. Muhammad Koca</span>
                <span class="rank-score">2,500,000</span>
            </div>

            <div class="leader-card">
                <span class="rank-name">2. Alex Pro</span>
                <span class="rank-score">1,800,000</span>
            </div>

            <div class="leader-card">
                <span class="rank-name">3. Sarah Smith</span>
                <span class="rank-score">950,000</span>
            </div>

        </div>
    </div>

    <div class="footer-nav">
        <div class="nav-item nav-item-active" onclick="changeTab('tap', this)">
            <div class="nav-icon-box">💰</div>
            <div class="nav-text-box">Tap</div>
        </div>
        <div class="nav-item" onclick="changeTab('tasks', this)">
            <div class="nav-icon-box">📜</div>
            <div class="nav-text-box">Tasks</div>
        </div>
        <div class="nav-item" onclick="changeTab('boost', this)">
            <div class="nav-icon-box">🚀</div>
            <div class="nav-text-box">Boost</div>
        </div>
        <div class="nav-item" onclick="changeTab('top', this)">
            <div class="nav-icon-box">🏆</div>
            <div class="nav-text-box">Top</div>
        </div>
    </div>

    /* ---------------------------------- */

    <script>
        // --- DATA STATE ---
        let userScore = parseInt(localStorage.getItem('jimi_score')) || 0;
        let userEnergy = parseFloat(localStorage.getItem('jimi_energy')) || 2000;

        // --- INITIALIZATION ---
        function startLoading() {
            let progress = 0;
            let loaderInterval = setInterval(() => {
                progress += 1;
                document.getElementById('bar-inner').style.width = progress + "%";
                document.getElementById('load-percent').innerText = progress + "%";
                
                if (progress >= 100) {
                    clearInterval(loaderInterval);
                    document.getElementById('loader-screen').style.display = 'none';
                    refreshDisplay();
                }
            }, 18);

            // Energy Auto-Recovery
            setInterval(() => {
                if (userEnergy < 2000) {
                    userEnergy = Math.min(2000, userEnergy + 1.2);
                    refreshDisplay();
                }
            }, 1000);
        }

        // --- UI REFRESH ---
        function refreshDisplay() {
            document.getElementById('main-balance').innerText = userScore.toLocaleString();
            document.getElementById('energy-text').innerText = Math.floor(userEnergy) + " / 2000";
            
            let energyPercentage = (userEnergy / 2000) * 100;
            document.getElementById('energy-fill').style.width = energyPercentage + "%";
            
            updateLevel();

            localStorage.setItem('jimi_score', userScore);
            localStorage.setItem('jimi_energy', userEnergy);
        }

        // --- LEVEL & COLOR LOGIC ---
        function updateLevel() {
            const label = document.getElementById('level-label');
            const coinBody = document.getElementById('coin-click');

            if (userScore >= 1000000) {
                label.innerText = "DIAMOND LEVEL";
                label.style.color = "#b9f2ff";
                coinBody.style.borderColor = "#b9f2ff";
            } 
            else if (userScore >= 500000) {
                label.innerText = "GOLD LEVEL";
                label.style.color = "#FFD700";
                coinBody.style.borderColor = "#FFD700";
            } 
            else if (userScore >= 50000) {
                label.innerText = "SILVER LEVEL";
                label.style.color = "#C0C0C0";
                coinBody.style.borderColor = "#C0C0C0";
            } 
            else {
                label.innerText = "BRONZE LEVEL";
                label.style.color = "#cd7f32";
                coinBody.style.borderColor = "#cd7f32";
            }
        }

        // --- NAVIGATION LOGIC ---
        function changeTab(targetId, navElement) {
            // Hide all pages
            const allPages = document.querySelectorAll('.page');
            for (let i = 0; i < allPages.length; i++) {
                allPages[i].classList.remove('page-active');
            }

            // Remove active color from all nav icons
            const allNavItems = document.querySelectorAll('.nav-item');
            for (let j = 0; j < allNavItems.length; j++) {
                allNavItems[j].classList.remove('nav-item-active');
            }

            // Show selected page
            document.getElementById('tab-' + targetId).classList.add('page-active');
            navElement.classList.add('nav-item-active');
        }

        // --- TASKS LOGIC ---
        function runTask(reward, link) {
            window.open(link, '_blank');
            userScore += reward;
            refreshDisplay();
        }

        // --- MULTI-TOUCH TAP SYSTEM ---
        const coinArea = document.getElementById('coin-click');

        coinArea.addEventListener('touchstart', function(event) {
            // Prevent default browser behavior (zoom/scroll)
            event.preventDefault();

            // Handle every finger touch detected in this event
            const activeTouches = event.changedTouches;

            for (let k = 0; k < activeTouches.length; k++) {
                if (userEnergy >= 1) {
                    // Increase Score
                    userScore = userScore + 1;
                    // Decrease Energy
                    userEnergy = userEnergy - 1;

                    // Get Finger Position
                    const currentTouch = activeTouches[k];
                    const posX = currentTouch.clientX;
                    const posY = currentTouch.clientY;

                    // Trigger the +1 Visual
                    spawnPlusOne(posX, posY);
                }
            }

            refreshDisplay();

            // Coin Scale Effect
            this.style.transform = "scale(0.95)";
            setTimeout(() => {
                this.style.transform = "scale(1)";
            }, 60);

        }, { passive: false });

        function spawnPlusOne(x, y) {
            const effectElement = document.createElement('div');
            effectElement.className = 'plus-one';
            effectElement.innerText = '+1';
            
            // Positioning exactly where finger touched
            effectElement.style.left = (x - 20) + 'px';
            effectElement.style.top = (y - 40) + 'px';

            document.body.appendChild(effectElement);

            // Remove from memory after animation ends
            setTimeout(() => {
                effectElement.remove();
            }, 800);
        }

    </script>
</body>
</html>

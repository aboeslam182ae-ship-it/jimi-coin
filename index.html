<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin Official</title>
    <style>
        /* Global & Reset Styles */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            touch-action: none; 
        }

        body { 
            background: #000; 
            color: #fff; 
            margin: 0; 
            font-family: 'Arial', sans-serif; 
            overflow: hidden; 
            text-align: center; 
        }

        /* Loader - Fixed Image Loading Issue */
        #loader { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-end; 
            padding-bottom: 25%; 
        }

        #pct { 
            color: gold; 
            font-size: 42px; 
            font-weight: bold; 
            margin-bottom: 10px; 
        }

        .bar-o { 
            width: 250px; 
            height: 12px; 
            background: rgba(255,255,255,0.1); 
            border-radius: 20px; 
            border: 1px solid gold; 
            overflow: hidden; 
        }

        #bar-i { 
            width: 0%; 
            height: 100%; 
            background: gold; 
        }

        /* Page Management */
        .page { 
            display: none; 
            height: 100vh; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 50px; 
            padding-bottom: 120px; 
            overflow-y: auto; 
        }

        .active { 
            display: flex !important; 
        }

        .score { 
            font-size: 72px; 
            color: #fff; 
            font-weight: bold; 
            margin-bottom: 5px; 
        }

        #level-label { 
            font-weight: 900; 
            font-size: 14px; 
            margin-bottom: 25px; 
            letter-spacing: 1px;
        }

        /* Coin Area - Fixed Image Appearance */
        #tap-area { 
            width: 280px; 
            height: 280px; 
            border-radius: 50%; 
            border: 6px solid #cd7f32; 
            box-shadow: 0 0 50px #cd7f32;
            background-image: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png');
            background-position: center;
            background-size: contain;
            background-repeat: no-repeat;
            background-color: transparent;
            position: relative; 
            transition: transform 0.05s, border-color 0.3s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Energy Section */
        .energy-box { 
            width: 80%; 
            margin-top: 40px; 
        }

        .energy-bar-bg { 
            width: 100%; 
            height: 14px; 
            background: #151515; 
            border-radius: 30px; 
            overflow: hidden; 
            border: 1px solid #222; 
        }

        #energy-fill { 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(90deg, #00d2ff, #3a7bd5); 
        }

        /* Navigation Bar */
        .nav-bar { 
            position: fixed; 
            bottom: 20px; 
            left: 15px; 
            right: 15px; 
            height: 85px; 
            background: rgba(15,15,15,0.95); 
            display: flex; 
            border-radius: 25px; 
            border: 1px solid #222; 
        }

        .nav-btn { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: #555; 
            font-size: 10px; 
            font-weight: bold; 
        }

        .nav-btn.active-nav { 
            color: gold; 
        }

        .nav-icon { 
            font-size: 22px; 
            margin-bottom: 4px; 
        }

        /* Pop-up Animation */
        .tap-pop { 
            position: absolute; 
            color: gold; 
            font-size: 40px; 
            font-weight: bold; 
            animation: floatUp 0.7s forwards; 
            pointer-events: none; 
        }

        @keyframes floatUp { 
            0% { transform: translateY(0); opacity: 1; } 
            100% { transform: translateY(-150px); opacity: 0; } 
        }
    </style>
</head>
<body onload="startLoading()">

    <div id="loader">
        <div id="pct">0%</div>
        <div class="bar-o"><div id="bar-i"></div></div>
    </div>

    <div id="page-tap" class="page active">
        <div id="score-display" class="score">0</div>
        <div id="level-label">BRONZE LEVEL</div>
        <div id="tap-area"></div>
        <div class="energy-box">
            <div style="display:flex; justify-content:space-between; font-size:12px; color:#888; margin-bottom:5px">
                <span>⚡ ENERGY</span><span id="energy-val">2000 / 2000</span>
            </div>
            <div class="energy-bar-bg"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active-nav" onclick="switchPage('tap', this)"><span class="nav-icon">💰</span>TAP</div>
        <div class="nav-btn"><span class="nav-icon">📜</span>TASKS</div>
        <div class="nav-btn"><span class="nav-icon">🚀</span>BOOST</div>
        <div class="nav-btn"><span class="nav-icon">🏆</span>TOP</div>
    </div>

    <script>
        // Database Variables (English Only)
        let balance = parseInt(localStorage.getItem('jimi_bal')) || 0;
        let energy = parseFloat(localStorage.getItem('jimi_nrg')) || 2000;
        let tapPower = 1;
        const maxEnergy = 2000;

        // Level Configuration with Correct Metal Colors
        const levelChart = [
            { name: "BRONZE", min: 0, color: "#cd7f32" },
            { name: "SILVER", min: 5000, color: "#C0C0C0" },
            { name: "GOLD", min: 25000, color: "#FFD700" },
            { name: "LEGENDARY", min: 1000000, color: "#FF4500" }
        ];

        // Initialization
        function startLoading() {
            let p = 0;
            let timer = setInterval(() => {
                p += 2;
                document.getElementById('bar-i').style.width = p + "%";
                document.getElementById('pct').innerText = p + "%";
                if(p >= 100) { 
                    clearInterval(timer); 
                    document.getElementById('loader').style.display = 'none'; 
                    updateUI(); 
                }
            }, 40);
            
            // Sync Data Every Second
            setInterval(() => { 
                saveToStorage(); 
                updateUI(); 
            }, 1000);
        }

        // Interface Update Logic
        function updateUI() {
            document.getElementById('score-display').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('energy-val').innerText = Math.floor(energy) + " / 2000";
            document.getElementById('energy-fill').style.width = (energy/20) + "%";
            
            // Auto Level & Color Detection
            let current = levelChart[0];
            levelChart.forEach(lvl => { if(balance >= lvl.min) current = lvl; });
            
            const label = document.getElementById('level-label');
            const coin = document.getElementById('tap-area');
            
            label.innerText = current.name + " LEVEL";
            label.style.color = current.color;
            
            // Update Coin Border and Glow
            coin.style.borderColor = current.color;
            coin.style.boxShadow = "0 0 50px " + current.color;
        }

        function saveToStorage() {
            localStorage.setItem('jimi_bal', balance);
            localStorage.setItem('jimi_nrg', energy);
        }

        function switchPage(id, btn) {
            // Simplified for Tap page focus
            updateUI();
        }

        // Touch Input Logic
        const area = document.getElementById('tap-area');
        area.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(energy >= tapPower) {
                balance += tapPower; 
                energy -= tapPower; 
                updateUI();
                
                let t = e.changedTouches[0];
                let pop = document.createElement('div');
                pop.className = 'tap-pop';
                pop.innerText = '+' + tapPower;
                pop.style.left = t.pageX + 'px';
                pop.style.top = t.pageY + 'px';
                document.body.appendChild(pop);
                setTimeout(() => pop.remove(), 600);
            }
            area.style.transform = "scale(0.95)";
            setTimeout(() => area.style.transform = "scale(1)", 50);
        }, {passive: false});

        // Regenerate Energy
        setInterval(() => { 
            if(energy < maxEnergy) energy = Math.min(maxEnergy, energy + 1.2); 
        }, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jolt Coin - Original 4:46</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #f3ba2f; --bg: #051937; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }

        /* شريط الطاقة الأزرق بإطار أبيض - طلب الساعة 4:46 */
        .energy-section { padding: 20px; border-bottom: 2px solid var(--gold); }
        .energy-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; }
        .bar-border { width: 100%; height: 18px; background: #000; border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: #007bff; width: 70%; }

        /* منطقة العملة المركزية */
        .coin-wrap { margin: 40px 0; }
        .main-bolt { width: 200px; height: 200px; background: radial-gradient(circle, var(--gold), #8a6d3b); border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px rgba(243, 186, 47, 0.4); cursor: pointer; }

        /* المربعات السفلية */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .card-box { background: #102a51; border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .card-box i { font-size: 28px; color: var(--gold); display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="energy-section">
        <div class="energy-info">
            <span style="color:var(--gold)">19.45B <i class="fas fa-coins"></i></span>
            <span>Level: Gold</span>
        </div>
        <div class="bar-border">
            <div class="bar-fill"></div>
        </div>
        <small style="display:block; margin-top:5px; color:#ccc;">Energy: 700 / 1000</small>
    </div>

    <div class="coin-wrap">
        <h1 style="color:var(--gold); margin-bottom: 25px;">JOLT COIN</h1>
        <div class="main-bolt">
            <i class="fas fa-bolt" style="font-size: 75px; color: #fff;"></i>
        </div>
    </div>

    <div class="nav-grid">
        <div class="card-box"><i class="fas fa-tshirt"></i><span>Skins</span></div>
        <div class="card-box"><i class="fas fa-users"></i><span>Friends</span></div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jimi Coin - Original Black</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; text-align: center; overflow: hidden; }

        /* شاشة التحميل (الجاكوار) */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .jag-img { width: 200px; height: 200px; border-radius: 50%; border: 2px solid #f3ba2f; margin-bottom: 20px; }
        .load-bar { width: 220px; height: 8px; background: #222; border: 1px solid #fff; border-radius: 5px; overflow: hidden; }
        .load-fill { width: 0%; height: 100%; background: #f3ba2f; animation: loading 2.5s forwards; }
        @keyframes loading { to { width: 100%; } }

        /* واجهة الساعة 5:50 (الصورة 1000025356) */
        #app { display: none; padding-top: 40px; }
        .score { font-size: 80px; font-weight: bold; color: #f3ba2f; margin: 0; }
        .level-label { font-size: 18px; color: #aaa; letter-spacing: 2px; margin-bottom: 30px; }

        .coin-container { 
            position: relative; width: 280px; height: 200px; margin: 0 auto; 
            display: flex; align-items: center; justify-content: center;
        }
        /* الهالة الصفراء خلف العملة */
        .coin-glow {
            position: absolute; width: 250px; height: 130px;
            border: 3px solid #f3ba2f; border-radius: 50%;
            box-shadow: 0 0 20px #f3ba2f;
        }
        .main-coin-img { width: 130px; z-index: 2; cursor: pointer; transition: transform 0.1s; }
        .main-coin-img:active { transform: scale(0.9); }

        .energy-section { position: absolute; bottom: 80px; width: 100%; }
        .energy-info { display: flex; justify-content: space-between; width: 90%; margin: 0 auto 5px auto; font-size: 14px; font-weight: bold; }
        .energy-bar-wrap { width: 90%; height: 12px; background: #111; border-radius: 10px; margin: 0 auto; overflow: hidden; }
        .energy-bar-fill { height: 100%; background: #00d2ff; width: 100%; }

        .bottom-menu { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; background: #000; }
        .menu-btn { color: #888; font-size: 12px; text-decoration: none; }
        .menu-btn.active { color: #f3ba2f; }
        .menu-btn img { display: block; margin: 0 auto 5px auto; width: 24px; }
    </style>
</head>
<body>

    <div id="loader">
        <img src="https://i.ibb.co/L6M7XmF/DALL-E-2025-10-27-21-44-33-A-realistic-cinematic-portrait-of-a-fierce-jaguar-made-of-solid-polished.webp" class="jag-img">
        <div class="load-bar"><div class="load-fill"></div></div>
    </div>

    <div id="app">
        <h1 class="score">15</h1>
        <div class="level-label">BRONZE LEVEL</div>

        <div class="coin-container">
            <div class="coin-glow"></div>
            <img src="https://i.ibb.co/Kzs676k/DALL-E-2025-10-27-21-38-16-A-close-up-design-of-a-round-golden-coin-for-a-digital-game-called-Jolt-Coi.webp" class="main-coin-img" onclick="tap()">
            <div style="position:absolute; right:20px; top:20px; color:#00d2ff; font-size:30px; font-weight:bold;">+3</div>
        </div>

        <div class="energy-section">
            <div class="energy-info">
                <span>⚡ ENERGY</span>
                <span>1997 / 2000</span>
            </div>
            <div class="energy-bar-wrap">
                <div class="energy-bar-fill"></div>
            </div>
        </div>

        <div class="bottom-menu">
            <a href="#" class="menu-btn active">
                <img src="https://cdn-icons-png.flaticon.com/512/2311/2311992.png"> TAP
            </a>
            <a href="#" class="menu-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/1043/1043444.png"> BOOST
            </a>
        </div>
    </div>

    <script>
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        }, 2500);

        function tap() {
            // كود النقرات
        }
    </script>
</body>
</html>

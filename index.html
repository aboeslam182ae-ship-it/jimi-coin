<!DOCTYPE html>
<html lang="en"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Jimi Coin - Final Fix</title>
    <style>
        /* إضافة خط يضمن ظهور الأرقام باللغة الإنجليزية (Latin) */
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap');

        body { 
            background: #000; color: #fff; margin: 0; 
            font-family: 'Roboto', sans-serif; /* استخدام خط يدعم الأرقام الإنجليزية */
            overflow: hidden; touch-action: none; 
            -webkit-user-select: none; user-select: none; 
        }
        
        #splash { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        #splash img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        
        .loader-container { width: 80%; margin-bottom: 60px; text-align: center; }
        .loader-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid #FFD700; }
        #loader-fill { width: 0%; height: 100%; background: #FFD700; transition: width 0.2s; }
        #load-pct { color: #FFD700; font-weight: bold; font-size: 20px; margin-bottom: 10px; }

        #app { display: none; height: 100vh; flex-direction: column; }
        .page { display: none; flex: 1; flex-direction: column; align-items: center; padding-top: 40px; }
        .active { display: flex !important; }

        /* الأرقام تظهر بالخط العريض واللون الذهبي */
        #score { font-size: 80px; color: gold; font-weight: 900; margin: 0; font-variant-numeric: tabular-nums; }
        .level-tag { color: #00d2ff; font-size: 14px; letter-spacing: 2px; margin-bottom: 20px; }
        
        .coin-wrapper { position: relative; width: 320px; height: 320px; display: flex; align-items: center; justify-content: center; perspective: 1000px; }
        .coin-glow { position: absolute; width: 280px; height: 180px; border: 2px solid gold; border-radius: 50%; box-shadow: 0 0 30px gold; z-index: 1; }
        #coinMain { width: 260px; height: 260px; z-index: 10; border-radius: 50%; object-fit: contain; transition: transform 0.1s; pointer-events: none; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 90px; background: #000; display: flex; border-top: 1px solid #222; z-index: 10000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 12px; font-weight: bold; }
        .nav-item.active-nav { color: gold; }
        .nav-icon { font-size: 24px; margin-bottom: 5px; }

        .energy-box { width: 85%; position: absolute; bottom: 120px; }
        .bar-bg { height: 12px; background: #111; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        #bar-fill { width: 100%; height: 100%; background: #00d2ff; }

        .pop { position: absolute; color: #00d2ff; font-size: 40px; font-weight: bold; pointer-events: none; animation: moveUp 0.6s forwards; }
        @keyframes moveUp { to { transform: translateY(-130px); opacity: 0; } }
    </style>
</head>
<body onload="start()">

    <div id="splash">
        <img src="https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/splash.png">
        <div class="loader-container">
            <div id="load-pct">0%</div>
            <div class="loader-bar"><div id="loader-fill"></div></div>
        </div>
    </div>

    <div id="app">
        <div id="p-tap" class="page active">
            <h1 id="score">0</h1>
            <div class="level-tag">BRONZE LEVEL</div>
            <div class="coin-wrapper" id="tapZone">
                <div class="coin-glow"></div>
                <img src="https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png" id="coinMain">
            </div>
            <div class="energy-box">
                <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px; color:#aaa">
                    <span>⚡ ENERGY</span><span id="en-val">2000 / 2000</span>
                </div>
                <div class="bar-bg"><div id="bar-fill"></div></div>
            </div>
        </div>

        <div class="nav">
            <div class="nav-item active-nav"><span class="nav-icon">💰</span>TAP</div>
            <div class="nav-item"><span class="nav-icon">🚀</span>BOOST</div>
            <div class="nav-item"><span class="nav-icon">🏆</span>LEADERS</div>
        </div>
    </div>

    <script>
        let pts = parseInt(localStorage.getItem('j_pts')) || 0;
        let en = parseFloat(localStorage.getItem('j_en')) || 2000;

        // وظيفة لتحويل الأرقام إلى صيغة إنجليزية قسرياً
        function toEng(num) {
            return num.toString().replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d));
        }

        function start() {
            let p = 0;
            const t = setInterval(() => {
                p += 2;
                document.getElementById('loader-fill').style.width = p + "%";
                document.getElementById('load-pct').innerText = toEng(Math.floor(p)) + "%";
                if(p >= 100) { 
                    clearInterval(t); 
                    document.getElementById('splash').style.display='none'; 
                    document.getElementById('app').style.display='flex'; 
                    updateUI(); 
                }
            }, 40);
        }

        function updateUI() {
            // استخدام toLocaleString('en-US') لضمان الأرقام الإنجليزية
            document.getElementById('score').innerText = pts.toLocaleString('en-US');
            document.getElementById('en-val').innerText = toEng(Math.floor(en)) + " / 2000";
            document.getElementById('bar-fill').style.width = (en/20) + "%";
        }

        const tapZone = document.getElementById('tapZone');
        const img = document.getElementById('coinMain');

        tapZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            
            // إصلاح الاهتزاز: محاولة التفعيل بأكثر من نمط
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate([20]); 
            }

            // إمالة العملة
            const rect = tapZone.getBoundingClientRect();
            const x = (touch.clientX - (rect.left + rect.width / 2)) / 10;
            const y = (touch.clientY - (rect.top + rect.height / 2)) / 10;
            img.style.transform = `rotateX(${-y}deg) rotateY(${x}deg) scale(0.95)`;

            if(en >= 1) {
                pts += 1; en -= 1;
                createPop(touch.pageX, touch.pageY);
                updateUI();
                localStorage.setItem('j_pts', pts);
                localStorage.setItem('j_en', en);
            }
        });

        tapZone.addEventListener('touchend', () => {
            img.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
        });

        function createPop(x, y) {
            const d = document.createElement('div');
            d.className = 'pop'; d.innerText = '+1';
            d.style.left = (x - 20) + 'px'; d.style.top = (y - 40) + 'px';
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 600);
        }

        setInterval(() => { if(en < 2000) { en = Math.min(2000, en + 1.5); updateUI(); } }, 1000);
    </script>
</body>
</html>

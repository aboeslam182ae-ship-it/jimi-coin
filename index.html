<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonic Multi-Tap</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: Arial, sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; user-select: none; -webkit-user-select: none; }
        .score-container { font-size: 70px; font-weight: bold; color: #00bcff; text-shadow: 0 0 20px #00bcff; margin-bottom: 20px; pointer-events: none; }
        .character-container { width: 280px; height: 280px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.05s ease; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .character-container:active { transform: scale(0.9) translateY(-10px); }
        img { width: 100%; height: auto; pointer-events: none; }
    </style>
</head>
<body>
    <div class="score-container" id="score">0</div>
    
    <div class="character-container" id="sonicArea">
        <img src="https://assets.stickpng.com/images/580b57fbd9996e24bc43bd32.png" alt="Sonic">
    </div>

    <script>
        let count = parseInt(localStorage.getItem('jimiScore')) || 0;
        const scoreElement = document.getElementById('score');
        const sonicArea = document.getElementById('sonicArea');
        scoreElement.innerText = count;

        // وظيفة الزيادة (تستجيب لكل إصبع)
        function handleTap(e) {
            e.preventDefault(); // يمنع الزووم والتعليق
            
            // تحديد عدد الأصابع التي لمست الشاشة الآن
            let touches = e.changedTouches ? e.changedTouches.length : 1;
            
            count += touches;
            scoreElement.innerText = count;
            localStorage.setItem('jimiScore', count);
            
            if (navigator.vibrate) { navigator.vibrate(10); }
        }

        // الاستماع للمسات المتعددة
        sonicArea.addEventListener('touchstart', handleTap, {passive: false});
    </script>
</body>
</html>

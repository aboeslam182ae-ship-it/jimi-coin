<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Jimi Coin Pro</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<style>
* { 
box-sizing: border-box; 
margin: 0; 
padding: 0; 
user-select: none; 
-webkit-tap-highlight-color: transparent; 
touch-action: manipulation; 
}
body { 
background-color: #000; 
color: #fff; 
font-family: sans-serif; 
overflow: hidden; 
height: 100vh; 
}
/* الهيدر */
.header { 
text-align: center; 
padding: 15px; 
background: #000; 
border-bottom: 1px solid #222; 
}
#main-balance { 
font-size: 45px; 
font-weight: 900; 
}
.profit-info { 
color: #FFD700; 
font-size: 13px; 
}
/* الصفحات */
.page { 
display: none; 
height: calc(100vh - 180px); 
width: 100%; 
flex-direction: column; 
align-items: center; 
overflow-y: auto; 
}
.page-active { 
display: flex !important; 
}
/* زر العملة */
#coin-click { 
width: 260px; 
height: 260px; 
border-radius: 50%; 
border: 8px solid #cd7f32; 
background: #111 url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png') center/cover; 
box-shadow: 0 0 40px rgba(205, 127, 50, 0.4); 
margin-top: 50px; 
flex-shrink: 0; 
transition: transform 0.05s;
}
#coin-click:active { 
transform: scale(0.95); 
}
/* استعادة شريط الطاقة النحيف مع أيقونة البطارية */
.energy-wrapper { 
width: 85%; 
margin-top: 40px; 
}
.energy-bar-container { 
width: 100%; 
height: 26px; 
background: #000; 
border-radius: 6px; 
position: relative; 
border: 1px solid #3d2b1f; 
overflow: hidden; 
display: flex; 
align-items: center; 
padding: 2px; 
}
#energy-fill { 
position: absolute; 
right: 30px; 
height: calc(100% - 4px); 
background: #5bc0de; 
width: 100%; 
z-index: 1; 
border-radius: 2px; 
transition: width 0.3s ease; 
}
.battery-box { 
width: 26px; 
height: 100%; 
background: linear-gradient(to bottom, #5bc0de, #2e6da4); 
border-radius: 3px; 
display: flex; 
align-items: center; 
justify-content: center; 
z-index: 5; 
}
.bolt-icon { 
color: #FFFF00; 
font-size: 14px; 
font-weight: bold; 
}
#energy-num { 
position: absolute; 
width: 100%; 
text-align: center; 
left: 0; 
font-weight: bold; 
font-size: 13px; 
color: #fff; 
z-index: 10; 
text-shadow: 1px 1px 2px #000; 
}
/* تأثير النقرات +1 */
.plus-one { 
position: absolute; 
color: #FFD700; 
font-size: 35px; 
font-weight: 900; 
pointer-events: none; 
animation: floatUp 0.8s ease-out forwards; 
z-index: 1000; 
}
@keyframes floatUp { 
0% { opacity: 1; transform: translateY(0); } 
100% { opacity: 0; transform: translateY(-150px); } 
}
/* صفحة المكتب والكروت */
.cards-grid { 
display: grid; 
grid-template-columns: 1fr 1fr; 
gap: 12px; 
padding: 15px; 
width: 100%; 
}
.card-item { 
background: #151515; 
border: 1px solid #333; 
border-radius: 12px; 
overflow: hidden; 
display: flex; 
flex-direction: column; 
height: 240px; 
cursor: pointer;
}
.card-img { 
width: 100%; 
height: 140px; 
background-size: cover; 
background-position: center; 
border-bottom: 1px solid #222;
}
.card-info { 
padding: 8px; 
text-align: center; 
flex-grow: 1; 
display: flex; 
flex-direction: column; 
justify-content: space-around;
}
.buy-btn { 
background: #FFD700; 
color: #000; 
border: none; 
border-radius: 4px; 
font-weight: bold; 
padding: 4px 0; 
font-size: 12px;
}
/* القائمة السفلية */
.footer-nav { 
position: fixed; 
bottom: 0; 
width: 100%; 
height: 85px; 
background: #080808; 
display: flex; 
border-top: 1px solid #222; 
}
.nav-item { 
flex: 1; 
display: flex; 
flex-direction: column; 
align-items: center; 
justify-content: center; 
opacity: 0.5; 
}
.nav-active { 
opacity: 1; 
color: #FFD700; 
}
</style>
</head>
<body onload="initApp()">

<div class="header">
<div id="main-balance">0</div>
<div class="profit-info">💰 +<span id="pph-display">0</span>/ساعة</div>
</div>

<div id="tab-tap" class="page page-active">
<div id="coin-click"></div>
<div class="energy-wrapper">
<div class="energy-bar-container">
<div id="energy-num">1000 / 1000</div>
<div class="battery-box"><span class="bolt-icon">⚡</span></div>
<div id="energy-fill"></div>
</div>
</div>
</div>

<div id="tab-office" class="page">
<div class="cards-grid">
    <div class="card-item" onclick="buyCard(2500, 500)">
        <div class="card-img" style="background-image: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/jolti_king.png');"></div>
        <div class="card-info">
            <div style="font-weight:bold; font-size:14px;">ملك الطاقة</div>
            <div style="color:#FFD700; font-size:11px;">+500/ساعة</div>
            <button class="buy-btn">شراء: 2,500</button>
        </div>
    </div>
</div>
</div>

<div id="tab-mine" class="page">
<h2 style="margin-top:50px">سوق التعدين قريباً</h2>
</div>

<nav class="footer-nav">
<div class="nav-item" onclick="switchTab('mine', this)"><span>⛏️</span><span>تعدين</span></div>
<div class="nav-item" onclick="switchTab('office', this)"><span>🛋️</span><span>مكتب</span></div>
<div class="nav-item nav-active" onclick="switchTab('tap', this)"><span>💰</span><span>نقر</span></div>
</nav>

<script>
let score = 0;
let pph = 0;
let energy = 1000;
const maxEnergy = 1000;

function initApp() {
    setInterval(() => {
        if(pph > 0) score += (pph / 3600);
        if(energy < maxEnergy) energy = Math.min(maxEnergy, energy + 1.5);
        updateUI();
    }, 1000);
}

function updateUI() {
    document.getElementById('main-balance').innerText = Math.floor(score).toLocaleString();
    document.getElementById('pph-display').innerText = Math.floor(pph).toLocaleString();
    document.getElementById('energy-num').innerText = `${Math.floor(energy)} / ${maxEnergy}`;
    document.getElementById('energy-fill').style.width = (energy / maxEnergy * 100) + "%";
}

// ميزة تعدد الأصابع واستعادة تأثير +1
document.getElementById('coin-click').addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touches = e.changedTouches;
    for(let i = 0; i < touches.length; i++) {
        if(energy >= 1) {
            score++;
            energy--;
            createPlusOne(touches[i].pageX, touches[i].pageY);
        }
    }
    updateUI();
    if(window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
});

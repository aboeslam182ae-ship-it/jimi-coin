<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin Pro</title>
    <style>
        /* --- GLOBAL RESET --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none; /* Disables browser gestures for smooth multi-touch */
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- LOADER SCREEN --- */
        #loader-screen {
            position: fixed;
            inset: 0;
            background-color: #000000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 100px;
        }

        #load-percent {
            font-size: 38px;
            font-weight: 800;
            color: #FFD700;
            margin-bottom: 12px;
        }

        .bar-outer {
            width: 220px;
            height: 7px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
        }

        #bar-inner {
            width: 0%;
            height: 100%;
            background-color: #FFD700;
        }

        /* --- PAGE SYSTEM --- */
        .page {
            display: none;
            height: 100vh;
            width: 100%;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .page-active {
            display: flex !important;
        }

        /* --- TAP PAGE STYLES --- */
        #main-balance {
            font-size: 60px;
            font-weight: 800;
            margin-top: 20px;
        }

        #level-label {
            font-size: 14px;
            margin-bottom: 40px;
            font-weight: bold;
            transition: color 0.3s;
        }

        #coin-container {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #coin-click {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 6px solid #cd7f32;
            background-image: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png');
            background-size: cover;
            background-position: center;
            z-index: 5;
            transition: transform 0.05s, border 0.5s;
        }

        .plus-one {
            position: absolute;
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            animation: moveUp 0.7s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes moveUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-120px); }
        }

        /* --- ENERGY STYLES --- */
        .energy-container {
            width: 85%;
            margin-top: 40px;
        }

        .energy-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        #energy-text {
            font-size: 14px;
            font-weight: bold;
        }

        .energy-bar-bg {
            width: 100%;
            height: 12px;
            background-color: #1a1a1a;
            border-radius: 10px;
            border: 1px solid #333;
            overflow: hidden;
        }

        #energy-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            transition: width 0.1s;
        }

        /* --- TASKS PAGE STYLES --- */
        .page-title {
            font-size: 28px;
            font-weight: 800;
            color: #FFD700;
            margin-bottom: 25px;
        }

        .task-list {
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-item {
            background-color: #111;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #222;
        }

        .task-btn {
            background-color: #FFD700;
            color: #000;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
        }

        /* --- LEADERBOARD STYLES --- */
        .list-container {
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .player-card {
            background-color: #111;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #222;
        }

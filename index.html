<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jimi Coin - Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffcc00; --soft-white: #f0f0f0; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; overflow-x: hidden; text-align: center; }
        
        /* القسم العلوي */
        .header-text { margin-top: 15px; font-weight: bold; }
        .hit-text { color: var(--gold); font-size: 22px; display: block; letter-spacing: 1px; }
        .info-text { font-size: 13px; color: #bbb; margin-top: 8px; display: block; }

        /* مواقع التواصل */
        .social-icons { margin: 15px 0; display: flex; justify-content: center; gap: 25px; font-size: 26px; }
        .social-icons i { color: #fff; cursor: pointer; transition: 0.3s; }
        .social-icons i:hover { color: var(--gold); }

        /* شريط المستوى المتطور */
        .level-container { width: 90%; margin: 20px auto; display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; }
        .mini-jaguar { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--gold); }
        .progress-wrapper { flex-grow: 1; text-align: right; }
        .progress-bar { width: 100%; height: 14px; background: #222; border-radius: 10px; border: 1px solid var(--soft-white); overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(to right, #ffcc00, #ff9900); width: 30%; transition: width 0.5s; }
        .level-stats { font-size: 11px; color: #ccc; margin-top: 6px; display: flex; justify-content: space-between; padding: 0 2px; }

        /* الملف الشخصي */
        .profile-section { margin: 25px 0; }
        .user-avatar { width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--gold); cursor: pointer; box-shadow: 0 0 15px rgba(255, 204, 0, 0.3); }
        .level-name { display: block; color: var(--gold); font-size: 15px; margin-top: 8px; font-weight: bold; }

        /* العملة الكبيرة */
        .main-coin { width: 210px; margin: 10px auto; cursor: pointer; transition: 0.1s; -webkit-tap-highlight-color: transparent; }
        .main-coin:active { transform: scale(0.92); }

        /* المودال (المربعات المنبثقة) */
        .modal { display: none; position: fixed; top: 15%; left: 5%; right: 5%; background: #111; border: 2px solid var(--gold); border-radius: 25px; padding: 25px; z-index: 100; }
        .modal-img { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .btn-invite { background: var(--gold); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: bold; font-size: 16px; width: 100%; cursor: pointer; margin-top: 10px; }
        
        .friends-list { margin-top: 20px; text-align: right; max-height: 120px; overflow-y: auto; background: #000; padding: 10px; border-radius: 10px; }
        .friend-item { padding: 8px 0; border-bottom: 1px solid #222; font-size: 13px; color: #eee; }
        .close-btn { position: absolute; top: 12px; left: 15px; background: none; border: none; color: #777; font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-text">
        <span class="hit-text">GREAT NEW HIT</span>
        <span class="info-text">More info on our official channels</span>
    </div>

    <div class="social-icons">
        <i class="fab fa-telegram" onclick="window.open('https://t.me/yourchannel')"></i>
        <i class="fab fa-youtube" onclick="window.open('https://youtube.com')"></i>
        <i class="fab fa-x-twitter" onclick="window.open('https://x.com')"></i>
    </div>

    <div class="level-container">
        <img src="https://i.ibb.co/L6M7XmF/DALL-E-2025-10-27-21-44-33-A-realistic-cinematic-portrait-of-a-fierce-jaguar-made-of-solid-polished.webp" class="mini-jaguar">
        <div class="progress-wrapper">
            <div class="progress-bar">
                <div class="progress-fill" id="p-fill"></div>
            </div>
            <div class="level-stats">
                <span id="next-level-info">باقي 3500 للمستوى التالي</span>
                <span id="current-pts">1500 / 5000</span>
            </div>
        </div>
    </div>

    <div class="profile-section">
        <img src="https://via.placeholder.com/85" class="user-avatar" id="profileBtn" alt="User">
        <span class="level-name">LEVEL: BRONZE</span>
    </div>

    <img src="https://i.ibb.co/L6M7XmF/DALL-E-2025-10-27-21-44-33-A-realistic-cinematic-portrait-of-a-fierce-jaguar-made-of-solid-polished.webp" class="main-coin" id="mainCoin">

    <div id="friendsModal" class="modal">
        <button class="close-btn" onclick="closeM('friendsModal')">✕</button>
        <img src="https://i.ibb.co/L6M7XmF/DALL-E-2025-10-27-21-44-33-A-realistic-cinematic-portrait-of-a-fierce-jaguar-made-of-solid-polished.webp" class="modal-img">
        <h2 style="color:var(--gold); margin:0;">FRIENDS</h2>
        <button class="btn-invite" onclick="openInvite()">انقر لعرض الدعوة</button>
    </div>

    <div id="inviteModal" class="modal">
        <button class="close-btn" onclick="closeM('inviteModal')">✕</button>
        <img src="https://i.ibb.co/F4Zp8mX/DALL-E-2024-04-22-Jaguars-shaking-hands.webp" class="modal-img">
        <h2 style="color:var(--gold); margin:0;">INVITE</h2>
        <button class="btn-invite">
            <i class="fas fa-link"></i> نسخ رابط الدعوة
        </button>
        <div class="friends-list">
            <div style="color:var(--gold); font-size:12px; margin-bottom:5px;">الأصدقاء المدعوين:</div>
            <div class="friend-item">1. محمد كوجا</div>
            <div class="friend-item">2. أحمد علي</div>
        </div>
    </div>

    <script>
        let balance = 1500;
        let maxLevel = 5000;

        // وظائف المودال
        document.getElementById('profileBtn').onclick = () => document.getElementById('friendsModal').style.display = 'block';
        function openInvite() { closeM('friendsModal'); document.getElementById('inviteModal').style.display = 'block'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        // وظيفة النقر
        document.getElementById('mainCoin').onclick = () => {
            balance += 3;
            updateUI();
        };

        function updateUI() {
            document.getElementById('current-pts').innerText = `${balance.toLocaleString()} / ${maxLevel.toLocaleString()}`;
            let needed = maxLevel - balance;
            document.getElementById('next-level-info').innerText = needed > 0 ? `باقي ${needed.toLocaleString()} للمستوى التالي` : "وصلت للحد الأقصى!";
            let percent = Math.min((balance / maxLevel) * 100, 100);
            document.getElementById('p-fill').style.width = percent + "%";
        }

        updateUI();
    </script>
</body>
</html>

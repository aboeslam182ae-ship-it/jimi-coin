<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin Pro</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        body { 
            background: #0c1a33; 
            color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; 
        }

        /* الجزء العلوي: الرقم فقط */
        .header { text-align: center; padding: 45px 15px 10px 15px; }
        #main-balance { font-size: 60px; font-weight: 900; text-shadow: 0 5px 15px rgba(0,0,0,0.6); color: #fff; }
        .profit-info { color: #FFD700; font-size: 16px; font-weight: bold; margin-top: -5px; }

        /* منطقة اللعب: الجولتي والمنصة في المنتصف */
        .page { display: flex; height: calc(100vh - 180px); width: 100%; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        /* الشاشة الزرقاء خلف الشخصية */
        .glow-effect {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #2a5298 0%, rgba(12,26,51,0) 70%);
            z-index: 0;
        }

        .character-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
            transition: transform 0.1s ease-out;
            cursor: pointer;
        }

        /* وضع رابط صورتك للجولتي هنا */
        .jolt-img {
            width: 280px;
            height: 280px;
            background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/jolt_pockets.png') center/contain no-repeat;
        }

        /* المنصة */
        .platform {
            width: 220px;
            height: 20px;
            background: linear-gradient(180deg, #444 0%, #111 100%);
            border-radius: 50% / 10px;
            margin-top: -20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* حركة النزول عند الضغط */
        .character-container:active { transform: translateY(12px); }

        /* شريط الطاقة */
        .energy-wrapper { width: 85%; margin-top: auto; margin-bottom: 110px; z-index: 10; }
        .energy-bar-container { 
            width: 100%; height: 22px; background: rgba(0,0,0,0.6); 
            border-radius: 11px; position: relative; border: 1px solid rgba(255,255,255,0.15); 
            overflow: hidden; display: flex; align-items: center; 
        }
        #energy-fill { position: absolute; right: 0; height: 100%; background: linear-gradient(90deg, #4da3ff, #2159ff); width: 100%; transition: width 0.3s; }
        #energy-num { position: absolute; width: 100%; text-align: center; font-weight: bold; font-size: 11px; z-index: 10; text-shadow: 1px 1px 2px #000; }

        /* الأزرار السفلية */
        .footer-nav { position: fixed; bottom: 0; width: 100%; height: 90px; background: rgba(10, 26, 61, 0.98); display: flex; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.4; color: #fff; }
        .nav-active { opacity: 1; color: #FFD700; }
        .nav-item span:first-child { font-size: 26px; }
        .nav-item span:last-child { font-size: 13px; font-weight: bold; }

        .plus-one { position: absolute; color: #FFD700; font-size: 38px; font-weight: 900; animation: floatUp 0.8s forwards; pointer-events: none; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-140px); } }
    </style>
</head>
<body onload="initApp()">

    <div class="header">
        <div id="main-balance">0</div>
        <div class="profit-info">💰 +<span id="pph-display">0</span>/ساعة</div>
    </div>

    <div class="page">
        <div class="glow-effect"></div>
        <div class="character-container" id="tap-area">
            <div class="jolt-img"></div>
            <div class="platform"></div>
        </div>

        <div class="energy-wrapper">
            <div class="energy-bar-container">
                <div id="energy-num">1000 / 1000</div>
                <div id="energy-fill"></div>
            </div>
        </div>
    </div>

    <nav class="footer-nav">
        <div class="nav-item"><span>⛏️</span><span>تعدين</span></div>
        <div class="nav-item"><span>🛋️</span><span>مكتب</span></div>
        <div class="nav-item nav-active"><span>💰</span><span>نقر</span></div>
    </nav>

<script>
    // ضع إعدادات الـ Firebase الخاصة بك هنا
    const firebaseConfig = {
        apiKey: "AIzaSyDAf1rFiwTwZmEkWv6ykgr2msEmIaOELs",
        authDomain: "jolt-coin.firebaseapp.com",
        databaseURL: "https://jolt-coin-default-rtdb.firebaseio.com",
        projectId: "jolt-coin",
        appId: "1:523210485636:web:30a3f782afdbddfb4037d1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userId = window.Telegram.WebApp.initDataUnsafe.user ? window.Telegram.WebApp.initDataUnsafe.user.id : "dev_user";

    let score = 0; let energy = 1000; const maxEnergy = 1000;

    function initApp() {
        db.ref('users/' + userId).once('value', (s) => {
            const d = s.val();
            if(d) { score = d.score || 0; energy = d.energy || 1000; }
            updateUI();
        });
        setInterval(() => {
            if(energy < maxEnergy) energy = Math.min(maxEnergy, energy + 1.5);
            updateUI();
        }, 1000);
        setInterval(() => db.ref('users/' + userId).update({ score, energy, lastUpdate: Date.now() }), 7000);
    }

    function updateUI() {
        document.getElementById('main-balance').innerText = Math.floor(score).toLocaleString();
        document.getElementById('energy-num').innerText = `${Math.floor(energy)} / ${maxEnergy}`;
        document.getElementById('energy-fill').style.width = (energy / maxEnergy * 100) + "%";
    }

    document.getElementById('tap-area').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(energy >= 1) {
            score++; energy--;
            createAnim(e.touches[0].pageX, e.touches[0].pageY);
            updateUI();
            if(window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }
    });

    function createAnim(x, y) {
        const el = document.createElement('div'); el.className = 'plus-one'; el.innerText = '+1';
        el.style.left = x + 'px'; el.style.top = (y - 50) + 'px';
        document.body.appendChild(el); setTimeout(() => el.remove(), 800);
    }
</script>
</body>
</html>

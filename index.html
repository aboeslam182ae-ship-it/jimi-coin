<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin - Optimized</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background: #0c1a33; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        /* الخلفية المدمجة الكاملة */
        .game-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0c1a33 url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/jolt-bg.png') center/cover no-repeat;
            z-index: -1;
        }

        .header { text-align: center; padding: 60px 15px 10px; position: relative; z-index: 10; }
        #main-balance { font-size: 55px; font-weight: 900; text-shadow: 2px 2px 10px #000; }

        .play-area {
            height: 55vh; display: flex; justify-content: center; align-items: center; position: relative;
        }

        /* حاوية النقر بنمط الهامستر المطور */
        .click-target {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
            background: transparent;
        }

        .click-target:active {
            transform: scale(0.92) translateY(8px);
        }

        /* الجولتي - تم مطابقة الرابط مع GitHub بالضبط */
        .jolt-model {
            width: 280px;
            height: 350px;
            background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/Jolt_pockets-png') center/contain no-repeat;
            z-index: 5;
            margin-bottom: -55px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
        }

        /* المنصة المسطحة المدمجة في الأرضية */
        .flat-base {
            width: 260px;
            height: 45px;
            background: radial-gradient(circle, rgba(0,242,254,1) 0%, rgba(0,78,146,0.6) 100%);
            border-radius: 50%;
            border: 3px solid rgba(79,172,254,0.4);
            box-shadow: 0 8px 20px rgba(0,0,0,0.7);
            z-index: 4;
            transform: perspective(500px) rotateX(25deg);
        }

        /* شريط الطاقة - أرقام صحيحة وتصميم نظيف */
        .energy-section { position: fixed; bottom: 100px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .energy-bar-bg { width: 85%; height: 18px; background: rgba(0,0,0,0.6); border-radius: 10px; border: 1px solid #4facfe; overflow: hidden; position: relative; }
        #energy-fill { position: absolute; right: 0; height: 100%; background: #00f2fe; transition: width 0.3s; }
        #energy-info { margin-top: 8px; font-weight: bold; color: #00f2fe; text-shadow: 1px 1px 2px #000; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: #07132e; display: flex; border-top: 1px solid #1e4a9e; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.6; color: #fff; font-size: 12px; }
        .nav-item.active { opacity: 1; color: #FFD700; }

        .tap-anim { position: absolute; color: #fff; font-size: 45px; font-weight: 900; animation: floatUp 0.8s forwards; pointer-events: none; z-index: 100; text-shadow: 0 0 10px #00f2fe; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px); } }
    </style>
</head>
<body onload="init()">

    <div class="game-bg"></div>

    <div class="header">
        <div id="main-balance">0</div>
    </div>

    <div class="play-area">
        <div class="click-target" id="tap-target">
            <div class="jolt-model"></div>
            <div class="flat-base"></div>
        </div>
    </div>

    <div class="energy-section">
        <div class="energy-bar-bg">
            <div id="energy-fill"></div>
        </div>
        <div id="energy-info">1000 / 1000</div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item"><i>🏠</i>مكتب</div>
        <div class="nav-item active"><i>💰</i>نقر</div>
        <div class="nav-item"><i>⛏️</i>تعدين</div>
    </nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAf1rFiwTwZmEkWv6ykgr2msEmIaOELs",
        authDomain: "jolt-coin.firebaseapp.com",
        databaseURL: "https://jolt-coin-default-rtdb.firebaseio.com",
        projectId: "jolt-coin",
        appId: "1:523210485636:web:30a3f782afdbddfb4037d1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userId = window.Telegram.WebApp.initDataUnsafe.user ? window.Telegram.WebApp.initDataUnsafe.user.id : "dev_user";

    let bal = 0; let nrg = 1000;

    function init() {
        db.ref('users/' + userId).once('value', (s) => {
            if(s.val()) { bal = s.val().score || 0; nrg = s.val().energy || 1000; }
            sync();
        });
        setInterval(() => { if(nrg < 1000) { nrg += 1.5; sync(); } }, 1000);
        setInterval(() => db.ref('users/' + userId).update({ score: bal, energy: Math.floor(nrg) }), 4000);
    }

    function sync() {
        document.getElementById('main-balance').innerText = Math.floor(bal).toLocaleString();
        document.getElementById('energy-info').innerText = `${Math.floor(nrg)} / 1000`;
        document.getElementById('energy-fill').style.width = (nrg/10) + "%";
    }

    document.getElementById('tap-target').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(nrg >= 1) {
            bal++; nrg--; sync();
            const t = e.touches[0];
            const p = document.createElement('div');
            p.className = 'tap-anim'; p.innerText = '+1';
            p.style.left = t.pageX + 'px'; p.style.top = t.pageY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
            if(window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }
    });
</script>
</body>
</html>

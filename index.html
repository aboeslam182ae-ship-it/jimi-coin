<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hamster Kombat Clone - Tapping Mechanism</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- 1. تنسيقات عامة للصفحة الأساسية --- */
        :root {
            --bg-color: #0c1a33; /* لون الخلفية الأزرق الداكن */
            --main-blue: #2a5298; /* لون الشاشة الزرقاء خلف الهامستر */
            --text-color: #ffffff;
            --gold-color: #f39c12;
            --hamster-size: 150px;
            --platform-height: 20px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* منع التمرير */
            display: flex;
            justify-content: center;
            height: 100vh;
            user-select: none; /* منع تحديد النص */
            -webkit-tap-highlight-color: transparent; /* منع وميض النقر على الموبايل */
        }

        /* حاوية اللعبة الرئيسية (محاكاة شاشة موبايل) */
        #game-container {
            width: 100%;
            max-width: 420px; /* أقصى عرض ليتناسب مع الهواتف */
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            box-sizing: border-box;
            padding: 20px;
        }

        /* --- 2. الجزء العلوي: العدادات والنقاط --- */
        .header {
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        .score-container {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: var(--gold-color);
        }

        .coin-icon {
            width: 35px;
            height: 35px;
            background-color: var(--gold-color);
            border-radius: 50%;
            margin-left: 10px;
            box-shadow: 0 0 10px rgba(243, 156, 18, 0.5);
        }

        /* --- 3. الجزء الأوسط: منطقة اللعب (الهامستر والمنصة) --- */
        .game-play-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            /* الشاشة الزرقاء خلف الهامستر */
            background: radial-gradient(circle, var(--main-blue) 0%, rgba(12,26,51,0) 70%);
            border-radius: 50%; /* لجعلها شاشة دائرية خلفه */
        }

        /* حاوية تجميع الهامستر مع المنصة لسهولة التحريك */
        .hamster-mechanic-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* أهم خاصية للتحريك: الانتقال السلس */
            transition: transform 0.1s ease-out; 
            cursor: pointer;
            width: calc(var(--hamster-size) + 40px);
            text-align: center;
        }

        /* صورة الهامستر (يمكنك استبدالها برابط صورتك) */
        .hamster-image {
            width: var(--hamster-size);
            height: var(--hamster-size);
            background-image: url('https://raw.githubusercontent.com/HamaTech/Hamster-Kombat-Clone/main/images/hamster-ceo.png'); /* رابط مؤقت */
            background-size: cover;
            background-position: center;
            z-index: 2;
            pointer-events: none; /* لضمان أن النقر يتم على الحاوية بالكامل */
        }

        /* المنصة (القاعدة) */
        .platform {
            width: 100%;
            height: var(--platform-height);
            background: linear-gradient(180deg, #555 0%, #222 100%);
            border-radius: 10px;
            margin-top: -10px; /* لتقريبها من قدم الهامستر */
            z-index: 1;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* --- الكلاس الذي يتم إضافته بـ JS عند الضغط --- */
        .hamster-mechanic-wrapper.active {
            transform: translateY(10px); /* نزول الحاوية بالكامل (الهامستر والمنصة) للأسفل */
        }

        /* --- 4. الجزء السفلي: الطاقة --- */
        .footer {
            margin-top: auto;
            text-align: center;
            padding-bottom: 20px;
            z-index: 10;
        }

        .energy-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
        }

        .energy-bar-bg {
            flex: 1;
            height: 10px;
            background-color: #444;
            border-radius: 5px;
            margin: 0 15px;
            overflow: hidden;
        }

        #energy-fill {
            height: 100%;
            background-color: #2ecc71; /* لون الطاقة الأخضر */
            width: 100%; /* يبدأ ممتلئاً */
            transition: width 0.2s ease;
        }

        /* تحريك النقاط +1 */
        .point-animation {
            position: absolute;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            animation: fadeUp 1s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes fadeUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }

    </style>
</head>
<body>

    <div id="game-container">
        <div class="header">
            <div>الرصيد الحالي</div>
            <div class="score-container">
                <span id="score">0</span>
                <div class="coin-icon"></div>
            </div>
        </div>

        <div class="game-play-area">
            <div class="hamster-mechanic-wrapper" id="hamster-trigger">
                <div class="hamster-image"></div>
                <div class="platform"></div>
            </div>
        </div>

        <div class="footer">
            <div class="energy-container">
                <span>⚡ <span id="energy-text">1000/1000</span></span>
                <div class="energy-bar-bg">
                    <div id="energy-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- متغيرات اللعبة الأساسية ---
        let score = 0;
        let energy = 1000;
        const maxEnergy = 1000;
        const pointsPerTap = 1; // كم نقطة لكل نقرة
        const energyCostPerTap = 1; // كم تستهلك كل نقرة من الطاقة

        // --- عناصر واجهة المستخدم (DOM) ---
        const scoreElement = document.getElementById('score');
        const energyFillElement = document.getElementById('energy-fill');
        const energyTextElement = document.getElementById('energy-text');
        const hamsterTrigger = document.getElementById('hamster-trigger');
        const gamePlayArea = document.querySelector('.game-play-area');

        // --- وظيفة تجميع النقاط والتحريك ---
        function handleTap(e) {
            // التحقق من وجود طاقة كافية
            if (energy < energyCostPerTap) {
                // يمكنك إضافة تأثير بصري هنا ليدل على نفاد الطاقة
                return;
            }

            // 1. منطق النقاط
            score += pointsPerTap;
            energy -= energyCostPerTap;

            // 2. تحديث الواجهة (النقاط والطاقة)
            updateUI();

            // 3. التحريك البصري: إضافة كلاس 'active' لجعل المنصة تنزل
            hamsterTrigger.classList.add('active');

            // إزالة الكلاس بعد فترة قصيرة جداً ليعود لوضعه الأصلي (تأثير النبض)
            setTimeout(() => {
                hamsterTrigger.classList.remove('active');
            }, 100); // 100 ميلي ثانية

            // 4. تحريك رقم +1 في مكان النقر (اختياري)
            createPointAnimation(e);
        }

        // تحديث النص والرصيد في الشاشة
        function updateUI() {
            scoreElement.innerText = score.toLocaleString(); // تنسيق الرقم مع فواصل
            energyTextElement.innerText = `${energy}/${maxEnergy}`;
            
            // تحديث عرض شريط الطاقة كنسبة مئوية
            const energyPercentage = (energy / maxEnergy) * 100;
            energyFillElement.style.width = `${energyPercentage}%`;
        }

        // إنشاء تأثير رقم النقاط المتطاير (+1)
        function createPointAnimation(e) {
            const point = document.createElement('div');
            point.classList.add('point-animation');
            point.innerText = `+${pointsPerTap}`;

            // تحديد مكان النقر (سواء بالماوس أو اللمس)
            let x, y;
            if (e.touches) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
            } else {
                x = e.clientX;
                y = e.clientY;
            }

            point.style.left = `${x - 20}px`; // توسيع الرقم قليلاً
            point.style.top = `${y - 20}px`;

            document.body.appendChild(point);

            // حذف العنصر بعد انتهاء التحريك
            setTimeout(() => {
                point.remove();
            }, 1000);
        }

        // --- مستمعي الأحداث (Event Listeners) ---
        // استخدام touchstart للهواتف لسرعة الاستجابة، و mousedown للكمبيوتر
        hamsterTrigger.addEventListener('touchstart', (e) => {
            e.preventDefault(); // منع سلوك اللمس الافتراضي
            handleTap(e);
        });

        hamsterTrigger.addEventListener('mousedown', handleTap);

        // --- وظيفة شحن الطاقة تلقائياً (كل ثانية) ---
        setInterval(() => {
            if (energy < maxEnergy) {
                energy = Math.min(maxEnergy, energy + 1); // شحن بنسبة 1 في الثانية
                updateUI();
            }
        }, 1000);

        // -- تهيئة تلجرام (إذا لزم الأمر) --
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand(); // توسيع التطبيق ليشمل الشاشة كاملة
        }

        // تحديث مبدئي للواجهة
        updateUI();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Final</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; }

        /* شاشة التحميل */
        #loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #loader img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8; z-index: -1; }
        .bar-o { width: 200px; height: 10px; background: rgba(0,0,0,0.5); border-radius: 10px; border: 1px solid gold; margin-top: 320px; overflow: hidden; }
        #bar-i { width: 0%; height: 100%; background: gold; }

        /* الصفحات */
        .page { display: none; height: 100vh; flex-direction: column; align-items: center; padding-top: 30px; }
        .active { display: flex !important; }

        .score { font-size: 70px; color: gold; font-weight: bold; margin: 0; font-variant-numeric: tabular-nums; }

        /* العملة */
        #tap-area { 
            width: 260px; height: 260px; margin-top: 30px; border-radius: 50%;
            border: 4px solid gold; box-shadow: 0 0 20px gold;
            background: #111 url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png') center/115% no-repeat;
        }

        /* الأزرار - رفعناها للأعلى لضمان اللمس */
        .nav { 
            position: fixed; bottom: 40px; left: 10px; right: 10px; height: 70px; 
            background: #111; display: flex; z-index: 100000; border-radius: 15px; border: 1px solid #444;
        }
        .nav-i { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 14px; font-weight: bold; }
        .nav-i.on { color: gold; }

        .pop { position: absolute; color: #00d2ff; font-size: 40px; font-weight: bold; animation: up 0.5s forwards; pointer-events: none; }
        @keyframes up { to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body onload="start()">

    <div id="loader">
        <img src="https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/splash.png">
        <h1 id="pct" style="color:gold">0%</h1>
        <div class="bar-o"><div id="bar-i"></div></div>
    </div>

    <div id="p-tap" class="page active">
        <div id="sc" class="score">0</div>
        <div id="tap-area"></div>
        <div style="margin-top:20px; color:#00d2ff">⚡ ENERGY: <span id="ev">2000</span></div>
    </div>

    <div id="p-lead" class="page">
        <h2 style="color:gold">LEADERS</h2>
        <p>Your Rank: #3</p>
    </div>

    <div class="nav">
        <div class="nav-i on" onclick="go('tap', this)">💰 TAP</div>
        <div class="nav-i" onclick="go('lead', this)">🏆 LEADERS</div>
    </div>

    <script>
        let s = parseInt(localStorage.getItem('js')) || 0;
        let e = 2000;

        function start() {
            let p = 0;
            let itv = setInterval(() => {
                p += 10;
                document.getElementById('bar-i').style.width = p + "%";
                document.getElementById('pct').innerText = p + "%";
                if(p >= 100) { clearInterval(itv); document.getElementById('loader').style.display='none'; upd(); }
            }, 40);
        }

        function go(id, el) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-i').forEach(ni => ni.classList.remove('on'));
            document.getElementById('p-' + id).classList.add('active');
            el.classList.add('on');
        }

        function upd() {
            document.getElementById('sc').innerText = s.toLocaleString('en-US');
            document.getElementById('ev').innerText = e;
        }

        document.getElementById('tap-area').addEventListener('touchstart', (ev) => {
            ev.preventDefault();
            s++; upd();
            localStorage.setItem('js', s);
            let t = ev.touches[0];
            let n = document.createElement('div');
            n.className = 'pop'; n.innerText = '+1';
            n.style.left = t.pageX + 'px'; n.style.top = t.pageY + 'px';
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 500);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin - Ultimate Evolution</title>
    <style>
        /* --- 1. GLOBAL RESET & BASE (Line 10+) --- */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            touch-action: none; 
        }
        
        body { 
            background: #000; 
            color: #fff; 
            margin: 0; 
            font-family: 'Roboto', sans-serif; 
            overflow: hidden; 
            text-align: center; 
        }

        /* --- 2. LOADER COMPONENT (Line 30+) --- */
        #loader { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 99999; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-end; 
            padding-bottom: 25%; 
        }
        
        #loader-bg { 
            position: absolute; 
            inset: 0; 
            background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/splash.png') center/cover no-repeat; 
            opacity: 0.7; 
            z-index: -1; 
        }
        
        #pct { color: gold; font-size: 34px; font-weight: bold; margin-bottom: 12px; }
        .bar-o { width: 240px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 20px; border: 1px solid gold; overflow: hidden; }
        #bar-i { width: 0%; height: 100%; background: gold; transition: width 0.1s; }

        /* --- 3. PAGE SYSTEM (Line 55+) --- */
        .page { 
            display: none; 
            height: 100vh; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 50px; 
            padding-bottom: 120px;
            overflow-y: auto;
        }
        .active { display: flex !important; }

        /* --- 4. TAP PAGE UI (Line 70+) --- */
        .score-container { margin-bottom: 10px; }
        .score { font-size: 75px; color: gold; font-weight: bold; margin: 0; text-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .level-badge { color: #00d2ff; font-weight: bold; letter-spacing: 2px; font-size: 14px; margin-bottom: 20px; }
        
        #tap-area { 
            width: 270px; 
            height: 270px; 
            border-radius: 50%; 
            border: 6px solid gold; 
            box-shadow: 0 0 40px gold;
            background: #111 url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png') center/115% no-repeat;
            position: relative; 
            z-index: 100; 
            transition: transform 0.05s ease-out;
        }

        /* --- 5. TASKS & BOOST CARDS (Line 95+) --- */
        .card-list { width: 92%; margin-top: 15px; }
        
        .card-item { 
            background: #0f0f0f; 
            border: 1px solid #1a1a1a; 
            border-radius: 18px; 
            padding: 18px; 
            margin-bottom: 14px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        
        .card-data { text-align: left; }
        .card-title { font-weight: bold; font-size: 17px; color: #fff; }
        .card-sub { color: gold; font-size: 13px; margin-top: 5px; }
        
        .card-action { 
            background: gold; 
            color: #000; 
            padding: 10px 22px; 
            border-radius: 12px; 
            font-weight: 900; 
            text-decoration: none; 
            font-size: 13px; 
            box-shadow: 0 4px 10px rgba(255, 215, 0, 0.2);
        }
        
        .card-locked { background: #222 !important; color: #666 !important; pointer-events: none; }

        /* --- 6. ENERGY BAR (Line 125+) --- */
        .energy-box { width: 85%; margin-top: 45px; }
        .energy-bar-bg { width: 100%; height: 14px; background: #151515; border-radius: 30px; border: 1px solid #252525; overflow: hidden; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); transition: width 0.3s; }

        /* --- 7. NAVIGATION SYSTEM (Line 135+) --- */
        .nav-bar { 
            position: fixed; 
            bottom: 25px; 
            left: 12px; 
            right: 12px; 
            height: 85px; 
            background: rgba(10, 10, 10, 0.95); 
            backdrop-filter: blur(10px);
            display: flex; 
            z-index: 1000; 
            border-radius: 25px; 
            border: 1px solid #222; 
        }
        
        .nav-btn { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: #444; 
            font-size: 10px; 
            font-weight: 800; 
            transition: color 0.2s;
        }
        
        .nav-btn.active-nav { color: gold; }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }

        /* --- 8. ANIMATIONS (Line 165+) --- */
        .tap-pop { position: absolute; color: #00d2ff; font-size: 48px; font-weight: 900; animation: floatUp 0.7s ease-out forwards; pointer-events: none; z-index: 2000; }
        @keyframes floatUp { 
            0% { transform: translateY(0) scale(1); opacity: 1; } 
            100% { transform: translateY(-160px) scale(1.2); opacity: 0; } 
        }
    </style>
</head>
<body onload="startApp()">

    <div id="loader">
        <div id="loader-bg"></div>
        <div id="pct">0%</div>
        <div class="bar-o"><div id="bar-i"></div></div>
    </div>

    <div id="p-tap" class="page active">
        <div class="score-container">
            <div id="sc" class="score">0</div>
            <div class="level-badge">BRONZE LEVEL</div>
        </div>
        <div id="tap-area"></div>
        <div class="energy-box">
            <div style="display:flex; justify-content:space-between; font-size:14px; color:#888; margin-bottom:8px">
                <span>⚡ ENERGY</span><span id="ev">2000 / 2000</span>
            </div>
            <div class="energy-bar-bg"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div id="p-tasks" class="page">
        <h2 style="color:gold; font-size: 32px; margin-bottom: 5px;">TASKS</h2>
        <p style="color:#666; margin-bottom: 20px;">Earn extra bonus coins</p>
        <div class="card-list">
            <div class="card-item">
                <div class="card-data"><div class="card-title">Join Channel</div><div class="card-sub">+10,000</div></div>
                <a href="https://t.me/YourChannel" target="_blank" class="card-action" onclick="claim(this, 10000)">GO</a>
            </div>
            <div class="card-item">
                <div class="card-data"><div class="card-title">Follow X</div><div class="card-sub">+5,000</div></div>
                <a href="https://x.com/YourProfile" target="_blank" class="card-action" onclick="claim(this, 5000)">GO</a>
            </div>
        </div>
    </div>

    <div id="p-boost" class="page">
        <h2 style="color:gold; font-size: 32px; margin-bottom: 5px;">BOOSTS</h2>
        <p style="color:#666; margin-bottom: 20px;">Upgrade your tapping power</p>
        <div class="card-list">
            <div class="card-item">
                <div class="card-data">
                    <div class="card-title">Multitap</div>
                    <div class="card-sub" id="mt-price">Cost: 1,000</div>
                </div>
                <div class="card-action" onclick="buyBoost('multitap')">UPGRADE</div>
            </div>
            <div class="card-item">
                <div class="card-data">
                    <div class="card-title">Energy Limit</div>
                    <div class="card-sub" id="el-price">Cost: 2,000</div>
                </div>
                <div class="card-action" onclick="buyBoost('limit')">UPGRADE</div>
            </div>
        </div>
    </div>

    <div id="p-lead" class="page">
        <h2 style="color:gold; font-size: 30px;">TOP PLAYERS</h2>
        <div style="width:90%; background:#0a0a0a; padding:25px; border-radius:25px; border:1px solid #1a1a1a">
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid #111; padding:15px 0;">
                <span>1. AHMED</span><span style="color:gold">1,250,000</span>
            </div>
            <div style="display:flex; justify-content:space-between; padding:25px 0; font-weight:900; color:gold; font-size: 22px;">
                <span>YOU</span><span id="my-sc">0</span>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active-nav" onclick="switchPg('tap', this)"><span class="nav-icon">💰</span>TAP</div>
        <div class="nav-btn" onclick="switchPg('tasks', this)"><span class="nav-icon">📜</span>TASKS</div>
        <div class="nav-btn" onclick="switchPg('boost', this)"><span class="nav-icon">🚀</span>BOOST</div>
        <div class="nav-btn" onclick="switchPg('lead', this)"><span class="nav-icon">🏆</span>TOP</div>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('js_s')) || 0;
        let energy = parseFloat(localStorage.getItem('js_e')) || 2000;
        let tapValue = parseInt(localStorage.getItem('js_tv')) || 1;
        let maxEnergy = parseInt(localStorage.getItem('js_me')) || 2000;

        function startApp() {
            let load = 0;
            let timer = setInterval(() => {
                load += 4;
                document.getElementById('bar-i').style.width = load + "%";
                document.getElementById('pct').innerText = load + "%";
                if(load >= 100) { 
                    clearInterval(timer); 
                    document.getElementById('loader').remove(); 
                    render(); 
                }
            }, 30);
        }

        function switchPg(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('p-' + id).classList.add('active');
            btn.classList.add('active-nav');
            if(navigator.vibrate) navigator.vibrate(15);
        }

        function render() {
            document.getElementById('sc').innerText = balance.toLocaleString();
            document.getElementById('my-sc').innerText = balance.toLocaleString();
            document.getElementById('ev').innerText = Math.floor(energy).toLocaleString() + " / " + maxEnergy;
            document.getElementById('energy-fill').style.width = (energy / (maxEnergy/100)) + "%";
        }

        function claim(btn, reward) {
            balance += reward;
            btn.innerText = "DONE";
            btn.classList.add('card-locked');
            save();
            render();
        }

        function buyBoost(type) {
            if(type === 'multitap' && balance >= 1000) {
                balance -= 1000;
                tapValue += 1;
                alert('Tapping Power Increased!');
            } else if(type === 'limit' && balance >= 2000) {
                balance -= 2000;
                maxEnergy += 500;
                energy = maxEnergy;
                alert('Energy Limit Increased!');
            } else {
                alert('Not enough coins!');
            }
            save();
            render();
        }

        function save() {
            localStorage.setItem('js_s', balance);
            localStorage.setItem('js_e', energy);
            localStorage.setItem('js_tv', tapValue);
            localStorage.setItem('js_me', maxEnergy);
        }

        const tapBox = document.getElementById('tap-area');
        tapBox.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                if(energy >= tapValue) {
                    balance += tapValue;
                    energy -= tapValue;
                    let t = e.changedTouches[i];
                    createEffect(t.pageX, t.pageY);
                }
            }
            save();
            render();
            if(navigator.vibrate) navigator.vibrate(10);
            tapBox.style.transform = "scale(0.94)";
            setTimeout(() => tapBox.style.transform = "scale(1)", 50);
        }, { passive: false });

        function createEffect(x, y) {
            let el = document.createElement('div');
            el.className = 'tap-pop'; el.innerText = '+' + tapValue;
            el.style.left = x + 'px'; el.style.top = (y - 50) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 650);
        }

        setInterval(() => { 
            if(energy < maxEnergy) { 
                energy = Math.min(maxEnergy, energy + 1.5); 
                render(); 
            } 
        }, 1000);
    </script>
</body>
</html>

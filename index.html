<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jolt Coin - Multi-Touch Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; position: relative; }
        
        .header { text-align: center; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; }
        #main-balance { font-size: 40px; font-weight: 900; }
        .profit-info { color: #FFD700; font-size: 13px; }

        .page { display: none; height: calc(100vh - 180px); width: 100%; overflow-y: auto; padding: 20px; flex-direction: column; align-items: center; }
        .page-active { display: flex !important; }

        #coin-click { width: 260px; height: 260px; border-radius: 50%; border: 8px solid #cd7f32; 
            background: #111 url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png') center/cover;
            box-shadow: 0 0 40px rgba(205, 127, 50, 0.4); margin-top: 40px; transition: transform 0.05s; z-index: 10; }

        /* شريط الطاقة المطور مع البطارية في القلب */
        .energy-wrapper { width: 85%; margin-top: 50px; position: relative; }
        .energy-label { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; margin-bottom: 8px; }
        
        .energy-bar-container { width: 100%; height: 28px; background: #1a1a1a; border-radius: 15px; position: relative; border: 1px solid #333; overflow: hidden; display: flex; align-items: center; }
        #energy-fill { position: absolute; left: 0; top: 0; height: 100%; background: linear-gradient(90deg, #FFD700, #FFA500); width: 100%; transition: width 0.3s ease-out; z-index: 1; }
        
        /* البطارية داخل الشريط */
        .battery-in-bar { position: absolute; left: 10px; z-index: 5; display: flex; align-items: center; gap: 5px; color: #fff; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 2px #000; }
        .battery-shape { width: 20px; height: 11px; border: 1.5px solid #fff; border-radius: 2px; position: relative; }
        .battery-shape::after { content: ''; position: absolute; right: -4px; top: 2px; width: 2px; height: 4px; background: #fff; }
        .bolt { color: #FFD700; font-size: 10px; position: absolute; left: 50%; transform: translateX(-50%); }

        /* تأثير +1 */
        .plus-one { position: absolute; color: #FFD700; font-size: 30px; font-weight: 900; pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 100; text-shadow: 0 0 10px #000; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px); } }

        .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: #050505; display: flex; border-top: 1px solid #222; z-index: 50; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 12px; }
        .nav-item-active { color: #FFD700; }
        .nav-item span:first-child { font-size: 24px; }
    </style>
</head>
<body onload="initApp()">

    <div class="header">
        <div id="main-balance">0</div>
        <div class="profit-info">💰 +<span id="pph-value">0</span>/ساعة</div>
    </div>

    <div id="tab-tap" class="page page-active">
        <div id="coin-click"></div>
        
    .energy-label { 
    display: flex; 
    justify-content: space-between; 
    flex-direction: row-reverse;
    font-weight: bold; 
    font-size: 16px; 
    margin-bottom: 10px; 
    color: #fff; 
}
    
            <div class="energy-bar-container">
                <div id="energy-fill"></div>
                <div class="battery-in-bar">
                    <div class="border"><span class="color">⚡</span></div>
                </div>
            </div>
        </div>
    </div>

    <nav class="footer-nav">
        <div class="nav-item"><span>⛏️</span><span>تعدين</span></div>
        <div class="nav-item nav-item-active"><span>💰</span><span>نقر</span></div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDAf1rFiwTwZmEkWv6ykgr2msEmIaOELs",
            authDomain: "jolt-coin.firebaseapp.com",
            databaseURL: "https://jolt-coin-default-rtdb.firebaseio.com",
            projectId: "jolt-coin",
            appId: "1:523210485636:web:30a3f782afdbddfb4037d1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "user_123";

        let score = 0;
        let pph = 0;
        let energy = 1000;
        const maxEnergy = 1000;

        function initApp() {
            db.ref('users/' + userId).once('value', (s) => {
                const d = s.val();
                if(d) { score = d.score || 0; pph = d.pph || 0; updateUI(); }
            });
            setInterval(() => {
                if(pph > 0) score += (pph / 3600);
                if(energy < maxEnergy) energy = Math.min(maxEnergy, energy + 1.2);
                updateUI();
            }, 1000);
            setInterval(() => db.ref('users/' + userId).update({ score: score, pph: pph }), 10000);
        }

        function updateUI() {
            document.getElementById('main-balance').innerText = Math.floor(score).toLocaleString();
            document.getElementById('pph-value').innerText = Math.floor(pph).toLocaleString();
            document.getElementById('energy-num').innerText = `${Math.floor(energy)} / ${maxEnergy}`;
            document.getElementById('energy-fill').style.width = (energy / maxEnergy * 100) + "%";
        }

        // دعم اللمس المتعدد Multi-touch وتأثير +1
        document.getElementById('coin-click').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touches = e.changedTouches;
            
            for(let i = 0; i < touches.length; i++) {
                if(energy >= 1) {
                    score++;
                    energy--;
                    
                    // إنشاء رقم +1 في مكان اللمس بالضبط
                    const plusOne = document.createElement('div');
                    plusOne.className = 'plus-one';
                    plusOne.innerText = '+1';
                    plusOne.style.left = touches[i].pageX + 'px';
                    plusOne.style.top = touches[i].pageY + 'px';
                    document.body.appendChild(plusOne);
                    
                    setTimeout(() => plusOne.remove(), 800);
                }
            }
            updateUI();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            // تأثير بصري للعملة
            document.getElementById('coin-click').style.transform = 'scale(0.95)';
            setTimeout(() => { document.getElementById('coin-click').style.transform = 'scale(1)'; }, 50);
        });
    </script>
</body>
</html>

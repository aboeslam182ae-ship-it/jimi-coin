<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jolt Coin</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; padding-top: 50px; }
        .coin-img { width: 200px; border-radius: 50%; border: 5px solid #ffcc00; margin-bottom: 20px; }
        .btn-menu { background: #222; color: #ffcc00; border: 1px solid #ffcc00; padding: 10px 20px; border-radius: 10px; margin: 5px; cursor: pointer; }
        #balance { font-size: 30px; color: #ffcc00; margin-bottom: 20px; }
        .modal { display: none; position: fixed; top: 20%; left: 10%; right: 10%; background: #1a1a1a; padding: 20px; border: 2px solid #ffcc00; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="balance">0 🪙</div>
    <img src="https://i.ibb.co/L6M7XmF/DALL-E-2025-10-27-21-44-33-A-realistic-cinematic-portrait-of-a-fierce-jaguar-made-of-solid-polished.webp" class="coin-img" onclick="tap()">

    <div style="margin-top: 50px;">
        <button class="btn-menu" onclick="showTasks()">📋 المهام</button>
        <button class="btn-menu">🚀 تعزيز</button>
    </div>

    <div id="taskModal" class="modal">
        <h3>المهام اليومية 🎁</h3>
        <p>اشترك في القناة واربح 50,000</p>
        <button class="btn-menu" onclick="claim()">إتمام المهمة</button>
        <button class="btn-menu" onclick="closeTasks()">إغلاق</button>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('balance')) || 0;
        document.getElementById('balance').innerText = balance + " 🪙";

        function tap() {
            balance += 3;
            document.getElementById('balance').innerText = balance + " 🪙";
            localStorage.setItem('balance', balance);
        }

        function showTasks() { document.getElementById('taskModal').style.display = 'block'; }
        function closeTasks() { document.getElementById('taskModal').style.display = 'none'; }
        
        function claim() {
            balance += 50000;
            document.getElementById('balance').innerText = balance + " 🪙";
            localStorage.setItem('balance', balance);
            alert("مبروك! تم إضافة المكافأة");
            closeTasks();
        }
    </script>
</body>
</html>

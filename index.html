<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin Pro</title>
    <style>
        /* --- GLOBAL RESET --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- LOADER --- */
        #loader-screen {
            position: fixed;
            inset: 0;
            background-color: #000000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 100px;
        }

        #load-percent {
            font-size: 38px;
            font-weight: 800;
            color: #FFD700;
            margin-bottom: 12px;
        }

        .bar-outer {
            width: 220px;
            height: 7px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
        }

        #bar-inner {
            width: 0%;
            height: 100%;
            background-color: #FFD700;
        }

        /* --- PAGE SYSTEM --- */
        .page {
            display: none;
            height: 100vh;
            width: 100%;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .page-active {
            display: flex !important;
        }

        /* --- MAIN TAP ELEMENTS --- */
        #main-balance {
            font-size: 60px;
            font-weight: 800;
            margin-top: 20px;
        }

        .level-text {
            color: #FFD700;
            font-size: 14px;
            margin-bottom: 40px;
        }

        #coin-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #coin-click {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 6px solid #cd7f32;
            background-image: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png');
            background-size: cover;
            background-position: center;
            z-index: 5;
            transition: transform 0.05s;
            cursor: pointer;
        }

        /* Click Effect (+1) */
        .plus-one {
            position: absolute;
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            animation: moveUp 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes moveUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }

        /* --- ENERGY BAR --- */
        .energy-container {
            width: 85%;
            margin-top: 40px;
        }

        .energy-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        #energy-text {
            font-size: 14px;
            font-weight: bold;
        }

        .energy-bar-bg {
            width: 100%;
            height: 12px;
            background-color: #1a1a1a;
            border-radius: 10px;
            border: 1px solid #333;
            overflow: hidden;
        }

        #energy-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            transition: width 0.2s;
        }

        /* --- NAVIGATION BAR --- */
        .nav-bar {
            position: fixed;
            bottom: 25px;
            left: 20px;
            right: 20px;
            height: 80px;
            background-color: #0f0f0f;
            display: flex;
            border-radius: 20px;
            border: 1px solid #222;
            z-index: 1000;
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #555;
            cursor: pointer;
        }

        .nav-active {
            color: #FFD700;
        }

        .nav-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }

        .nav-label {
            font-size: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body onload="initApp()">

    <div id="loader-screen">
        <div id="load-percent">0%</div>
        <div class="bar-outer">
            <div id="bar-inner"></div>
        </div>
    </div>

    <div id="tab-tap" class="page page-active">
        <div id="main-balance">0</div>
        <div class="level-text">BRONZE LEVEL</div>
        
        <div id="coin-container">
            <div id="coin-click"></div>
        </div>

        <div class="energy-container">
            <div class="energy-header">
                <span style="color: #aaa;">ENERGY</span>
                <span id="energy-text">2000 / 2000</span>
            </div>
            <div class="energy-bar-bg">
                <div id="energy-fill"></div>
            </div>
        </div>
    </div>

    <div id="tab-tasks" class="page">
        <h1 style="margin-top:100px">TASKS LIST</h1>
    </div>
    <div id="tab-boost" class="page">
        <h1 style="margin-top:100px">BOOSTERS</h1>
    </div>
    <div id="tab-top" class="page">
        <h1 style="margin-top:100px">TOP PLAYERS</h1>
    </div>

    <div class="nav-bar">
        <div class="nav-btn nav-active" onclick="switchTab('tap', this)">
            <span class="nav-icon">💰</span>
            <span class="nav-label">TAP</span>
        </div>
        <div class="nav-btn" onclick="switchTab('tasks', this)">
            <span class="nav-icon">📜</span>
            <span class="nav-label">TASKS</span>
        </div>
        <div class="nav-btn" onclick="switchTab('boost', this)">
            <span class="nav-icon">🚀</span>
            <span class="nav-label">BOOST</span>
        </div>
        <div class="nav-btn" onclick="switchTab('top', this)">
            <span class="nav-icon">🏆</span>
            <span class="nav-label">TOP</span>
        </div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('j_score')) || 0;
        let energy = parseFloat(localStorage.getItem('j_energy')) || 2000;

        function initApp() {
            let p = 0;
            let interval = setInterval(() => {
                p++;
                document.getElementById('bar-inner').style.width = p + "%";
                document.getElementById('load-percent').innerText = p + "%";
                if(p >= 100) {
                    clearInterval(interval);
                    document.getElementById('loader-screen').style.display = 'none';
                    updateUI();
                }
            }, 30);

            // Energy Recovery
            setInterval(() => {
                if(energy < 2000) {
                    energy = Math.min(2000, energy + 1);
                    updateUI();
                }
            }, 1500);
        }

        function updateUI() {
            document.getElementById('main-balance').innerText = score.toLocaleString();
            document.getElementById('energy-text').innerText = Math.floor(energy) + " / 2000";
            document.getElementById('energy-fill').style.width = (energy / 20) + "%";
            localStorage.setItem('j_score', score);
            localStorage.setItem('j_energy', energy);
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            
            document.getElementById('tab-' + tabId).classList.add('page-active');
            element.classList.add('nav-active');
        }

        // Tap Functionality with Visual Effect
        const coin = document.getElementById('coin-click');
        const coinContainer = document.getElementById('coin-container');

        coin.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if(energy >= 1) {
                score++;
                energy--;
                updateUI();

                // Animation scale
                this.style.transform = "scale(0.95)";
                setTimeout(() => this.style.transform = "scale(1)", 50);

                // Create +1 effect
                const touch = e.touches[0];
                const plusOne = document.createElement('div');
                plusOne.innerText = "+1";
                plusOne.className = 'plus-one';
                plusOne.style.left = (touch.clientX - 20) + "px";
                plusOne.style.top = (touch.clientY - 40) + "px";
                
                document.body.appendChild(plusOne);
                setTimeout(() => plusOne.remove(), 800);
            }
        });
    </script>
</body>
</html>

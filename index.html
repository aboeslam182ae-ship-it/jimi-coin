<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin - Realistic Verification</title>
    <style>
        /* --- 1. BASE STYLES (Lines 10-40) --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; }
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; text-align: center; }

        /* --- 2. LOADER (Lines 42-60) --- */
        #loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 25%; }
        #loader-bg { position: absolute; inset: 0; background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/splash.png') center/cover no-repeat; opacity: 0.7; z-index: -1; }
        #pct { color: gold; font-size: 34px; font-weight: bold; margin-bottom: 12px; }
        .bar-o { width: 240px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 20px; border: 1px solid gold; overflow: hidden; }
        #bar-i { width: 0%; height: 100%; background: gold; }

        /* --- 3. PAGES (Lines 62-90) --- */
        .page { display: none; height: 100vh; flex-direction: column; align-items: center; padding-top: 50px; padding-bottom: 120px; overflow-y: auto; }
        .active { display: flex !important; }
        .score { font-size: 70px; color: gold; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 15px rgba(255,215,0,0.5); }
        #level-label { font-weight: 900; letter-spacing: 2px; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; }
        .p-hour { color: #39FF14; font-size: 14px; font-weight: bold; margin-bottom: 20px; }

        #tap-area { 
            width: 260px; height: 260px; border-radius: 50%; border: 6px solid gold; box-shadow: 0 0 40px gold;
            background: #111 url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png') center/115% no-repeat;
            position: relative; transition: transform 0.05s;
        }

        /* --- 4. TASK STYLES - NEW (Lines 95-125) --- */
        .card-list { width: 92%; margin-top: 15px; }
        .card-item { background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 18px; padding: 18px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
        .card-data { text-align: left; }
        .card-title { font-weight: bold; font-size: 16px; }
        .card-sub { color: gold; font-size: 12px; margin-top: 4px; }
        
        .card-action { 
            background: gold; color: #000; padding: 10px 18px; border-radius: 12px; 
            font-weight: 900; cursor: pointer; font-size: 12px; text-decoration: none;
            min-width: 80px; text-align: center;
        }
        
        /* NEW: Style for checking/disabled state */
        .card-checking { background: #333 !important; color: #aaa !important; pointer-events: none; font-size: 10px !important; }
        .card-done { background: #111 !important; color: #444 !important; pointer-events: none; }

        /* --- 5. ENERGY & NAV (Lines 130-160) --- */
        .energy-box { width: 85%; margin-top: 40px; }
        .energy-bar-bg { width: 100%; height: 14px; background: #151515; border-radius: 30px; overflow: hidden; border: 1px solid #222; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); }
        .nav-bar { position: fixed; bottom: 25px; left: 12px; right: 12px; height: 85px; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); display: flex; z-index: 1000; border-radius: 25px; border: 1px solid #222; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 10px; font-weight: 800; }
        .nav-btn.active-nav { color: gold; }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body onload="startApp()">

    <div id="loader">
        <div id="loader-bg"></div>
        <div id="pct">0%</div>
        <div class="bar-o"><div id="bar-i"></div></div>
    </div>

    <div id="p-tap" class="page active">
        <div id="sc" class="score">0</div>
        <div id="level-label">BRONZE LEVEL</div>
        <div class="p-hour">Profit per hour: +<span id="pph-val">0</span></div>
        <div id="tap-area"></div>
        <div class="energy-box">
            <div style="display:flex; justify-content:space-between; font-size:13px; color:#888; margin-bottom:8px">
                <span>⚡ ENERGY</span><span id="ev">2000 / 2000</span>
            </div>
            <div class="energy-bar-bg"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div id="p-tasks" class="page">
        <h2 style="color:gold;">TASKS</h2>
        <div class="card-list">
            <div class="card-item">
                <div class="card-data"><div class="card-title">Join YouTube</div><div class="card-sub">+15,000</div></div>
                <a href="https://youtube.com/c/YourChannel" target="_blank" id="btn-t1" class="card-action" onclick="startVerification('t1', 15000, 3600)">GO</a>
            </div>
            <div class="card-item">
                <div class="card-data"><div class="card-title">Join Telegram</div><div class="card-sub">+10,000</div></div>
                <a href="https://t.me/YourChannel" target="_blank" id="btn-t2" class="card-action" onclick="startVerification('t2', 10000, 3600)">GO</a>
            </div>
        </div>
    </div>

    <div id="p-boost" class="page">
        <h2 style="color:gold;">BOOSTS</h2>
        <div class="card-list">
            <div class="card-item">
                <div class="card-data"><div class="card-title">Mining Hamster</div><div class="card-sub">+500/hour | Cost: 5k</div></div>
                <div class="card-action" onclick="buyMining(5000, 500)">BUY</div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active-nav" onclick="switchPg('tap', this)"><span class="nav-icon">💰</span>TAP</div>
        <div class="nav-btn" onclick="switchPg('tasks', this)"><span class="nav-icon">📜</span>TASKS</div>
        <div class="nav-btn" onclick="switchPg('boost', this)"><span class="nav-icon">🚀</span>BOOST</div>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('js_s')) || 0;
        let energy = parseFloat(localStorage.getItem('js_e')) || 2000;
        let pph = parseInt(localStorage.getItem('js_pph')) || 0;
        let maxEnergy = 2000;

        function startApp() {
            let load = 0;
            let itv = setInterval(() => {
                load += 5;
                document.getElementById('bar-i').style.width = load + "%";
                document.getElementById('pct').innerText = load + "%";
                if(load >= 100) { clearInterval(itv); document.getElementById('loader').remove(); render(); }
            }, 30);
            
            setInterval(() => { if(pph > 0) { balance += (pph / 3600); render(); } save(); checkTaskTimers(); }, 1000);
        }

        // NEW: Start Task Verification Timer
        function startVerification(id, reward, seconds) {
            const finishTime = Date.now() + (seconds * 1000);
            localStorage.setItem('task_' + id, JSON.stringify({ end: finishTime, reward: reward, claimed: false }));
            // We don't call render yet, checkTaskTimers will handle it in the next second
        }

        // NEW: Monitor all timers every second
        function checkTaskTimers() {
            ['t1', 't2'].forEach(id => {
                const data = JSON.parse(localStorage.getItem('task_' + id));
                if (!data) return;
                
                const btn = document.getElementById('btn-' + id);
                if (data.claimed) {
                    btn.innerText = "DONE";
                    btn.className = "card-action card-done";
                    return;
                }

                const now = Date.now();
                const timeLeft = Math.ceil((data.end - now) / 1000);

                if (timeLeft > 0) {
                    const mins = Math.floor(timeLeft / 60);
                    const secs = timeLeft % 60;
                    btn.innerText = `Wait ${mins}m ${secs}s`;
                    btn.className = "card-action card-checking";
                } else {
                    btn.innerText = "CLAIM";
                    btn.className = "card-action";
                    btn.onclick = () => claimTask(id, data.reward);
                    btn.removeAttribute('href'); // Remove link once finished
                }
            });
        }

        function claimTask(id, reward) {
            balance += reward;
            localStorage.setItem('task_' + id, JSON.stringify({ claimed: true }));
            alert(`Task Verified! +${reward} coins added.`);
            render();
        }

        function switchPg(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('p-' + id).classList.add('active');
            btn.classList.add('active-nav');
        }

        function render() {
            document.getElementById('sc').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('pph-val').innerText = pph.toLocaleString();
            document.getElementById('ev').innerText = Math.floor(energy) + " / 2000";
            document.getElementById('energy-fill').style.width = (energy / (maxEnergy/100)) + "%";
        }

        function save() {
            localStorage.setItem('js_s', balance);
            localStorage.setItem('js_e', energy);
            localStorage.setItem('js_pph', pph);
        }

        const tapBox = document.getElementById('tap-area');
        tapBox.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(energy >= 1) {
                balance += 1; energy -= 1;
                if(navigator.vibrate) navigator.vibrate(10);
            }
            render();
        }, { passive: false });

        setInterval(() => { if(energy < maxEnergy) { energy = Math.min(maxEnergy, energy + 1.2); render(); } }, 1000);
    </script>
</body>
</html>

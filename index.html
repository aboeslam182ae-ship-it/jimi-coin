<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin Ultimate</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; }
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; text-align: center; }

        /* Loader Section */
        #loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 25%; }
        #loader-bg { position: absolute; inset: 0; background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/splash.png') center/cover no-repeat; opacity: 0.8; z-index: -1; }
        #pct { color: gold; font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        .bar-o { width: 220px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 1px solid gold; overflow: hidden; }
        #bar-i { width: 0%; height: 100%; background: gold; }

        /* Pages System */
        .page { display: none; height: 100vh; flex-direction: column; align-items: center; padding-top: 40px; }
        .active { display: flex !important; }

        /* Tap Page Elements */
        .score { font-size: 80px; color: gold; font-weight: bold; margin: 0; }
        #tap-area { 
            width: 280px; height: 280px; margin-top: 30px; border-radius: 50%; border: 5px solid gold; box-shadow: 0 0 30px gold;
            background: #111 url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png') center/112% no-repeat;
            position: relative; z-index: 100; transition: transform 0.05s;
        }

        /* Tasks Page Elements */
        .task-list { width: 90%; margin-top: 20px; overflow-y: auto; max-height: 60vh; touch-action: pan-y; }
        .task-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .t-btn { background: gold; color: #000; padding: 8px 16px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 14px; }
        .t-done { background: #333 !important; color: #777 !important; pointer-events: none; }

        /* Energy UI */
        .en-ui { width: 85%; margin-top: 50px; }
        .en-bg { width: 100%; height: 14px; background: #1a1a1a; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        #en-f { width: 100%; height: 100%; background: #00d2ff; }

        /* Navigation */
        .nav { position: fixed; bottom: 30px; left: 10px; right: 10px; height: 80px; background: #0a0a0a; display: flex; z-index: 1000; border-radius: 20px; border: 1px solid #222; }
        .nav-i { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 11px; font-weight: bold; cursor: pointer; }
        .nav-i.on { color: gold; }

        /* Pop Effect */
        .pop { position: absolute; color: #00d2ff; font-size: 45px; font-weight: bold; animation: up 0.6s forwards; pointer-events: none; z-index: 2000; }
        @keyframes up { to { transform: translateY(-130px); opacity: 0; } }
    </style>
</head>
<body onload="init()">

    <div id="loader">
        <div id="loader-bg"></div>
        <div id="pct">0%</div>
        <div class="bar-o"><div id="bar-i"></div></div>
    </div>

    <div id="p-tap" class="page active">
        <div id="sc" class="score">0</div>
        <div style="color:#00d2ff; font-weight:bold; letter-spacing:1px">BRONZE LEVEL</div>
        <div id="tap-area"></div>
        <div class="en-ui">
            <div style="display:flex; justify-content:space-between; font-size:13px; color:#aaa; margin-bottom:5px">
                <span>⚡ ENERGY</span><span id="ev">2000 / 2000</span>
            </div>
            <div class="en-bg"><div id="en-f"></div></div>
        </div>
    </div>

    <div id="p-tasks" class="page">
        <h2 style="color:gold">TASKS

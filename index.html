<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin - Passive Income Edition</title>
    <style>
        /* --- 1. GLOBAL & BASE (Lines 10-35) --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; }
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; text-align: center; }

        /* --- 2. LOADER STYLES (Lines 37-55) --- */
        #loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 25%; }
        #loader-bg { position: absolute; inset: 0; background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/splash.png') center/cover no-repeat; opacity: 0.7; z-index: -1; }
        #pct { color: gold; font-size: 34px; font-weight: bold; margin-bottom: 12px; }
        .bar-o { width: 240px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 20px; border: 1px solid gold; overflow: hidden; }
        #bar-i { width: 0%; height: 100%; background: gold; }

        /* --- 3. DYNAMIC UI & PAGES (Lines 57-85) --- */
        .page { display: none; height: 100vh; flex-direction: column; align-items: center; padding-top: 50px; padding-bottom: 120px; overflow-y: auto; }
        .active { display: flex !important; }
        .score { font-size: 70px; color: gold; font-weight: bold; margin: 0; text-shadow: 0 0 15px rgba(255,215,0,0.5); }
        #level-label { font-weight: 900; letter-spacing: 2px; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; }

        /* NEW: Profit Display Styling */
        .p-hour { color: #39FF14; font-size: 14px; font-weight: bold; margin-bottom: 20px; }

        #tap-area { 
            width: 260px; height: 260px; border-radius: 50%; border: 6px solid gold; box-shadow: 0 0 40px gold;
            background: #111 url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png') center/115% no-repeat;
            position: relative; z-index: 100; transition: transform 0.05s;
        }

        /* --- 4. CARDS & BOOSTS (Lines 87-120) --- */
        .card-list { width: 92%; margin-top: 15px; }
        .card-item { background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 18px; padding: 18px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
        .card-data { text-align: left; }
        .card-title { font-weight: bold; font-size: 16px; }
        .card-sub { color: gold; font-size: 12px; margin-top: 4px; }
        .card-action { background: gold; color: #000; padding: 10px 18px; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 12px; }

        /* --- 5. ENERGY & NAV (Lines 122-150) --- */
        .energy-box { width: 85%; margin-top: 40px; }
        .energy-bar-bg { width: 100%; height: 14px; background: #151515; border-radius: 30px; overflow: hidden; border: 1px solid #222; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); }
        .nav-bar { position: fixed; bottom: 25px; left: 12px; right: 12px; height: 85px; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); display: flex; z-index: 1000; border-radius: 25px; border: 1px solid #222; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 10px; font-weight: 800; }
        .nav-btn.active-nav { color: gold; }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        /* --- 6. POPUP EFFECT (Lines 152-160) --- */
        .tap-pop { position: absolute; color: #00d2ff; font-size: 45px; font-weight: 900; animation: floatUp 0.7s forwards; pointer-events: none; z-index: 2000; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-160px); opacity: 0; } }
    </style>
</head>
<body onload="startApp()">

    <div id="loader">
        <div id="loader-bg"></div>
        <div id="pct">0%</div>
        <div class="bar-o"><div id="bar-i"></div></div>
    </div>

    <div id="p-tap" class="page active">
        <div id="sc" class="score">0</div>
        <div id="level-label">BRONZE LEVEL</div>
        <div class="p-hour">Profit per hour: +<span id="pph-val">0</span></div>
        
        <div id="tap-area"></div>
        <div class="energy-box">
            <div style="display:flex; justify-content:space-between; font-size:13px; color:#888; margin-bottom:8px">
                <span>⚡ ENERGY</span><span id="ev">2000 / 2000</span>
            </div>
            <div class="energy-bar-bg"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div id="p-tasks" class="page">
        <h2 style="color:gold;">TASKS</h2>
        <div class="card-list">
            <div class="card-item">
                <div class="card-data"><div class="card-title">Subscribe</div><div class="card-sub">+10,000</div></div>
                <div class="card-action" onclick="claim(this, 10000)">GO</div>
            </div>
        </div>
    </div>

    <div id="p-boost" class="page">
        <h2 style="color:gold;">BOOSTS</h2>
        <div class="card-list">
            <div class="card-item">
                <div class="card-data"><div class="card-title">Mining Hamster</div><div class="card-sub">+500/hour | Cost: 5k</div></div>
                <div class="card-action" onclick="buyMining(5000, 500)">BUY</div>
            </div>
            <div class="card-item">
                <div class="card-data"><div class="card-title">GPU Farm</div><div class="card-sub">+2,000/hour | Cost: 15k</div></div>
                <div class="card-action" onclick="buyMining(15000, 2000)">BUY</div>
            </div>
            <div class="card-item">
                <div class="card-data"><div class="card-title">Multitap</div><div class="card-sub">+1 per tap | Cost: 1k</div></div>
                <div class="card-action" onclick="buyBoost('mt', 1000)">UPGRADE</div>
            </div>
        </div>
    </div>

    <div id="p-lead" class="page">
        <h2 style="color:gold">TOP PLAYERS</h2>
        <div style="width:90%; background:#0a0a0a; padding:25px; border-radius:25px; border:1px solid #1a1a1a">
            <div style="display:flex; justify-content:space-between; padding:20px; font-weight:bold; color:gold; font-size: 22px;"><span>YOU</span><span id="my-sc">0</span></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active-nav" onclick="switchPg('tap', this)"><span class="nav-icon">💰</span>TAP</div>
        <div class="nav-btn" onclick="switchPg('tasks', this)"><span class="nav-icon">📜</span>TASKS</div>
        <div class="nav-btn" onclick="switchPg('boost', this)"><span class="nav-icon">🚀</span>BOOST</div>
        <div class="nav-btn" onclick="switchPg('lead', this)"><span class="nav-icon">🏆</span>TOP</div>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('js_s')) || 0;
        let energy = parseFloat(localStorage.getItem('js_e')) || 2000;
        let tapValue = parseInt(localStorage.getItem('js_tv')) || 1;
        let maxEnergy = parseInt(localStorage.getItem('js_me')) || 2000;
        let pph = parseInt(localStorage.getItem('js_pph')) || 0; // Profit Per Hour

        const levels = [
            { n: "Bronze", v: 0, c: "#00d2ff" }, { n: "Silver", v: 5000, c: "#C0C0C0" },
            { n: "Gold", v: 25000, c: "#FFD700" }, { n: "Platinum", v: 100000, c: "#E5E4E2" },
            { n: "Legendary", v: 1000000, c: "#FF4500" }
        ];

        function startApp() {
            calculateOfflineEarnings(); // NEW: Calculate money while away
            let load = 0;
            let timer = setInterval(() => {
                load += 5;
                document.getElementById('bar-i').style.width = load + "%";
                document.getElementById('pct').innerText = load + "%";
                if(load >= 100) { clearInterval(timer); document.getElementById('loader').remove(); render(); }
            }, 30);
            
            // Auto-save & Auto-mine every 1 second
            setInterval(() => {
                if(pph > 0) {
                    balance += (pph / 3600); // Add portion of hourly profit
                    render();
                }
                save();
            }, 1000);
        }

        // NEW: Offline Earnings Function
        function calculateOfflineEarnings() {
            let lastVisit = localStorage.getItem('js_last');
            if(lastVisit && pph > 0) {
                let now = Date.now();
                let secondsAway = Math.floor((now - lastVisit) / 1000);
                let earned = Math.floor((secondsAway * (pph / 3600)));
                if(earned > 0) {
                    balance += earned;
                    alert("While you were away, you earned: " + earned.toLocaleString() + " Jimi Coins!");
                }
            }
        }

        function buyMining(cost, addPph) {
            if(balance >= cost) {
                balance -= cost;
                pph += addPph;
                save(); render();
                alert("Mining started! +" + addPph + "/hour");
            } else { alert("Not enough coins!"); }
        }

        function switchPg(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('p-' + id).classList.add('active');
            btn.classList.add('active-nav');
        }

        function render() {
            document.getElementById('sc').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('my-sc').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('pph-val').innerText = pph.toLocaleString();
            document.getElementById('ev').innerText = Math.floor(energy) + " / " + maxEnergy;
            document.getElementById('energy-fill').style.width = (energy / (maxEnergy/100)) + "%";
            updateLevel();
        }

        function updateLevel() {
            let cl = levels[0];
            for (let i = levels.length - 1; i >= 0; i--) { if (balance >= levels[i].v) { cl = levels[i]; break; } }
            const l = document.getElementById('level-label');
            l.innerText = cl.n + " LEVEL"; l.style.color = cl.c;
        }

        function buyBoost(type, cost) {
            if(balance >= cost) { balance -= cost; if(type==='mt') tapValue++; save(); render(); }
        }

        function claim(btn, r) { balance += r; btn.innerText = "DONE"; save(); render(); }

        function save() {
            localStorage.setItem('js_s', balance);
            localStorage.setItem('js_e', energy);
            localStorage.setItem('js_tv', tapValue);
            localStorage.setItem('js_me', maxEnergy);
            localStorage.setItem('js_pph', pph);
            localStorage.setItem('js_last', Date.now()); // Save current time
        }

        const tapBox = document.getElementById('tap-area');
        tapBox.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                if(energy >= tapValue) {
                    balance += tapValue; energy -= tapValue;
                    let t = e.changedTouches[i];
                    let p = document.createElement('div');
                    p.className = 'tap-pop'; p.innerText = '+' + tapValue;
                    p.style.left = t.pageX + 'px'; p.style.top = t.pageY + 'px';
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 600);
                }
            }
            save(); render();
            if(navigator.vibrate) navigator.vibrate(10);
            tapBox.style.transform = "scale(0.95)";
            setTimeout(() => tapBox.style.transform = "scale(1)", 50);
        }, { passive: false });

        setInterval(() => { if(energy < maxEnergy) { energy = Math.min(maxEnergy, energy + 1.5); render(); } }, 1000);
    </script>
</body>
</html>

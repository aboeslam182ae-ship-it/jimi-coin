<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jolt Coin - Boost System</title>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        /* شاشة التحميل */
        #splash { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        #splash img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        .loader-container { width: 80%; margin-bottom: 60px; text-align: center; }
        .loader-bar { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid gold; }
        #loader-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #FFD700, #FFA500); }

        /* الشاشة الرئيسية */
        #main-ui { display: none; height: 100vh; display: flex; flex-direction: column; }
        .content-section { flex: 1; display: none; text-align: center; overflow-y: auto; padding-bottom: 100px; }
        .active-section { display: block; }

        /* قسم اللعب */
        #score { font-size: 60px; color: #FFD700; font-weight: bold; margin-top: 40px; }
        .coin-btn { width: 260px; height: 260px; margin: 50px auto; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .coin-btn img { width: 100%; border-radius: 50%; border: 4px solid gold; }

        /* قسم التطوير (Boost) */
        .boost-card { background: #111; margin: 15px; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .boost-info { text-align: left; }
        .boost-info h3 { margin: 0; color: #FFD700; }
        .boost-info p { margin: 5px 0 0; font-size: 12px; color: #888; }
        .buy-btn { background: #FFD700; color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* شريط التنقل السفلي */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: #555; text-decoration: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: #FFD700; }
        .nav-icon { font-size: 24px; margin-bottom: 5px; }

        /* تأثير +1 */
        .float-text { position: absolute; color: #00BFFF; font-size: 30px; font-weight: bold; pointer-events: none; animation: floatUp 0.8s forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }

        .energy-wrapper { width: 85%; margin: 20px auto; }
        .energy-bar { height: 12px; background: #222; border-radius: 10px; border: 1px solid #fff; overflow: hidden; }
        #energy-fill { width: 100%; height: 100%; background: #00BFFF; }
    </style>
</head>
<body onload="startLoading()">

    <div id="splash">
        <img src="splash.png">
        <div class="loader-container">
            <div id="load-text" style="margin-bottom:10px">0%</div>
            <div class="loader-bar"><div id="loader-fill"></div></div>
        </div>
    </div>

    <div id="main-ui">
        <div id="tap-section" class="content-section active-section">
            <div id="score">0</div>
            <div style="color:#888">BRONZE LEVEL</div>
            <div class="coin-btn" id="coinArea"><img src="coin.png"></div>
            <div class="energy-wrapper">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:14px;">
                    <span>⚡ ENERGY</span>
                    <span id="energy-val">1000/1000</span>
                </div>
                <div class="energy-bar"><div id="energy-fill"></div></div>
            </div>
        </div>

        <div id="boost-section" class="content-section">
            <h2 style="margin-top:30px">BOOSTERS</h2>
            <div class="boost-card">
                <div class="boost-info">
                    <h3>Multitap</h3>
                    <p>+1 per tap | Cost: 500</p>
                </div>
                <button class="buy-btn" onclick="buyBoost('multi')">Buy</button>
            </div>
            <div class="boost-card">
                <div class="boost-info">
                    <h3>Energy Limit</h3>
                    <p>+500 capacity | Cost: 1000</p>
                </div>
                <button class="buy-btn" onclick="buyBoost('limit')">Buy</button>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="showSection('tap')">
                <span class="nav-icon">🟡</span>
                <span>TAP</span>
            </div>
            <div class="nav-item" onclick="showSection('boost')">
                <span class="nav-icon">🚀</span>
                <span>BOOST</span>
            </div>
        </nav>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('jolt_pts')) || 0;
        let energy = parseInt(localStorage.getItem('jolt_en')) || 1000;
        let maxEnergy = 1000;
        let tapValue = 1;

        function startLoading() {
            let p = 0;
            const int = setInterval(() => {
                p += 2;
                document.getElementById('loader-fill').style.width = p + "%";
                document.getElementById('load-text').innerText = p + "%";
                if(p >= 100) {
                    clearInterval(int);
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('main-ui').style.display = 'flex';
                    updateUI();
                }
            }, 50);
        }

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id + '-section').classList.add('active-section');
            event.currentTarget.classList.add('active');
        }

        function updateUI() {
            document.getElementById('score').innerText = score.toLocaleString();
            document.getElementById('energy-val').innerText = `${energy}/${maxEnergy}`;
            document.getElementById('energy-fill').style.width = (energy/maxEnergy*100) + "%";
        }

        document.getElementById('coinArea').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(energy >= tapValue) {
                score += tapValue;
                energy -= tapValue;
                const t = e.changedTouches[0];
                const el = document.createElement('div');
                el.className = 'float-text'; el.innerText = '+' + tapValue;
                el.style.left = t.pageX + 'px'; el.style.top = t.pageY + 'px';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 800);
                updateUI();
                save();
            }
        });

        function buyBoost(type) {
            if(type === 'multi' && score >= 500) {
                score -= 500; tapValue++; alert('Multitap upgraded!');
            } else if(type === 'limit' && score >= 1000) {
                score -= 1000; maxEnergy += 500; energy = maxEnergy; alert('Energy increased!');
            } else {
                alert('Not enough coins!');
            }
            updateUI(); save();
        }

        function save() {
            localStorage.setItem('jolt_pts', score);
            localStorage.setItem('jolt_en', energy);
        }

        setInterval(() => { if(energy < maxEnergy) { energy += 2; updateUI(); } }, 1000);
    </script>
</body>
</html>

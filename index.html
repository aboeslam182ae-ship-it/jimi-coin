<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin Pro</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        /* إعدادات الشاشة الأساسية */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        }

        /* الخلفية الزرقاء المتدرجة الاحترافية */
        body { 
            background: radial-gradient(circle at center, #1e4a9e 0%, #0a1a3d 100%) no-repeat fixed; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            height: 100vh; 
        }

        /* الهيدر: إزالة الخطوط تماماً لزيادة المساحة */
        .header { 
            text-align: center; 
            padding: 45px 15px 10px 15px; 
            border: none !important; 
        }

        #main-balance { 
            font-size: 60px; 
            font-weight: 900; 
            text-shadow: 0 5px 15px rgba(0,0,0,0.6); 
        }

        .profit-info { 
            color: #FFD700; 
            font-size: 16px; 
            font-weight: bold; 
            margin-top: -5px; 
        }

        /* نظام الصفحات */
        .page { 
            display: none; 
            height: calc(100vh - 180px); 
            width: 100%; 
            flex-direction: column; 
            align-items: center; 
        }

        .page-active { 
            display: flex !important; 
        }

        /* تصميم العملة (الليرة) */
        #coin-click { 
            width: 280px; 
            height: 280px; 
            border-radius: 50%; 
            border: 8px solid #cd7f32; 
            background: rgba(0,0,0,0.2) url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png') center/cover; 
            box-shadow: 0 10px 50px rgba(0,0,0,0.5); 
            margin-top: 40px; 
            transition: transform 0.05s; 
            cursor: pointer;
        }

        #coin-click:active { 
            transform: scale(0.92); 
        }

        /* --- شريط الطاقة المحسن: جعله أرفع قليلاً --- */
        .energy-wrapper { 
            width: 85%; 
            margin-top: auto; 
            margin-bottom: 60px; 
        }

        .energy-bar-container { 
            width: 100%; 
            height: 24px; /* تم تقليل الارتفاع من 30px إلى 24px */
            background: rgba(0,0,0,0.6); 
            border-radius: 12px; /* تم تعديل الانحناء ليناسب الارتفاع الجديد */
            position: relative; 
            border: 1px solid rgba(255,255,255,0.15); 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
        }

        #energy-fill { 
            position: absolute; 
            right: 0; 
            height: 100%; 
            background: linear-gradient(90deg, #4da3ff, #2159ff); 
            width: 100%; 
            transition: width 0.3s ease; 
        }

        .battery-icon-box { 
            width: 32px; /* تم تقليل العرض قليلاً ليناسب شريط الطاقة الأرفع */
            height: 100%; 
            background: #4da3ff; 
            z-index: 5; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: absolute; 
            right: 0;
            box-shadow: -2px 0 8px rgba(0,0,0,0.3);
        }

        .bolt { 
            color: #FFFF00; 
            font-weight: bold; 
            font-size: 16px; /* تم تقليل حجم الخط قليلاً ليناسب الارتفاع */
            text-shadow: 0 0 5px #000; 
        }

        #energy-num { 
            position: absolute; 
            width: 100%; 
            text-align: center; 
            font-weight: bold; 
            font-size: 12px; /* تم تقليل حجم النص لضمان وضوحه في المساحة الأصغر */
            z-index: 10; 
            text-shadow: 1px 1px 2px #000; 
        }

        /* تأثير +1 المتطاير عند النقر */
        .plus-one { 
            position: absolute; 
            color: #FFD700; 
            font-size: 38px; 
            font-weight: 900; 
            pointer-events: none; 
            animation: floatUp 0.8s ease-out forwards; 
            z-index: 1000; 
            text-shadow: 0 2px 10px #000; 
        }

        @keyframes floatUp { 
            0% { opacity: 1; transform: translateY(0); } 
            100% { opacity: 0; transform: translateY(-140px); } 
        }

        /* القائمة السفلية (الفوتر) */
        .footer-nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            height: 90px; 
            background: rgba(10, 26, 61, 0.98); 
            display: flex; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            opacity: 0.4; 
            color: #fff; 
            transition: 0.3s;
        }

        .nav-active { 
            opacity: 1; 
            color: #FFD700; 
        }

        .nav-item span:first-child { font-size: 26px; margin-bottom: 4px; }
        .nav-item span:last-child { font-size: 13px; font-weight: bold; }
    </style>
</head>
<body onload="initApp()">

    <div class="header">
        <div id="main-balance">0</div>
        <div class="profit-info">💰 +<span id="pph-display">0</span>/ساعة</div>
    </div>

    <div id="tab-tap" class="page page-active">
        <div id="coin-click"></div>
        <div class="energy-wrapper">
            <div class="energy-bar-container">
                <div id="energy-num">1000 / 1000</div>
                <div class="battery-icon-box"><span class="bolt">⚡</span></div>
                <div id="energy-fill"></div>
            </div>
        </div>
    </div>

    <div id="tab-office" class="page">
        <div style="margin-top:100px; font-weight:bold;">صفحة المكتب قيد التجهيز...</div>
    </div>
    <div id="tab-mine" class="page">
        <div style="margin-top:100px; font-weight:bold;">صفحة التعدين قيد التجهيز...</div>
    </div>

    <nav class="footer-nav">
        <div class="nav-item" onclick="switchTab('mine', this)"><span>⛏️</span><span>تعدين</span></div>
        <div class="nav-item" onclick="switchTab('office', this)"><span>🛋️</span><span>مكتب</span></div>
        <div class="nav-item nav-active" onclick="switchTab('tap', this)"><span>💰</span><span>نقر</span></div>
    </nav>

<script>
    // --- إعدادات قاعدة البيانات (Firebase) لضمان حفظ التقدم ---
    // ملحوظة: تأكد من وضع إعدادات الـ API Key و App ID الخاصة بك هنا ليعمل حفظ البيانات
    const firebaseConfig = {
        apiKey: "AIzaSyDAf1rFiwTwZmEkWv6ykgr2msEmIaOELs",
        authDomain: "jolt-coin.firebaseapp.com",
        databaseURL: "https://jolt-coin-default-rtdb.firebaseio.com",
        projectId: "jolt-coin",
        appId: "1:523210485636:web:30a3f782afdbddfb4037d1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // تعريف المستخدم (يتم جلبه من تلجرام أو استخدام معرف افتراضي)
    const tg = window.Telegram.WebApp;
    const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "dev_user_muhammed";

    let score = 0;
    let pph = 0;
    let energy = 1000;
    const maxEnergy = 1000;

    function initApp() {
        // 1. جلب البيانات من Firebase لمنع تصفير الرصيد عند التحديث
        db.ref('users/' + userId).once('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                score = data.score || 0;
                pph = data.pph || 0;
                
                // حساب الطاقة التي "شحنت" أثناء غياب المستخدم بناءً على الوقت المنقضي
                const lastUpdate = data.lastUpdate || Date.now();
                const secondsPassed = Math.floor((Date.now() - lastUpdate) / 1000);
                energy = Math.min(maxEnergy, (data.energy || 1000) + (secondsPassed * 1.5));
            }
            updateUI();
        });

        // 2. حلقة التحديث المستمرة لزيادة الرصيد تلقائياً وشحن الطاقة كل ثانية
        setInterval(() => {
            if(pph > 0) score += (pph / 3600); // زيادة الرصيد بناءً على الربح في الساعة
            if(energy < maxEnergy) energy = Math.min(maxEnergy, energy + 1.5); // شحن الطاقة ببطء
            updateUI();
        }, 1000);

        // 3. حفظ التقدم تلقائياً في Firebase كل 7 ثوانٍ لضمان عدم ضياع النقاط
        setInterval(autoSave, 7000);
        
        tg.expand(); // توسيع شاشة التطبيق في تلجرام تلقائياً
    }

    function autoSave() {
        db.ref('users/' + userId).update({
            score: score,
            pph: pph,
            energy: energy,
            lastUpdate: Date.now()
        });
    }

    // تحديث واجهة المستخدم بالقيم الجديدة
    function updateUI() {
        document.getElementById('main-balance').innerText = Math.floor(score).toLocaleString();
        document.getElementById('pph-display').innerText = Math.floor(pph).toLocaleString();
        document.getElementById('energy-num').innerText = `${Math.floor(energy)} / ${maxEnergy}`;
        document.getElementById('energy-fill').style.width = (energy / maxEnergy * 100) + "%";
    }

    // منطق النقر على العملة (مع دعم تعدد الأصابع)
    document.getElementById('coin-click').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touches = e.changedTouches;
        for(let i=0; i<touches.length; i++) {
            if(energy >= 1) { // التأكد من وجود طاقة كافية
                score++;
                energy--;
                createTapAnimation(touches[i].pageX, touches[i].pageY);
            }
        }
        updateUI();
        // تفعيل الهزاز عند النقر في تلجرام
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    });

    // إنشاء تأثير الـ "+1" المتطاير في مكان النقر
    function createTapAnimation(x, y) {
        const el = document.createElement('div');
        el.className = 'plus-one';
        el.innerText = '+1';
        el.style.left = x + 'px';
        el.style.top = (y - 50) + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    // التبديل بين الصفحات السفلية
    function switchTab(id, element) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
        document.getElementById('tab-' + id).classList.add('page-active');
        element.classList.add('nav-active');
    }
</script>
</body>
</html>

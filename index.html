<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jaguar Elite - Jimi Coin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at center, #1b3d5e 0%, #050b18 100%); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .header { text-align: center; padding: 40px 0 15px; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255, 215, 0, 0.2); }
        #balance { font-size: 48px; font-weight: 900; color: #ffd700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        .auto-income { font-size: 14px; color: #00f2fe; margin-top: 5px; font-weight: bold; }
        .page { display: none; flex-direction: column; height: 100%; flex-grow: 1; padding: 15px; overflow-y: auto; scroll-behavior: smooth; }
        .page.active { display: flex; }
        .game-zone { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .character-wrapper { position: relative; display: flex; flex-direction: center; align-items: center; cursor: pointer; }
        
        /* التعديل هنا: وضع صورة Jolt_pockets في الصفحة الرئيسية */
        .jolt-character { 
            width: 280px; 
            height: 380px; 
            background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/Jolt_pockets.png') center bottom/contain no-repeat; 
            transition: transform 0.1s; 
        }
        
        .jolt-character:active { transform: scale(0.95); }
        .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding-bottom: 100px; }
        .mining-card { background: linear-gradient(145deg, #1e293b, #0a0f1a); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 20px; padding: 12px; text-align: center; transition: all 0.3s; position: relative; }
        .card-image-container { width: 100%; aspect-ratio: 1; background: #000; border-radius: 12px; margin-bottom: 10px; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .card-image-container img { width: 100%; height: 100%; object-fit: contain; }
        .card-title { font-size: 14px; font-weight: bold; color: #fff; margin-bottom: 5px; display: block; }
        .card-profit { font-size: 12px; color: #00f2fe; display: block; }
        .card-cost { margin-top: 10px; font-weight: 900; color: #ffd700; font-size: 14px; }
        .menu-footer { position: fixed; bottom: 0; width: 100%; height: 75px; background: #030816; display: flex; border-top: 1px solid #1a3366; z-index: 1000; }
        .menu-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; color: #fff; cursor: pointer; }
        .menu-item.active { opacity: 1; color: #ffd700; border-top: 2px solid #ffd700; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #000; padding: 10px 20px; border-radius: 10px; font-weight: bold; z-index: 2000; display: none; }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="header">
        <div id="balance">0</div>
        <div class="auto-income" id="income-text">الربح التلقائي: +0/ساعة</div>
    </div>

    <div id="tap-page" class="page active">
        <div class="game-zone">
            <div class="character-wrapper" onclick="handleTap(event)">
                <div class="jolt-character"></div>
            </div>
        </div>
    </div>

    <div id="cards-page" class="page">
        <div class="cards-grid" id="jaguar-cards-grid"></div>
    </div>

    <nav class="menu-footer">
        <div class="menu-item active" onclick="showPage('tap-page', this)"><i>🏠</i><span>الرئيسية</span></div>
        <div class="menu-item" onclick="showPage('cards-page', this)"><i>🐆</i><span>الجاكوار</span></div>
        <div class="menu-item"><i>👥</i><span>الأصدقاء</span></div>
        <div class="menu-item"><i>💰</i><span>سحب</span></div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDAf1rFiwTwZmEkWv6yzkgr2msEmIaOELs",
            databaseURL: "https://jolt-coin-default-rtdb.firebaseio.com",
            projectId: "jolt-coin"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let balance = 0;
        let income = 0;
        let userId = "7145751375"; 

        const jaguarCards = [
            {id: 0, name: "الجاكوار القائد", profit: 500, cost: 10000, img: "jaguar_leader.png"},
            {id: 9, name: "الجاكوار الفاخر", profit: 50000, cost: 2000000, img: "jaguar_luxury.png"}
        ];

        function startApp() {
            renderCards();
            loadUserData();
            setInterval(autoMine, 1000);
        }

        function renderCards() {
            const grid = document.getElementById('jaguar-cards-grid');
            grid.innerHTML = "";
            jaguarCards.forEach(card => {
                const imgPath = `https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/assets/${card.img}`;
                grid.innerHTML += `
                    <div class="mining-card" onclick="buyCard(${card.id}, ${card.cost}, ${card.profit})">
                        <div class="card-image-container">
                            <img src="${imgPath}" onerror="this.src='https://via.placeholder.com/150/1e293b/ffd700?text=${card.name}'">
                        </div>
                        <span class="card-title">${card.name}</span>
                        <span class="card-profit">الربح: +${card.profit}/س</span>
                        <div class="card-cost">🪙 ${card.cost.toLocaleString()}</div>
                    </div>
                `;
            });
        }

        function handleTap(e) {
            balance += 1;
            updateUI();
            db.ref('users/' + userId).update({ balance: balance });
        }

        function buyCard(id, cost, prof) {
            if (balance >= cost) {
                balance -= cost;
                income += (prof / 3600);
                updateUI();
                const card = jaguarCards.find(c => c.id === id);
                showToast("مبروك! امتلكت " + card.name);
                db.ref('users/' + userId).update({ balance: balance, income: income });
            } else {
                showToast("تحتاج المزيد من الكوينز!");
            }
        }

        function autoMine() {
            if (income > 0) {
                balance += income;
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('income-text').innerText = "الربح التلقائي: +" + (income * 3600).toFixed(0) + "/ساعة";
        }

        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            element.classList.add('active');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function loadUserData() {
            db.ref('users/' + userId).on('value', (snap) => {
                if(snap.exists()) {
                    balance = snap.val().balance || 0;
                    income = snap.val().income || 0;
                    updateUI();
                }
            });
        }
        window.onload = startApp;
    </script>
</body>
</html>

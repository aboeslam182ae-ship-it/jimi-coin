<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jolt Coin - Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #f3ba2f; --dark-blue: #051937; --card-bg: #102a51; }
        body { background: var(--dark-blue); color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; text-align: center; }

        /* 1. قسم المعلومات العلوي (Profile & Stats) */
        .header-container { background: rgba(0,0,0,0.4); padding: 10px 15px; border-bottom: 2px solid var(--gold); display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        
        .profile-box { position: relative; width: 65px; }
        .avatar { width: 60px; height: 60px; border-radius: 12px; border: 2px solid var(--gold); background: #222; cursor: pointer; }
        .lvl-tag { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }

        .stats-box { flex-grow: 1; text-align: right; }
        .stats-top { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .progress-wrapper { width: 100%; height: 12px; background: #000; border: 1px solid #fff; border-radius: 10px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #f3ba2f, #ffea00); width: 45%; }
        .next-lvl { font-size: 11px; color: #00ff00; margin-top: 4px; display: block; }

        /* 2. النصوص الأساسية */
        .titles { margin: 20px 0; }
        .main-title { color: var(--gold); font-size: 28px; font-weight: bold; margin: 0; }
        .sub-title { font-size: 13px; color: #ccc; margin-top: 5px; }

        /* 3. الجاكوار الكبير (العملة) */
        .coin-area { margin: 20px auto; width: 220px; height: 220px; position: relative; }
        .jaguar-img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 15px rgba(243, 186, 47, 0.3)); cursor: pointer; }

        /* 4. شبكة البطاقات (Skins & Friends) */
        .grid-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px; margin-bottom: 20px; }
        .card { background: var(--card-bg); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); padding: 10px; cursor: pointer; }
        .card img { width: 100%; border-radius: 10px; height: 80px; object-fit: cover; background: #222; }
        .card span { display: block; margin-top: 8px; color: var(--gold); font-weight: bold; font-size: 14px; }

        /* 5. الفوتر (التواصل) */
        .social-footer { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .social-link { width: 45px; height: 45px; background: var(--card-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="stats-box">
            <div class="stats-top">
                <span style="color:var(--gold)">19.45B <i class="fas fa-coins"></i></span>
                <span>Syria [A&A]</span>
            </div>
            <div class="progress-wrapper">
                <div class="progress-fill"></div>
            </div>
            <span class="next-lvl">3.48B to next level</span>
        </div>
        
        <div class="profile-box">
            <img src="https://i.ibb.co/L6M7XmF/DALL-E-2025-10-27-21-44-33-A-realistic-cinematic-portrait-of-a-fierce-jaguar-made-of-solid-polished.webp" class="avatar">
            <div class="lvl-tag">LVL 32</div>
        </div>
    </div>

    <div class="titles">
        <h1 class="main-title">JOLT COIN</h1>
        <p class="sub-title">More info on our official channels</p>
    </div>

    <div class="coin-area">
        <img src="https://i.ibb.co/L6M7XmF/DALL-E-2025-10-27-21-44-33-A-realistic-cinematic-portrait-of-a-fierce-jaguar-made-of-solid-polished.webp" class="jaguar-img" onclick="tap()">
    </div>

    <div class="grid-cards">
        <div class="card">
            <img src="https://i.ibb.co/L6M7XmF/DALL-E-2025-10-27-21-44-33-A-realistic-cinematic-portrait-of-a-fierce-jaguar-made-of-solid-polished.webp">
            <span>👕 Skins</span>
        </div>
        <div class="card">
            <img src="https://i.ibb.co/F4Zp8mX/DALL-E-2024-04-22-Jaguars-shaking-hands.webp">
            <span>👥 Friends</span>
        </div>
    </div>

    <div class="social-footer">
        <div class="social-link"><i class="fab fa-x-twitter"></i></div>
        <div class="social-link"><i class="fab fa-youtube"></i></div>
        <div class="social-link"><i class="fab fa-telegram"></i></div>
    </div>

    <script>
        function tap() {
            // هنا نضع كود زيادة النقاط
            console.log("Tapped!");
        }
    </script>
</body>
</html>

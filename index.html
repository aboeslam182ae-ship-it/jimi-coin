<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>
        Jimi Coin Pro
    </title>
    <style>
        /* --- GLOBAL RESET --- */
        * {
            box-sizing: border-box;
        }
        * {
            margin: 0;
        }
        * {
            padding: 0;
        }
        * {
            user-select: none;
        }
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
        }
        body {
            color: #ffffff;
        }
        body {
            font-family: sans-serif;
        }
        body {
            overflow: hidden;
        }
        body {
            height: 100vh;
        }

        /* --- LOADER SECTION (BOTTOM ALIGNED) --- */
        #loader-screen {
            position: fixed;
        }
        #loader-screen {
            inset: 0;
        }
        #loader-screen {
            background-color: #000000;
        }
        #loader-screen {
            z-index: 10000;
        }
        #loader-screen {
            display: flex;
        }
        #loader-screen {
            flex-direction: column;
        }
        #loader-screen {
            align-items: center;
        }
        #loader-screen {
            justify-content: flex-end; /* This moves the bar to bottom */
        }
        #loader-screen {
            padding-bottom: 120px;
        }

        /* --- SPLASH IMAGE (Line-by-line Fix) --- */
        #splash-art {
            position: absolute;
        }
        #splash-art {
            inset: 0;
        }
        #splash-art {
            background-image: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/splash.png');
        }
        #splash-art {
            background-size: cover;
        }
        #splash-art {
            background-position: center;
        }
        #splash-art {
            z-index: -1;
        }

        #load-percent {
            font-size: 55px;
        }
        #load-percent {
            font-weight: 900;
        }
        #load-percent {
            color: #FFD700;
        }
        #load-percent {
            margin-bottom: 15px;
        }

        .bar-outer {
            width: 280px;
        }
        .bar-outer {
            height: 10px;
        }
        .bar-outer {
            background-color: #1a1a1a;
        }
        .bar-outer {
            border-radius: 20px;
        }
        .bar-outer {
            border: 1px solid #333;
        }
        .bar-outer {
            overflow: hidden;
        }

        #bar-inner {
            width: 0%;
        }
        #bar-inner {
            height: 100%;
        }
        #bar-inner {
            background-color: #FFD700;
        }

        /* --- PAGES SYSTEM --- */
        .page {
            display: none;
        }
        .page {
            height: 100vh;
        }
        .page {
            flex-direction: column;
        }
        .page {
            align-items: center;
        }
        .page {
            padding-top: 50px;
        }

        .page-active {
            display: flex !important;
        }

        /* --- MAIN TAP AREA (Line 105 Example) --- */
        #coin-main {
            width: 300px;
        }
        #coin-main {
            height: 300px;
        }
        #coin-main {
            border-radius: 50%;
        }
        #coin-main {
            border-width: 8px;
        }
        #coin-main {
            border-style: solid;
        }
        #coin-main {
            border-color: #cd7f32;
        }
        #coin-main {
            background-image: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png');
        }
        #coin-main {
            background-size: 85%;
        }
        #coin-main {
            background-position: center;
        }
        #coin-main {
            background-repeat: no-repeat;
        }
        #coin-main {
            box-shadow: 0 0 50px rgba(205, 127, 50, 0.5);
        }
        #coin-main {
            transition: transform 0.05s;
        }

        /* --- NAVIGATION --- */
        .nav-container {
            position: fixed;
        }
        .nav-container {
            bottom: 25px;
        }
        .nav-container {
            left: 20px;
        }
        .nav-container {
            right: 20px;
        }
        .nav-container {
            height: 85px;
        }
        .nav-container {
            background-color: #0f0f0f;
        }
        .nav-container {
            display: flex;
        }
        .nav-container {
            border-radius: 25px;
        }
        .nav-container {
            border: 1px solid #222;
        }

        .nav-item {
            flex: 1;
        }
        .nav-item {
            display: flex;
        }
        .nav-item {
            flex-direction: column;
        }
        .nav-item {
            align-items: center;
        }
        .nav-item {
            justify-content: center;
        }
        .nav-item {
            color: #555555;
        }

        .active-link {
            color: #FFD700;
        }
    </style>
</head>
<body onload="startApp()">

    <div id="loader-screen">
        <div id="splash-art"></div>
        <div id="load-percent">
            0%
        </div>
        <div class="bar-outer">
            <div id="bar-inner"></div>
        </div>
    </div>

    <div id="page-tap" class="page page-active">
        <div id="balance-display" style="font-size: 65px; font-weight: bold;">
            0
        </div>
        <div id="rank-name" style="font-size: 16px; margin-bottom: 40px; font-weight: bold;">
            BRONZE LEVEL
        </div>
        
        <div id="coin-main"></div>

        <div style="width: 85%; margin-top: 50px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span style="font-size: 14px; color: #aaa;">⚡ ENERGY</span>
                <span id="energy-status" style="font-size: 14px;">2000 / 2000</span>
            </div>
            <div style="width: 100%; height: 14px; background: #1a1a1a; border-radius: 10px; border: 1px solid #333; overflow: hidden;">
                <div id="energy-bar" style="width: 100%; height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5);"></div>
            </div>
        </div>
    </div>

    <div class="nav-container">
        <div class="nav-item active-link" onclick="openTab('tap', this)">
            <div style="font-size: 24px;">💰</div>
            <div style="font-size: 11px; font-weight: bold;">TAP</div>
        </div>
        <div class="nav-item" onclick="openTab('tasks', this)">
            <div style="font-size: 24px;">📜</div>
            <div style="font-size: 11px; font-weight: bold;">TASKS</div>
        </div>
        <div class="nav-item" onclick="openTab('boost', this)">
            <div style="font-size: 24px;">🚀</div>
            <div style="font-size: 11px; font-weight: bold;">BOOST</div>
        </div>
        <div class="nav-item" onclick="openTab('top', this)">
            <div style="font-size: 24px;">🏆</div>
            <div style="font-size: 11px; font-weight: bold;">TOP</div>
        </div>
    </div>

    <script>
        /* SCRIPT LOGIC - ALL ENGLISH */
        let score = parseInt(localStorage.getItem('j_bal')) || 0;
        let nrg = parseFloat(localStorage.getItem('j_nrg')) || 2000;

        function startApp() {
            let p = 0;
            let t = setInterval(function() {
                p = p + 2;
                document.getElementById('bar-inner').style.width = p + "%";
                document.getElementById('load-percent').innerText = p + "%";
                if(p >= 100) {
                    clearInterval(t);
                    document.getElementById('loader-screen').style.display = 'none';
                    refresh();
                }
            }, 30);

            setInterval(function() {
                if(nrg < 2000) {
                    nrg = Math.min(2000, nrg + 1);
                }
                localStorage.setItem('j_bal', score);
                localStorage.setItem('j_nrg', nrg);
                refresh();
            }, 1000);
        }

        function refresh() {
            document.getElementById('balance-display').innerText = Math.floor(score).toLocaleString();
            document.getElementById('energy-status').innerText = Math.floor(nrg) + " / 2000";
            document.getElementById('energy-bar').style.width = (nrg / 20) + "%";
        }

        function openTab(id, el) {
            document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('page-active'); });
            document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active-link'); });
            // For now, only Tap page is built for brevity but structure is ready
            if(id === 'tap') document.getElementById('page-tap').classList.add('page-active');
            el.classList.add('active-link');
        }

        document.getElementById('coin-main').addEventListener('touchstart', function(e) {
            e.preventDefault();
            if(nrg >= 1) {
                score = score + 1;
                nrg = nrg - 1;
                refresh();
            }
            e.target.style.transform = "scale(0.95)";
            setTimeout(function() { e.target.style.transform = "scale(1)"; }, 50);
        }, {passive: false});
    </script>
</body>
</html>

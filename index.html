<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin Tasks Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; }
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; text-align: center; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 25%; }
        #loader-bg { position: absolute; inset: 0; background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/splash.png') center/cover no-repeat; opacity: 0.8; z-index: -1; }
        #pct { color: gold; font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        .bar-o { width: 220px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 1px solid gold; overflow: hidden; }
        #bar-i { width: 0%; height: 100%; background: gold; }

        /* Layout */
        .page { display: none; height: 100vh; flex-direction: column; align-items: center; padding-top: 40px; padding-bottom: 120px; overflow-y: auto; }
        .active { display: flex !important; }
        .score { font-size: 70px; color: gold; font-weight: bold; margin: 0; }
        
        /* Tap Area */
        #tap-area { 
            width: 260px; height: 260px; margin-top: 30px; border-radius: 50%; border: 4px solid gold; box-shadow: 0 0 25px gold;
            background: #111 url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png') center/112% no-repeat;
            position: relative; z-index: 100; transition: transform 0.05s;
        }

        /* Tasks Style */
        .task-card { 
            width: 90%; background: #111; border: 1px solid #222; border-radius: 15px; 
            padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between;
        }
        .task-info { text-align: left; }
        .task-title { font-weight: bold; font-size: 16px; color: #fff; }
        .task-reward { color: gold; font-size: 14px; }
        .task-btn { background: gold; color: #000; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .task-done { background: #333; color: #777; }

        /* Navigation */
        .nav { position: fixed; bottom: 30px; left: 10px; right: 10px; height: 80px; background: #0a0a0a; display: flex; z-index: 1000; border-radius: 20px; border: 1px solid #222; }
        .nav-i { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 11px; font-weight: bold; }
        .nav-i.on { color: gold; }

        .en-ui { width: 85%; margin-top: 40px; }
        .en-bg { width: 100%; height: 14px; background: #1a1a1a; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        #en-f { width: 100%; height: 100%; background: #00d2ff; }

        .pop { position: absolute; color: #00d2ff; font-size: 40px; font-weight: bold; animation: up 0.6s forwards; pointer-events: none; z-index: 2000; }
        @keyframes up { to { transform: translateY(-130px); opacity: 0; } }
    </style>
</head>
<body onload="init()">

    <div id="loader">
        <div id="loader-bg"></div>
        <div id="pct">0%</div>
        <div class="bar-o"><div id="bar-i"></div></div>
    </div>

    <div id="p-tap" class="page active">
        <div id="sc" class="score">0</div>
        <div style="color:#00d2ff; font-weight:bold">BRONZE LEVEL</div>
        <div id="tap-area"></div>
        <div class="en-ui">
            <div style="display:flex; justify-content:space-between; font-size:13px; color:#aaa; margin-bottom:5px">
                <span>ENERGY</span><span id="ev">2000 / 2000</span>
            </div>
            <div class="en-bg"><div id="en-f"></div></div>
        </div>
    </div>

    <div id="p-tasks" class="page">
        <h2 style="color:gold">TASKS</h2>
        <p style="color:#aaa">Complete tasks to earn extra Jimi Coins</p>
        
        <div class="task-card">
            <div class="task-info">
                <div class="task-title">Join Channel</div>
                <div class="task-reward">+5,000 Coins</div>
            </div>
            <a href="https://t.me/YourChannel" target="_blank" class="task-btn" onclick="claimTask(this, 5000)">GO</a>
        </div>

        <div class="task-card">
            <div class="task-info">
                <div class="task-title">Follow on X (Twitter)</div>
                <div class="task-reward">+3,000 Coins</div>
            </div>
            <a href="https://x.com/YourProfile" target="_blank" class="task-btn" onclick="claimTask(this, 3000)">GO</a>
        </div>
    </div>

    <div id="p-lead" class="page">
        <h2 style="color:gold">LEADERS</h2>
        <div style="width:85%; background:#111; padding:20px; border-radius:15px; border:1px solid #333">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px"><span>1. Ahmed</span><span>1,250,000</span></div>
            <div style="display:flex; justify-content:space-between; color:gold"><span>You</span><span id="my-sc">0</span></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-i on" onclick="go('tap', this)">💰 TAP</div>
        <div class="nav-i" onclick="go('tasks', this)">📜 TASKS</div>
        <div class="nav-i" onclick="go('lead', this)">🏆 LEADERS</div>
    </div>

    <script>
        let s = parseInt(localStorage.getItem('js_s')) || 0;
        let e = parseFloat(localStorage.getItem('js_e')) || 2000;

        function init() {
            let p = 0;
            let itv = setInterval(() => {
                p += 5;
                document.getElementById('bar-i').style.width = p + "%";
                document.getElementById('pct').innerText = p + "%";
                if(p >= 100) { clearInterval(itv); document.getElementById('loader').remove(); upd(); }
            }, 30);
        }

        function go(id, el) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-i').forEach(ni => ni.classList.remove('on'));
            document.getElementById('p-' + id).classList.add('active');
            el.classList.add('on');
        }

        function upd() {
            document.getElementById('sc').innerText = s.toLocaleString('en-US');
            document.getElementById('my-sc').innerText = s.toLocaleString('en-US');
            document.getElementById('ev').innerText = Math.floor(e).toLocaleString('en-US') + " / 2000";
            document.getElementById('en-f').style.width = (e/20) + "%";
        }

        function claimTask(btn, reward) {
            if(btn.classList.contains('task-done')) return;
            s += reward;
            btn.innerText = "DONE";
            btn.classList.add('task-done');
            localStorage.setItem('js_s', s);
            upd();
        }

        const area = document.getElementById('tap-area');
        area.addEventListener('touchstart', (ev) => {
            ev.preventDefault();
            for (let i = 0; i < ev.changedTouches.length; i++) {
                if(e < 1) break;
                s++; e--;
                let touch = ev.changedTouches[i];
                let n = document.createElement('div');
                n.className = 'pop'; n.innerText = '+1';
                n.style.left = touch.pageX + 'px'; n.style.top = touch.pageY + 'px';
                document.body.appendChild(n);
                setTimeout(() => n.remove(), 600);
            }
            upd();
            localStorage.setItem('js_s', s);
            localStorage.setItem('js_e', e);
            if(navigator.vibrate) navigator.vibrate(10);
            area.style.transform = "scale(0.95)";
            setTimeout(() => area.style.transform = "scale(1)", 50);
        }, { passive: false });

        setInterval(() => { if(e < 2000) { e = Math.min(2000, e + 1.5); upd(); } }, 1000);
    </script>
</body>
</html>

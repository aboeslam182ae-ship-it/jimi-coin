<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>
        Jimi Coin Pro
    </title>
    <style>
        /* --- GLOBAL RESET --- */
        * {
            box-sizing: border-box;
        }
        * {
            margin: 0;
        }
        * {
            padding: 0;
        }
        * {
            user-select: none;
        }
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
        }
        body {
            color: #ffffff;
        }
        body {
            font-family: sans-serif;
        }
        body {
            overflow: hidden;
        }
        body {
            height: 100vh;
        }

        /* --- LOADER SECTION --- */
        #loader-screen {
            position: fixed;
        }
        #loader-screen {
            inset: 0;
        }
        #loader-screen {
            background-color: #000000;
        }
        #loader-screen {
            z-index: 10000;
        }
        #loader-screen {
            display: flex;
        }
        #loader-screen {
            flex-direction: column;
        }
        #loader-screen {
            align-items: center;
        }
        #loader-screen {
            justify-content: flex-end;
        }
        #loader-screen {
            padding-bottom: 100px;
        }

        #load-percent {
            font-size: 38px;
        }
        #load-percent {
            font-weight: 800;
        }
        #load-percent {
            color: #FFD700;
        }
        #load-percent {
            margin-bottom: 12px;
        }

        .bar-outer {
            width: 220px;
        }
        .bar-outer {
            height: 7px;
        }
        .bar-outer {
            background-color: rgba(255, 255, 255, 0.1);
        }
        .bar-outer {
            border-radius: 15px;
        }
        .bar-outer {
            overflow: hidden;
        }

        #bar-inner {
            width: 0%;
        }
        #bar-inner {
            height: 100%;
        }
        #bar-inner {
            background-color: #FFD700;
        }

        /* --- PAGES SYSTEM --- */
        .page {
            display: none;
        }
        .page {
            height: 100vh;
        }
        .page {
            flex-direction: column;
        }
        .page {
            align-items: center;
        }
        .page {
            padding-top: 50px;
        }

        .page-active {
            display: flex !important;
        }

        /* --- ENERGY BAR FIX --- */
        .energy-container {
            width: 85%;
        }
        .energy-container {
            margin-top: 40px;
        }

        .energy-header {
            display: flex;
        }
        .energy-header {
            justify-content: space-between;
        }
        .energy-header {
            margin-bottom: 8px;
        }

        #energy-text {
            font-size: 14px;
        }
        #energy-text {
            font-weight: bold;
        }

        .energy-bar-bg {
            width: 100%;
        }
        .energy-bar-bg {
            height: 12px;
        }
        .energy-bar-bg {
            background-color: #1a1a1a;
        }
        .energy-bar-bg {
            border-radius: 10px;
        }
        .energy-bar-bg {
            border: 1px solid #333;
        }
        .energy-bar-bg {
            overflow: hidden;
        }

        #energy-fill {
            width: 100%;
        }
        #energy-fill {
            height: 100%;
        }
        #energy-fill {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
        }
        #energy-fill {
            transition: width 0.2s;
        }

        /* --- NAVIGATION FIX --- */
        .nav-bar {
            position: fixed;
        }
        .nav-bar {
            bottom: 25px;
        }
        .nav-bar {
            left: 20px;
        }
        .nav-bar {
            right: 20px;
        }
        .nav-bar {
            height: 80px;
        }
        .nav-bar {
            background-color: #0f0f0f;
        }
        .nav-bar {
            display: flex;
        }
        .nav-bar {
            border-radius: 20px;
        }
        .nav-bar {
            border: 1px solid #222;
        }
        .nav-bar {
            z-index: 999;
        }

        .nav-btn {
            flex: 1;
        }
        .nav-btn {
            display: flex;
        }
        .nav-btn {
            flex-direction: column;
        }
        .nav-btn {
            align-items: center;
        }
        .nav-btn {
            justify-content: center;
        }
        .nav-btn {
            color: #555;
        }
        .nav-btn {
            cursor: pointer;
        }

        .nav-active {
            color: #FFD700;
        }

        /* --- COIN IMAGE --- */
        #coin-click {
            width: 260px;
        }
        #coin-click {
            height: 260px;
        }
        #coin-click {
            border-radius: 50%;
        }
        #coin-click {
            border: 6px solid #cd7f32;
        }
        #coin-click {
            background-image: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png');
        }
        #coin-click {
            background-size: contain;
        }
        #coin-click {
            background-position: center;
        }
        #coin-click {
            background-repeat: no-repeat;
        }
        #coin-click {
            transition: transform 0.05s;
        }
    </style>
</head>
<body onload="initApp()">

    <div id="loader-screen">
        <div id="load-percent">0%</div>
        <div class="bar-outer">
            <div id="bar-inner"></div>
        </div>
    </div>

    <div id="tab-tap" class="page page-active">
        <div id="main-balance" style="font-size: 60px; font-weight: 800; margin-top: 20px;">0</div>
        <div style="color: #FFD700; font-size: 14px; margin-bottom: 40px;">BRONZE LEVEL</div>
        
        <div id="coin-click"></div>

        <div class="energy-container">
            <div class="energy-header">
                <span style="color: #aaa;">ENERGY</span>
                <span id="energy-text">2000 / 2000</span>
            </div>
            <div class="energy-bar-bg">
                <div id="energy-fill"></div>
            </div>
        </div>
    </div>

    <div id="tab-tasks" class="page">
        <h1 style="margin-top:100px">TASKS LIST</h1>
    </div>
    <div id="tab-boost" class="page">
        <h1 style="margin-top:100px">BOOSTERS</h1>
    </div>
    <div id="tab-top" class="page">
        <h1 style="margin-top:100px">TOP PLAYERS</h1>
    </div>

    <div class="nav-bar">
        <div class="nav-btn nav-active" onclick="switchTab('tap', this)">
            <div style="font-size: 22px;">GOLD</div>
            <div style="font-size: 10px; font-weight: bold;">TAP</div>
        </div>
        <div class="nav-btn" onclick="switchTab('tasks', this)">
            <div style="font-size: 22px;">TASK</div>
            <div style="font-size: 10px; font-weight: bold;">TASKS</div>
        </div>
        <div class="nav-btn" onclick="switchTab('boost', this)">
            <div style="font-size: 22px;">UP</div>
            <div style="font-size: 10px; font-weight: bold;">BOOST</div>
        </div>
        <div class="nav-btn" onclick="switchTab('top', this)">
            <div style="font-size: 22px;">TOP</div>
            <div style="font-size: 10px; font-weight: bold;">TOP</div>
        </div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('j_score')) || 0;
        let energy = parseFloat(localStorage.getItem('j_energy')) || 2000;

        function initApp() {
            let p = 0;
            let interval = setInterval(() => {
                p++;
                document.getElementById('bar-inner').style.width = p + "%";
                document.getElementById('load-percent').innerText = p + "%";
                if(p >= 100) {
                    clearInterval(interval);
                    document.getElementById('loader-screen').style.display = 'none';
                    updateUI();
                }
            }, 40);

            setInterval(() => {
                if(energy < 2000) {
                    energy = Math.min(2000, energy + 1);
                    updateUI();
                }
            }, 1500);
        }

        function updateUI() {
            document.getElementById('main-balance').innerText = score.toLocaleString();
            document.getElementById('energy-text').innerText = Math.floor(energy) + " / 2000";
            document.getElementById('energy-fill').style.width = (energy / 20) + "%";
            localStorage.setItem('j_score', score);
            localStorage.setItem('j_energy', energy);
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            
            document.getElementById('tab-' + tabId).classList.add('page-active');
            element.classList.add('nav-active');
        }

        document.getElementById('coin-click').addEventListener('touchstart', function(e) {
            e.preventDefault();
            if(energy >= 1) {
                score++;
                energy--;
                updateUI();
                this.style.transform = "scale(0.96)";
                setTimeout(() => this.style.transform = "scale(1)", 50);
            }
        });
    </script>
</body>
</html>

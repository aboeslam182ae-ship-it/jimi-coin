<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at center, #1b3d5e 0%, #050b18 100%); color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .header { text-align: center; padding: 30px 0 10px; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255, 215, 0, 0.2); }
        #balance { font-size: 48px; font-weight: 900; color: #ffd700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        .auto-income { font-size: 14px; color: #00f2fe; margin-top: 5px; font-weight: bold; }

        .page { display: none; flex-direction: column; height: 100%; flex-grow: 1; padding: 15px; overflow-y: auto; }
        .page.active { display: flex; }

        .game-zone { flex-grow: 1; display: flex; justify-content: center; align-items: flex-start; padding-top: 20px; }
        .character-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        
        .jolt-character { 
            width: 250px; height: 350px; 
            background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/Jolt_pockets.png') center bottom/contain no-repeat; 
            transition: transform 0.1s; 
        }
        .jolt-character:active { transform: scale(0.95); }

        .energy-container { width: 280px; height: 12px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; margin-top: 15px; border: 1px solid rgba(0, 242, 254, 0.3); overflow: hidden; }
        .energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #00f2fe, #4facfe); transition: width 0.2s; }
        .energy-text { font-size: 18px; margin-top: 8px; color: #ffd700; font-weight: bold; }

        .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding-bottom: 100px; }
        .mining-card { background: linear-gradient(145deg, #1e293b, #0a0f1a); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 20px; padding: 12px; text-align: center; }
        .card-img-box { width: 100%; aspect-ratio: 1; background: #000; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .card-img-box img { width: 100%; height: 100%; object-fit: contain; }

        .menu-footer { position: fixed; bottom: 0; width: 100%; height: 70px; background: #030816; display: flex; border-top: 1px solid #1a3366; }
        .menu-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; color: #fff; }
        .menu-item.active { opacity: 1; color: #ffd700; border-top: 2px solid #ffd700; }

        @keyframes flyUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>

    <div class="header">
        <div id="balance">0</div>
        <div id="income-text" class="auto-income">الربح التلقائي: +0/ساعة</div>
    </div>

    <div id="tap-page" class="page active">
        <div class="game-zone">
            <div class="character-wrapper" onclick="handleTap(event)">
                <div class="jolt-character"></div>
                <div class="energy-container"><div id="energy-fill" class="energy-fill"></div></div>
                <div id="energy-status" class="energy-text">⚡ 1000 / 1000</div>
            </div>
        </div>
    </div>

    <div id="cards-page" class="page">
        <div class="cards-grid" id="jaguar-cards-grid"></div>
    </div>

    <nav class="menu-footer">
        <div class="menu-item active" onclick="showPage('tap-page', this)"><span>الرئيسية</span></div>
        <div class="menu-item" onclick="showPage('cards-page', this)"><span>الجاكوار</span></div>
    </nav>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDAf1rFiwTwZmEkWv6yzkgr2msEmIaOELs", databaseURL: "https://jolt-coin-default-rtdb.firebaseio.com", projectId: "jolt-coin" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let balance = 0, income = 0, energy = 1000, maxEnergy = 1000, userId = "7145751375";

        const jaguarCards = [
            {id: 0, name: "الجاكوار القائد", profit: 500, cost: 10000, img: "jaguar_leader.png"},
            {id: 9, name: "الجاكوار الفاخر", profit: 50000, cost: 2000000, img: "jaguar_luxury.png"}
        ];

        function startApp() {
            renderCards();
            loadUserData();
            setInterval(() => { balance += (income/3600); if(energy < maxEnergy) energy++; updateUI(); }, 1000);
        }

        function renderCards() {
            const grid = document.getElementById('jaguar-cards-grid');
            grid.innerHTML = jaguarCards.map(card => `
                <div class="mining-card" onclick="buyCard(${card.cost}, ${card.profit})">
                    <div class="card-img-box"><img src="https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/assets/${card.img}"></div>
                    <b>${card.name}</b><br><small>الربح: +${card.profit}/س</small>
                    <div style="color:#ffd700; margin-top:5px;">🪙 ${card.cost.toLocaleString()}</div>
                </div>
            `).join('');
        }

        function handleTap(e) {
            if (energy >= 1) {
                balance++; energy--; updateUI();
                createFlyingText(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);
                db.ref('users/' + userId).update({ balance: Math.floor(balance) });
            }
        }

        function createFlyingText(x, y) {
            const t = document.createElement('div');
            t.innerText = "+1"; t.style.cssText = `position:fixed; left:${x}px; top:${y}px; color:#ffd700; font-size:28px; font-weight:bold; pointer-events:none; animation:flyUp 0.8s forwards;`;
            document.body.appendChild(t); setTimeout(() => t.remove(), 800);
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('energy-fill').style.width = (energy/maxEnergy*100) + "%";
            document.getElementById('energy-status').innerText = `⚡ ${energy} / ${maxEnergy}`;
            document.getElementById('income-text').innerText = `الربح التلقائي: +${Math.floor(income)}/ساعة`;
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            el.classList.add('active');
        }

        function loadUserData() {
            db.ref('users/' + userId).on('value', s => { if(s.exists()){ balance = s.val().balance || 0; income = s.val().income || 0; updateUI(); }});
        }
        window.onload = startApp;
    </script>
</body>
</html>

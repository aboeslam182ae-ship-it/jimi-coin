<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jolt Coin - Power Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        /* الهيدر */
        .header { text-align: center; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; }
        #main-balance { font-size: 40px; font-weight: 900; }
        .profit-info { color: #FFD700; font-size: 13px; }

        /* الصفحات */
        .page { display: none; height: calc(100vh - 180px); width: 100%; overflow-y: auto; padding: 20px; flex-direction: column; align-items: center; }
        .page-active { display: flex !important; }

        /* صفحة النقر والعملة */
        #coin-click { width: 260px; height: 260px; border-radius: 50%; border: 8px solid #cd7f32; 
            background: #111 url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png') center/cover;
            box-shadow: 0 0 40px rgba(205, 127, 50, 0.4); margin-top: 40px; transition: transform 0.05s; }
        #coin-click:active { transform: scale(0.95); }

        /* شريط الطاقة والبطارية */
        .energy-container { width: 85%; margin-top: 40px; }
        .energy-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-weight: bold; font-size: 18px; }
        
        /* تصميم البطارية الصغير */
        .battery-icon { width: 30px; height: 16px; border: 2px solid #fff; border-radius: 3px; position: relative; display: flex; align-items: center; padding: 1px; }
        .battery-icon::after { content: ''; position: absolute; right: -5px; top: 4px; width: 3px; height: 6px; background: #fff; border-radius: 0 1px 1px 0; }
        .battery-bolt { color: #FFD700; font-size: 12px; position: absolute; left: 50%; transform: translateX(-50%); font-weight: bold; }
        
        .energy-bar-bg { width: 100%; height: 12px; background: #222; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #FFD700, #FFA500); transition: width 0.2s; }

        /* القائمة السفلية */
        .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: #050505; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 12px; }
        .nav-item-active { color: #FFD700; }
        .nav-item span:first-child { font-size: 24px; }

        /* الكروت */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .card { background: #111; border-radius: 15px; padding: 15px; border: 1px solid #222; text-align: center; }
        .btn-buy { background: #FFD700; color: #000; border: none; padding: 8px 12px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body onload="initApp()">

    <div class="header">
        <div id="main-balance">0</div>
        <div class="profit-info">💰 +<span id="pph-value">0</span>/ساعة</div>
    </div>

    <div id="tab-tap" class="page page-active">
        <div id="coin-click"></div>
        
        <div class="energy-container">
            <div class="energy-header">
                <div class="battery-icon">
                    <span class="battery-bolt">⚡</span>
                </div>
                <span id="energy-text">1000 / 1000</span>
            </div>
            <div class="energy-bar-bg">
                <div id="energy-fill"></div>
            </div>
        </div>
    </div>

    <div id="tab-mine" class="page">
        <h3 style="margin-bottom: 20px;">التطوير ⛏️</h3>
        <div class="grid">
            <div class="card">
                <div style="font-size:30px">📟</div>
                <div style="font-weight:bold; font-size:14px">كرت GPU</div>
                <div style="color:#FFD700; font-size:11px">+500/ساعة</div>
                <button class="btn-buy" onclick="buyItem('GPU', 5000, 500)">💰 5,000</button>
            </div>
        </div>
    </div>

    <nav class="footer-nav">
        <div class="nav-item" onclick="switchTab('mine', this)"><span>⛏️</span><span>تعدين</span></div>
        <div class="nav-item nav-item-active" onclick="switchTab('tap', this)"><span>💰</span><span>نقر</span></div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDAf1rFiwTwZmEkWv6ykgr2msEmIaOELs",
            authDomain: "jolt-coin.firebaseapp.com",
            databaseURL: "https://jolt-coin-default-rtdb.firebaseio.com",
            projectId: "jolt-coin",
            appId: "1:523210485636:web:30a3f782afdbddfb4037d1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "dev_user";

        let score = 0;
        let pph = 0;
        let energy = 1000;
        const maxEnergy = 1000;

        function initApp() {
            db.ref('users/' + userId).once('value', (s) => {
                const d = s.val();
                if(d) { 
                    score = d.score || 0; 
                    pph = d.pph || 0; 
                    updateUI(); 
                }
            });
            
            // الربح التلقائي + شحن الطاقة
            setInterval(() => {
                if(pph > 0) score += (pph / 3600);
                if(energy < maxEnergy) energy = Math.min(maxEnergy, energy + 1.5);
                updateUI();
            }, 1000);

            setInterval(() => db.ref('users/' + userId).update({ score: score, pph: pph }), 10000);
        }

        function updateUI() {
            document.getElementById('main-balance').innerText = Math.floor(score).toLocaleString();
            document.getElementById('pph-value').innerText = Math.floor(pph).toLocaleString();
            document.getElementById('energy-text').innerText = `${Math.floor(energy)} / ${maxEnergy}`;
            document.getElementById('energy-fill').style.width = (energy / maxEnergy * 100) + "%";
        }

        document.getElementById('coin-click').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(energy >= 1) {
                score++;
                energy--;
                updateUI();
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            } else {
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            }
        });

        function switchTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-item-active'));
            document.getElementById('tab-' + id).classList.add('page-active');
            el.classList.add('nav-item-active');
        }

        function buyItem(name, cost, profit) {
            if(score >= cost) {
                score -= cost; pph += profit; updateUI();
                tg.showAlert(`تم شراء ${name}`);
            } else {
                tg.showAlert("نقاطك غير كافية!");
            }
        }
    </script>
</body>
</html>

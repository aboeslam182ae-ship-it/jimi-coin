<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jolt Coin</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* شاشة التحميل */
        #splash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        #splash img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* واجهة اللعبة */
        #game {
            display: none;
            text-align: center;
        }

        #score {
            font-size: 60px;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .coin-btn {
            width: 280px;
            height: 280px;
            cursor: pointer;
            transition: transform 0.05s;
            user-select: none;
        }

        .coin-btn:active { transform: scale(0.95); }

        .coin-btn img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .tap-effect {
            position: absolute;
            color: #FFD700;
            font-size: 30px;
            font-weight: bold;
            pointer-events: none;
            animation: fly 0.6s forwards;
        }

        @keyframes fly {
            to { transform: translateY(-100px); opacity: 0; }
        }

        .footer { margin-top: 30px; color: #444; letter-spacing: 3px; }
    </style>
</head>
<body onload="startApp()">

    <div id="splash">
        <img src="https://i.postimg.cc/mD709fN0/jolt-splash.png" alt="Loading...">
    </div>

    <div id="game">
        <div id="score">0</div>
        <div class="coin-btn" onclick="tap(event)" ontouchstart="tap(event)">
            <img src="https://i.postimg.cc/KjL8M0yP/jolt-coin.png" alt="Jolt Coin">
        </div>
        <div class="footer">JOLT COIN</div>
    </div>

    <script>
        function startApp() {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('game').style.display = 'block';
                }, 500);
            }, 3000);
        }

        let pts = parseInt(localStorage.getItem('jolt_pts_v2')) || 0;
        const scoreEl = document.getElementById('score');
        scoreEl.innerText = pts.toLocaleString();

        function tap(e) {
            e.preventDefault();
            const touches = e.changedTouches ? e.changedTouches : [e];
            for (let i = 0; i < touches.length; i++) {
                pts++;
                showEffect(touches[i].clientX, touches[i].clientY);
            }
            scoreEl.innerText = pts.toLocaleString();
            localStorage.setItem('jolt_pts', pts);
        }

        function showEffect(x, y) {
            const txt = document.createElement('div');
            txt.innerText = '+1';
            txt.className = 'tap-effect';
            txt.style.left = x + 'px';
            txt.style.top = y + 'px';
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 600);
        }
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>

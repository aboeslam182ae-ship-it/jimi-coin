<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        
        /* خلفية بنمط الهامستر (تدرج دائري احترافي) */
        body { 
            background: radial-gradient(circle at center, #1e3a5f 0%, #07132e 100%); 
            color: #fff; 
            font-family: sans-serif; 
            overflow: hidden; 
            height: 100vh; 
        }

        .header { text-align: center; padding: 60px 0 10px; }
        #balance { font-size: 50px; font-weight: 900; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .play-zone { height: 50vh; display: flex; justify-content: center; align-items: center; position: relative; }

        /* منطقة النقر */
        .character-container {
            display: flex; flex-direction: column; align-items: center;
            transition: transform 0.1s ease; will-change: transform;
        }
        .character-container:active { transform: scale(0.95); }

        /* صورة الجولتي - تطابق اسم الملف في جيت هاب */
        .main-img {
            width: 260px; height: 320px;
            background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/Jolt_pockets.png') center/contain no-repeat;
            z-index: 5; margin-bottom: -40px;
        }

        /* القاعدة المسطحة المدمجة */
        .base-shadow {
            width: 230px; height: 40px;
            background: radial-gradient(circle, #00f2fe 0%, rgba(0,78,146,0.6) 100%);
            border-radius: 50%; border: 2px solid rgba(79,172,254,0.3);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5); z-index: 4;
            transform: perspective(500px) rotateX(40deg);
        }

        /* شريط الطاقة */
        .energy-box { position: fixed; bottom: 100px; width: 100%; text-align: center; }
        .energy-bar { width: 80%; height: 14px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 0 auto; overflow: hidden; border: 1px solid #4facfe; }
        #energy-fill { height: 100%; background: linear-gradient(90deg, #00f2fe, #4facfe); width: 100%; transition: width 0.2s; }
        #energy-val { margin-top: 8px; color: #00f2fe; font-size: 14px; font-weight: bold; }

        /* القائمة السفلية */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #050d1f; display: flex; border-top: 1px solid #1e4a9e; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; font-size: 11px; }
        .nav-item.active { opacity: 1; color: #FFD700; }

        .tap-plus { position: absolute; font-size: 40px; font-weight: 900; animation: fadeUp 0.8s forwards; pointer-events: none; color: #fff; text-shadow: 0 0 8px #00f2fe; }
        @keyframes fadeUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-130px); } }
    </style>
</head>
<body onload="start()">

    <div class="header"><div id="balance">0</div></div>

    <div class="play-zone">
        <div class="character-container" id="tap-btn">
            <div class="main-img"></div>
            <div class="base-shadow"></div>
        </div>
    </div>

    <div class="energy-box">
        <div class="energy-bar"><div id="energy-fill"></div></div>
        <div id="energy-val">1000 / 1000</div>
    </div>

    <nav class="nav">
        <div class="nav-item"><i>🏠</i>مكتب</div>
        <div class="nav-item active"><i>💰</i>نقر</div>
        <div class="nav-item"><i>⛏️</i>تعدين</div>
    </nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAf1rFiwTwZmEkWv6ykgr2msEmIaOELs",
        authDomain: "jolt-coin.firebaseapp.com",
        databaseURL: "https://jolt-coin-default-rtdb.firebaseio.com",
        projectId: "jolt-coin",
        appId: "1:523210485636:web:30a3f782afdbddfb4037d1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const uid = window.Telegram.WebApp.initDataUnsafe.user ? window.Telegram.WebApp.initDataUnsafe.user.id : "test_user";
    let coins = 0, nrg = 1000;

    function start() {
        db.ref('users/' + uid).once('value', (s) => {
            if(s.val()) { coins = s.val().score || 0; nrg = s.val().energy || 1000; }
            refresh();
        });
        setInterval(() => { if(nrg < 1000) { nrg += 1; refresh(); } }, 1000);
        setInterval(() => db.ref('users/' + uid).update({ score: coins, energy: Math.floor(nrg) }), 4000);
    }

    function refresh() {
        document.getElementById('balance').innerText = Math.floor(coins).toLocaleString();
        document.getElementById('energy-val').innerText = `${Math.floor(nrg)} / 1000`;
        document.getElementById('energy-fill').style.width = (nrg / 10) + "%";
    }

    document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(nrg >= 1) {
            coins++; nrg--; refresh();
            const touch = e.touches[0];
            const p = document.createElement('div');
            p.className = 'tap-plus'; p.innerText = '+1';
            p.style.left = touch.pageX + 'px'; p.style.top = touch.pageY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
            if(window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin - Final Fix</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #0a1a3d; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* الخلفية الزرقاء مع البرق ستكون ثابتة تماماً في الخلف */
        .game-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/jolt-bg.png') center/cover no-repeat;
            z-index: -1;
        }

        .header { text-align: center; padding: 60px 15px 20px; }
        #main-balance { font-size: 50px; font-weight: 900; text-shadow: 0 0 15px #000; }

        /* منطقة اللعب التي تحتوي على الشخصية والقاعدة */
        .play-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* الحاوية التي تجمع "الجولتي" و "القاعدة" */
        .character-base-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.05s linear; /* استجابة سريعة جداً للنقر */
        }

        /* حركة النزول عند الضغط */
        .character-base-wrapper:active {
            transform: translateY(10px) scale(0.96);
        }

        /* صورة الجولتي الشفافة */
        .jolt-sprite {
            width: 200px; /* حجم أصغر ليتناسب مع القاعدة */
            height: 200px;
            background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/jolt_pockets.png') center/contain no-repeat;
            z-index: 10;
            margin-bottom: -45px; /* ليدخل جسم الجولتي داخل القاعدة قليلاً */
        }

        /* القاعدة (المنصة الدائرية) */
        .platform {
            width: 220px;
            height: 60px;
            background: radial-gradient(ellipse at center, #00f2fe 0%, #1e4a9e 80%);
            border-radius: 50%;
            border: 4px solid #4facfe;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7), inset 0 0 15px #fff;
            z-index: 5;
        }

        /* شريط الطاقة المصلح */
        .footer-ui { position: fixed; bottom: 100px; width: 100%; display: flex; justify-content: center; }
        .energy-bar-bg { width: 80%; height: 24px; background: rgba(0,0,0,0.6); border-radius: 12px; border: 1px solid #4facfe; overflow: hidden; position: relative; }
        #energy-fill { position: absolute; right: 0; height: 100%; background: #00f2fe; transition: width 0.3s ease; }
        #energy-text { position: absolute; width: 100%; text-align: center; line-height: 24px; font-weight: bold; font-size: 14px; z-index: 2; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #07132e; display: flex; border-top: 1px solid #1e4a9e; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; font-size: 14px; }
        .nav-active { opacity: 1; color: #FFD700; }

        .plus-animation { position: absolute; color: #FFD700; font-size: 40px; font-weight: bold; animation: rise 0.8s ease-out forwards; pointer-events: none; z-index: 100; }
        @keyframes rise { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body onload="start()">

    <div class="game-background"></div>

    <div class="header">
        <div id="main-balance">0</div>
    </div>

    <div class="play-area" id="tap-zone">
        <div class="character-base-wrapper">
            <div class="jolt-sprite"></div>
            <div class="platform"></div>
        </div>
    </div>

    <div class="footer-ui">
        <div class="energy-bar-bg">
            <div id="energy-text">1000 / 1000</div>
            <div id="energy-fill" style="width: 100%;"></div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item"><span>⛏️</span><span>تعدين</span></div>
        <div class="nav-item nav-active"><span>💰</span><span>نقر</span></div>
    </nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAf1rFiwTwZmEkWv6ykgr2msEmIaOELs",
        authDomain: "jolt-coin.firebaseapp.com",
        databaseURL: "https://jolt-coin-default-rtdb.firebaseio.com",
        projectId: "jolt-coin",
        appId: "1:523210485636:web:30a3f782afdbddfb4037d1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userId = window.Telegram.WebApp.initDataUnsafe.user ? window.Telegram.WebApp.initDataUnsafe.user.id : "dev_user";

    let balance = 0; let energy = 1000;

    function start() {
        db.ref('users/' + userId).once('value', (s) => {
            if(s.val()) { balance = s.val().score || 0; energy = s.val().energy || 1000; }
            refresh();
        });
        setInterval(() => { if(energy < 1000) { energy++; refresh(); } }, 1500);
        setInterval(() => db.ref('users/' + userId).update({ score: balance, energy: Math.floor(energy) }), 4000);
    }

    function refresh() {
        document.getElementById('main-balance').innerText = Math.floor(balance).toLocaleString();
        document.getElementById('energy-text').innerText = `${Math.floor(energy)} / 1000`;
        document.getElementById('energy-fill').style.width = (energy/10) + "%";
    }

    document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(energy >= 1) {
            balance++; energy--;
            refresh();
            const touch = e.touches[0];
            const p = document.createElement('div');
            p.className = 'plus-animation'; p.innerText = '+1';
            p.style.left = touch.pageX + 'px'; p.style.top = touch.pageY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
            if(window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }
    });
</script>
</body>
</html>

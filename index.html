<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        /* شاشة التحميل */
        #loader-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        #load-percent { font-size: 50px; font-weight: 900; color: #FFD700; margin-bottom: 20px; text-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .bar-outer { width: 70%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; }
        #bar-inner { width: 0%; height: 100%; background: #FFD700; transition: width 0.1s linear; }

        /* واجهة اللعبة */
        .page { display: none; height: 100vh; width: 100%; flex-direction: column; align-items: center; padding-top: 50px; position: absolute; inset: 0; }
        .page-active { display: flex !important; }

        #main-balance { font-size: 55px; font-weight: 900; margin-top: 10px; }
        .profit-rate { color: #FFD700; font-size: 14px; margin-bottom: 30px; }
        
        #coin-click { width: 260px; height: 260px; border-radius: 50%; border: 8px solid #cd7f32; 
            background: #222 url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png') center/cover;
            box-shadow: 0 0 40px rgba(205, 127, 50, 0.3); transition: transform 0.05s; }

        /* شريط الطاقة */
        .energy-wrapper { width: 85%; margin-top: 50px; }
        .energy-bg { width: 100%; height: 14px; background: #1a1a1a; border-radius: 20px; border: 1px solid #333; overflow: hidden; margin-top: 10px; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #FFD700, #FFA500); }

        /* القائمة */
        .footer-nav { position: fixed; bottom: 25px; left: 15px; right: 15px; height: 80px; background: #0d0d0d; display: flex; border-radius: 25px; border: 1px solid #222; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; }
        .nav-item-active { color: #FFD700; }

        .plus-one { position: absolute; color: #FFD700; font-size: 32px; font-weight: 900; pointer-events: none; animation: floatAnim 0.7s forwards; }
        @keyframes floatAnim { to { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body onload="startLoading()">

    <div id="loader-screen">
        <div id="load-percent">0%</div>
        <div class="bar-outer"><div id="bar-inner"></div></div>
    </div>

    <div id="tab-tap" class="page page-active">
        <div id="main-balance">0</div>
        <div class="profit-rate">الربح بالساعة: <span id="pps-value">0</span></div>
        <div id="coin-click"></div>
        <div class="energy-wrapper">
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:14px">
                <span>⚡ الطاقة</span>
                <span id="energy-text">2000 / 2000</span>
            </div>
            <div class="energy-bg"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div class="footer-nav">
        <div class="nav-item nav-item-active">💰<div style="font-size:10px">النقر</div></div>
        <div class="nav-item">⛏️<div style="font-size:10px">تعدين</div></div>
        <div class="nav-item">📜<div style="font-size:10px">مهام</div></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = parseFloat(localStorage.getItem('j_score')) || 0;
        let energy = parseFloat(localStorage.getItem('j_energy')) || 2000;
        let pps = parseFloat(localStorage.getItem('j_pps')) || 0;

        function startLoading() {
            let p = 0;
            const bar = document.getElementById('bar-inner');
            const txt = document.getElementById('load-percent');
            
            // عداد تحميل سريع لضمان تخطي الشاشة السوداء
            const interval = setInterval(() => {
                p += Math.floor(Math.random() * 5) + 2;
                if (p > 100) p = 100;
                
                bar.style.width = p + "%";
                txt.innerText = p + "%";
                
                if (p >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('loader-screen').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('loader-screen').style.display = 'none';
                        }, 500);
                    }, 200);
                }
            }, 50);
            
            updateUI();
        }

        // تحديث الرصيد والارباح تلقائياً
        setInterval(() => {
            if (pps > 0) score += (pps / 3600);
            if (energy < 2000) energy = Math.min(2000, energy + 1.2);
            updateUI();
        }, 1000);

        function updateUI() {
            document.getElementById('main-balance').innerText = Math.floor(score).toLocaleString();
            document.getElementById('energy-text').innerText = Math.floor(energy) + " / 2000";
            document.getElementById('energy-fill').style.width = (energy / 20) + "%";
            document.getElementById('pps-value').innerText = pps.toLocaleString();
            
            localStorage.setItem('j_score', score);
            localStorage.setItem('j_energy', energy);
        }

        document.getElementById('coin-click').addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (energy >= 1) {
                score++;
                energy--;
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                
                const touch = e.touches[0];
                const p = document.createElement('div');
                p.className = 'plus-one';
                p.innerText = '+1';
                p.style.left = touch.clientX + 'px';
                p.style.top = touch.clientY + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 700);
                
                this.style.transform = "scale(0.95)";
                setTimeout(() => this.style.transform = "scale(1)", 50);
                updateUI();
            }
        });
    </script>
</body>
</html>

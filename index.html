<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jimi Coin</title>
    <style>
        body { background-color: #0f0f0f; color: #ffd700; text-align: center; font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .score-container { font-size: 50px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .coin-button { width: 250px; height: 250px; border-radius: 50%; background: linear-gradient(145deg, #ffcc00, #b8860b); border: 8px solid #8b6508; cursor: pointer; transition: transform 0.1s; box-shadow: 0 0 30px rgba(212, 175, 55, 0.5); -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center; font-size: 80px; font-weight: bold; }
        .coin-button:active { transform: scale(0.92); }
    </style>
</head>
<body>
    <div class="score-container" id="score">0</div>
    <div class="coin-button" onclick="tapCoin()">JC</div>

    <script>
        let count = parseInt(localStorage.getItem('jimiScore')) || 0;
        document.getElementById('score').innerText = count;

        function tapCoin() {
            count++;
            document.getElementById('score').innerText = count;
            localStorage.setItem('jimiScore', count);
            
            // اهتزاز بسيط للموبايل عند الضغط (إذا كان المتصفح يدعم ذلك)
            if (navigator.vibrate) { navigator.vibrate(10); }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin - Seamless Jolt</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background: #0c1a33; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }

        /* الخلفية الأصلية (البرق) المرفوعة على جيت هاب */
        .game-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* تأكد من أن ملف الخلفية jolt-bg.png مرفوع على جيت هاب */
            background: #0c1a33 url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/jolt-bg.png') center/cover no-repeat;
            z-index: -1;
        }

        .header { text-align: center; padding: 60px 15px 10px; position: relative; z-index: 10; }
        #main-balance { font-size: 55px; font-weight: 900; text-shadow: 2px 2px 10px #000; }

        .play-area {
            height: 50vh; display: flex; justify-content: center; align-items: center; position: relative;
        }

        /* وحدة الارتداد الميكانيكية */
        .hamster-unit {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
            /* إزالة أي إطارات أو خلفيات إضافية هنا ليكون الجولتي مدمجاً تماماً */
            background: transparent;
            padding: 0;
            border: none;
        }

        .hamster-unit:active {
            transform: scale(0.92) translateY(12px);
        }

        /* الجولتي - رابط مؤكد من صورتك الأخيرة Jolt_pockets-png */
        .jolt-model {
            width: 280px;
            height: 350px;
            background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/Jolt_pockets-png') center/contain no-repeat;
            z-index: 5;
            margin-bottom: -50px; /* لدمج الأقدام مع القاعدة */
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5));
        }

        /* المنصة الزرقاء المضمنة في الأرض المسطحة */
        .podium-flat {
            width: 240px;
            height: 60px;
            /* تأثير دمج القاعدة المسطحة */
            background: radial-gradient(circle, rgba(0,242,254,1) 0%, rgba(0,78,146,0.8) 100%);
            border-radius: 50%;
            border: 4px solid rgba(79,172,254,0.8);
            /* تأثير ظل للدمج مع الأرضية */
            box-shadow: 0 5px 15px rgba(0,0,0,0.6), inset 0 0 10px rgba(255,255,255,0.3);
            z-index: 4;
            /* موقع القاعدة المسطحة */
            margin-top: -10px;
        }

        /* شريط الطاقة المصلح */
        .energy-section { position: fixed; bottom: 110px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .energy-bar { width: 85%; height: 20px; background: rgba(0,0,0,0.5); border-radius: 10px; border: 1px solid #4facfe; overflow: hidden; position: relative; }
        #energy-fill { position: absolute; right: 0; height: 100%; background: #00f2fe; transition: width 0.2s; }
        #energy-val { margin-top: 8px; font-weight: bold; color: #00f2fe; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: #07132e; display: flex; border-top: 1px solid #1e4a9e; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; color: #fff; font-size: 12px; }
        .tab.active { opacity: 1; color: #FFD700; }

        .tap-effect { position: absolute; color: #fff; font-size: 40px; font-weight: 900; animation: popUp 0.7s forwards; pointer-events: none; z-index: 100; text-shadow: 0 0 10px #00f2fe; }
        @keyframes popUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-130px); } }
    </style>
</head>
<body onload="init()">

    <div class="game-bg"></div>

    <div class="header">
        <div id="main-balance">0</div>
    </div>

    <div class="play-area">
        <div class="hamster-unit" id="clicker">
            <div class="jolt-model"></div>
            <div class="podium-flat"></div>
        </div>
    </div>

    <div class="energy-section">
        <div class="energy-bar">
            <div id="energy-fill"></div>
        </div>
        <div id="energy-val">1000 / 1000</div>
    </div>

    <nav class="nav">
        <div class="tab"><i>⛏️</i>تعدين</div>
        <div class="tab active"><i>💰</i>نقر</div>
        <div class="tab"><i>🏢</i>مكتب</div>
    </nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDAf1rFiwTwZmEkWv6ykgr2msEmIaOELs",
        authDomain: "jolt-coin.firebaseapp.com",
        databaseURL: "https://jolt-coin-default-rtdb.firebaseio.com",
        projectId: "jolt-coin",
        appId: "1:523210485636:web:30a3f782afdbddfb4037d1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userId = window.Telegram.WebApp.initDataUnsafe.user ? window.Telegram.WebApp.initDataUnsafe.user.id : "dev_user";

    let balance = 0; let energy = 1000;

    function init() {
        db.ref('users/' + userId).once('value', (s) => {
            if(s.val()) { balance = s.val().score || 0; energy = s.val().energy || 1000; }
            updateUI();
        });
        setInterval(() => { if(energy < 1000) { energy += 1.5; updateUI(); } }, 1000);
        setInterval(() => db.ref('users/' + userId).update({ score: balance, energy: Math.floor(energy) }), 4000);
    }

    function updateUI() {
        document.getElementById('main-balance').innerText = Math.floor(balance).toLocaleString();
        document.getElementById('energy-val').innerText = `${Math.floor(energy)} / 1000`;
        document.getElementById('energy-fill').style.width = (energy/10) + "%";
    }

    document.getElementById('clicker').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(energy >= 1) {
            balance++; energy--;
            updateUI();
            const touch = e.touches[0];
            const p = document.createElement('div');
            p.className = 'tap-effect'; p.innerText = '+1';
            p.style.left = touch.pageX + 'px'; p.style.top = touch.pageY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
            if(window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Jimi Coin Pro</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<style>
* { 
box-sizing: border-box; 
margin: 0; 
padding: 0; 
user-select: none; 
-webkit-tap-highlight-color: transparent; 
touch-action: manipulation; 
}
body { 
background-color: #000; 
color: #fff; 
font-family: sans-serif; 
overflow: hidden; 
height: 100vh; 
position: relative; 
}
.header { 
text-align: center; 
padding: 15px; 
background: #000; 
border-bottom: 1px solid #222; 
}
#main-balance { 
font-size: 45px; 
font-weight: 900; 
}
.profit-info { 
color: #FFD700; 
font-size: 13px; 
}
.page { 
display: none; 
height: calc(100vh - 180px); 
width: 100%; 
flex-direction: column; 
align-items: center; 
overflow-y: auto; 
}
.page-active { 
display: flex !important; 
}
#coin-click { 
width: 260px; 
height: 260px; 
border-radius: 50%; 
border: 8px solid #cd7f32; 
background: #111 url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png') center/cover; 
box-shadow: 0 0 40px rgba(205, 127, 50, 0.4); 
margin-top: 40px; 
z-index: 10; 
flex-shrink: 0;
}
.energy-wrapper { 
width: 85%; 
margin-top: 50px; 
}
.energy-label { 
display: flex; 
justify-content: flex-start; 
font-weight: bold; 
font-size: 16px; 
margin-bottom: 8px; 
}
.energy-bar-container { 
width: 100%; 
height: 28px; 
background: #000; 
border-radius: 6px; 
position: relative; 
border: 1px solid #3d2b1f; 
overflow: hidden; 
display: flex; 
align-items: center; 
padding: 2px; 
}
#energy-fill { 
position: absolute; 
right: 32px; 
height: calc(100% - 4px); 
background: #5bc0de; 
width: 100%; 
z-index: 1; 
border-radius: 2px; 
transition: width 0.3s ease; 
}
.battery-box { 
width: 28px; 
height: 100%; 
background: linear-gradient(to bottom, #5bc0de, #2e6da4); 
border-radius: 3px; 
display: flex; 
align-items: center; 
justify-content: center; 
z-index: 5; 
}
.bolt-icon { 
color: #FFFF00; 
font-size: 14px; 
font-weight: bold; 
}
#energy-num { 
position: absolute; 
width: 100%; 
text-align: center; 
left: 0; 
font-weight: bold; 
font-size: 13px; 
color: #fff; 
z-index: 10; 
pointer-events: none; 
text-shadow: 1px 1px 2px #000; 
}
/* تنسيق صفحة المكتب وشبكة الكروت المحدثة */
.cards-grid { 
display: grid; 
grid-template-columns: 1fr 1fr; 
gap: 12px; 
padding: 15px; 
width: 100%; 
}
.card-item { 
background: #111; 
border: 1px solid #333; 
border-radius: 12px; 
overflow: hidden; 
display: flex; 
flex-direction: column; 
position: relative; 
height: 220px;
}
.card-img-container { 
width: 100%; 
height: 150px; 
background-size: cover; 
background-position: center; 
position: relative;
}
.card-overlay { 
position: absolute; 
top: 0; 
left: 0; 
width: 100%; 
padding: 8px; 
background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
}
.card-title { 
font-size: 13px; 
font-weight: bold; 
color: #fff; 
}
.card-stars { 
color: #FFD700; 
font-size: 9px; 
}
.card-footer { 
flex: 1; 
background: #111; 
display: flex; 
justify-content: space-between; 
align-items: center; 
padding: 0 10px; 
border-top: 1px solid #222;
}
.lvl-text { 
font-size: 11px; 
color: #aaa; 
}
.profit-text { 
font-size: 12px; 
color: #FFD700; 
font-weight: bold; 
}
.plus-one { 
position: absolute; 
color: #FFD700; 
font-size: 32px; 
font-weight: 900; 
animation: floatUp 0.8s ease-out forwards; 
z-index: 100; 
}
@keyframes floatUp { 
0% { opacity: 1; transform: translateY(0); } 
100% { opacity: 0; transform: translateY(-150px); } 
}
.footer-nav { 
position: fixed; 
bottom: 0; 
width: 100%; 
height: 90px; 
background: #080808; 
display: flex; 
border-top: 1px solid #222; 
z-index: 1000;
}
.nav-item { 
flex: 1; 
display: flex; 
flex-direction: column; 
align-items: center; 
justify-content: center; 
color: #fff; 
opacity: 0.6; 
}
.nav-item-active { 
opacity: 1; 
color: #FFD700; 
}
</style>
</head>
<body onload="initApp()">
<div class="header">
<div id="main-balance">0</div>
<div class="profit-info">💰 +<span id="pph-value">0</span>/ساعة</div>
</div>

<div id="tab-tap" class="page page-active">
<div id="coin-click"></div>
<div class="energy-wrapper">
<div class="energy-label">
<span>الطاقة</span>
</div>
<div class="energy-bar-container">
<div id="energy-num">1000 / 1000</div>
<div class="battery-box">
<span class="bolt-icon">⚡</span>
</div>
<div id="energy-fill"></div>
</div>
</div>
</div>

<div id="tab-office" class="page">
<div class="cards-grid">
    <div class="card-item">
        <div class="card-img-container" style="background-image: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/jolti_king.png');">
            <div class="card-overlay">
                <div class="card-title">ملك الطاقة</div>
                <div class="card-stars">⭐⭐⭐⭐⭐</div>
            </div>
        </div>
        <div class="card-footer">
            <span class="lvl-text">Lvl 1</span>
            <span class="profit-text">💰 +2K</span>
        </div>
    </div>
    <div class="card-item">
        <div class="card-img-container" style="background-color: #222;">
            <div class="card-overlay">
                <div class="card-title">جولتي المهندس</div>
                <div class="card-stars">⭐⭐⭐⭐</div>
            </div>
        </div>
        <div class="card-footer">
            <span class="lvl-text">Lvl 0</span>
            <span class="profit-text">💰 +500</span>
        </div>
    </div>
</div>
</div>

<div id="tab-mine" class="page">
<h2 style="margin-top:50px">سوق التعدين</h2>
</div>

<nav class="footer-nav">
<div class="nav-item" onclick="switchTab('mine', this)">
<span>⛏️</span>
<span>تعدين</span>
</div>
<div class="nav-item" onclick="switchTab('office', this)">
<span>🛋️</span>
<span>مكتب</span>
</div>
<div class="nav-item nav-item-active" onclick="switchTab('tap', this)">
<span>💰</span>
<span>نقر</span>
</div>
</nav>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDAf1rFiwTwZmEkWv6ykgr2msEmIaOELs",
authDomain: "jolt-coin.firebaseapp.com",
databaseURL: "https://jolt-coin-default-rtdb.firebaseio.com",
projectId: "jolt-coin",
appId: "1:523210485636:web:30a3f782afdbddfb4037d1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const tg = window.Telegram.WebApp;
const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "dev_user";
let score = 0;
let pph = 0;
let energy = 1000;
const maxEnergy = 1000;

function initApp() {
db.ref('users/' + userId).once('value', (s) => {
const d = s.val();
if(d) { score = d.score || 0; pph = d.pph || 0; updateUI(); }
});
setInterval(() => {
if(pph > 0) score += (pph / 3600);
if(energy < maxEnergy) energy = Math.min(maxEnergy, energy + 1.2);
updateUI();
}, 1000);
}

function updateUI() {
document.getElementById('main-balance').innerText = Math.floor(score).toLocaleString();
document.getElementById('pph-value').innerText = Math.floor(pph).toLocaleString();
document.getElementById('energy-num').innerText = `${Math.floor(energy)} / ${maxEnergy}`;
document.getElementById('energy-fill').style.width = ((energy / maxEnergy) * 85) + "%";
}

document.getElementById('coin-click').addEventListener('touchstart', (e) => {
e.preventDefault();
const touches = e.changedTouches;
for(let i = 0; i < touches.length; i++) {
if(energy >= 1) {
score++;
energy--;
const p = document.createElement('div');
p.className = 'plus-one';
p.innerText = '+1';
p.style.left = touches[i].pageX + 'px';
p.style.top = touches[i].pageY + 'px';
document.body.appendChild(p);
setTimeout(() => p.remove(), 800);
}
}
updateUI();
if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
});

function switchTab(id, el) {
document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-item-active'));
document.getElementById('tab-' + id).classList.add('page-active');
el.classList.add('nav-item-active');
}
</script>
</body>
</html>

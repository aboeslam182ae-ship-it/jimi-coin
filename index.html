<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* الأساسيات */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; height: 100vh; }

        /* الشاشة الافتتاحية */
        #loader-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 120px; }
        #load-percent { font-size: 42px; font-weight: 900; color: #FFD700; margin-bottom: 15px; }
        .bar-outer { width: 240px; height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 20px; overflow: hidden; }
        #bar-inner { width: 0%; height: 100%; background: #FFD700; transition: width 0.1s; }

        /* نظام الصفحات */
        .page { display: none; height: 100vh; width: 100%; flex-direction: column; align-items: center; padding-top: 40px; position: absolute; top: 0; left: 0; }
        .page-active { display: flex !important; }

        /* واجهة النقر */
        #main-balance { font-size: 50px; font-weight: 900; margin-top: 10px; color: #fff; }
        .profit-rate { font-size: 14px; color: #FFD700; margin-bottom: 20px; }
        #level-label { font-size: 14px; margin-bottom: 30px; font-weight: 800; letter-spacing: 1px; }

        #coin-container { position: relative; width: 280px; height: 280px; display: flex; justify-content: center; align-items: center; }
        #coin-click { width: 250px; height: 250px; border-radius: 50%; border: 8px solid #cd7f32; 
            background-image: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png');
            background-size: cover; background-position: center; z-index: 10; transition: transform 0.05s; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); }

        /* تأثير +1 */
        .plus-one { position: absolute; color: #FFD700; font-size: 30px; font-weight: 900; pointer-events: none; z-index: 100; animation: floatAnim 0.8s ease-out forwards; }
        @keyframes floatAnim { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px); } }

        /* شريط الطاقة */
        .energy-wrapper { width: 85%; margin-top: 40px; }
        .energy-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 700; font-size: 14px; }
        .energy-bg { width: 100%; height: 12px; background: #1a1a1a; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #FFD700, #FFA500); }

        /* البطاقات والمهام */
        .header-title { font-size: 28px; font-weight: 900; color: #FFD700; margin-bottom: 20px; }
        .scroll-area { width: 90%; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; padding-bottom: 120px; }
        .item-card { background: #111; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .btn-go { background: #FFD700; color: #000; padding: 8px 20px; border-radius: 10px; font-weight: 800; font-size: 14px; }

        /* القائمة السفلية */
        .footer-nav { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; background: #0d0d0d; display: flex; border-radius: 20px; border: 1px solid #222; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; transition: 0.3s; }
        .nav-item-active { color: #FFD700; }
        .nav-icon { font-size: 22px; }
        .nav-text { font-size: 10px; font-weight: 700; margin-top: 4px; }
    </style>
</head>
<body onload="init()">

    <div id="loader-screen">
        <div id="load-percent">0%</div>
        <div class="bar-outer"><div id="bar-inner"></div></div>
    </div>

    <div id="tab-tap" class="page page-active">
        <div id="main-balance">0</div>
        <div class="profit-rate">الربح في الساعة: <span id="pps-value">0</span></div>
        <div id="level-label">BRONZE LEVEL</div>
        
        <div id="coin-container">
            <div id="coin-click"></div>
        </div>

        <div class="energy-wrapper">
            <div class="energy-info">
                <span>⚡ الطاقة</span>
                <span id="energy-text">2000 / 2000</span>
            </div>
            <div class="energy-bg"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div id="tab-mine" class="page">
        <div class="header-title">تطوير الأرباح</div>
        <div class="scroll-area">
            <div class="item-card">
                <div>
                    <div style="font-weight:700">معدات تعدين</div>
                    <div style="color:#FFD700; font-size:13px">+100 ربح/ساعة</div>
                </div>
                <div class="btn-go" onclick="buyUpgrade(1000, 100)">شراء 1K</div>
            </div>
            <div class="item-card">
                <div>
                    <div style="font-weight:700">مزرعة خوادم</div>
                    <div style="color:#FFD700; font-size:13px">+500 ربح/ساعة</div>
                </div>
                <div class="btn-go" onclick="buyUpgrade(5000, 500)">شراء 5K</div>
            </div>
        </div>
    </div>

    <div id="tab-tasks" class="page">
        <div class="header-title">المهام اليومية</div>
        <div class="scroll-area">
            <div class="item-card" onclick="doTask(50000, 'https://t.me/yourchannel')">
                <div>
                    <div style="font-weight:700">انضم لقناتنا</div>
                    <div style="color:#FFD700">+50,000</div>
                </div>
                <div class="btn-go">انطلق</div>
            </div>
        </div>
    </div>

    <div class="footer-nav">
        <div class="nav-item nav-item-active" onclick="switchPage('tap', this)">
            <div class="nav-icon">💰</div><div class="nav-text">النقر</div>
        </div>
        <div class="nav-item" onclick="switchPage('mine', this)">
            <div class="nav-icon">⛏️</div><div class="nav-text">تعدين</div>
        </div>
        <div class="nav-item" onclick="switchPage('tasks', this)">
            <div class="nav-icon">📜</div><div class="nav-text">مهام</div>
        </div>
    </div>

                    energy = Math.min(2000, energy + 1.5);
                }
                updateUI();
            }, 1000);

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Jolt Coin Pro</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<style>
* { 
box-sizing: border-box; 
margin: 0; 
padding: 0; 
user-select: none; 
}
body { 
background-color: #000; 
color: #fff; 
font-family: sans-serif; 
height: 100vh; 
overflow: hidden; 
}
.header { 
text-align: center; 
padding: 20px; 
background: #000; 
border-bottom: 1px solid #222; 
}
#main-balance { 
font-size: 40px; 
font-weight: bold; 
}
/* تنسيق الصفحات */
.page { 
display: none; 
height: calc(100vh - 180px); 
width: 100%; 
overflow-y: auto; 
padding-bottom: 20px;
}
.page-active { 
display: block !important; 
}
/* تنسيق صفحة النقر */
#tab-tap { 
text-align: center; 
}
#coin-click { 
width: 250px; 
height: 250px; 
border-radius: 50%; 
margin: 40px auto; 
background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png') center/cover; 
border: 8px solid #cd7f32; 
}
/* تنسيق شريط الطاقة */
.energy-container { 
width: 85%; 
margin: 20px auto; 
height: 30px; 
background: #111; 
border-radius: 10px; 
position: relative; 
border: 1px solid #333; 
overflow: hidden; 
display: flex; 
align-items: center; 
}
#energy-fill { 
height: 100%; 
background: #5bc0de; 
width: 100%; 
transition: width 0.3s; 
position: absolute; 
right: 0; 
}
#energy-text { 
width: 100%; 
text-align: center; 
z-index: 10; 
font-weight: bold; 
font-size: 14px; 
text-shadow: 1px 1px 2px #000; 
}
/* تنسيق صفحة المكتب والكروت */
.cards-grid { 
display: grid; 
grid-template-columns: 1fr 1fr; 
gap: 15px; 
padding: 15px; 
}
.card { 
background: #111; 
border-radius: 15px; 
border: 1px solid #333; 
overflow: hidden; 
display: flex; 
flex-direction: column; 
}
.card-image { 
width: 100%; 
height: 140px; 
background-size: cover; 
background-position: center; 
}
.card-content { 
padding: 10px; 
text-align: center; 
}
.card-title { 
font-weight: bold; 
font-size: 14px; 
margin-bottom: 5px; 
}
.card-profit { 
color: #FFD700; 
font-size: 12px; 
}
/* التنقل السفلي */
.footer { 
position: fixed; 
bottom: 0; 
width: 100%; 
height: 80px; 
background: #080808; 
display: flex; 
border-top: 1px solid #222; 
}
.nav-btn { 
flex: 1; 
display: flex; 
flex-direction: column; 
align-items: center; 
justify-content: center; 
opacity: 0.5; 
}
.nav-active { 
opacity: 1; 
color: #FFD700; 
}
</style>
</head>
<body onload="initApp()">

<div class="header">
<div id="main-balance">0</div>
<div style="color:#FFD700">💰 +<span id="pph-val">0</span>/ساعة</div>
</div>

<div id="tab-tap" class="page page-active">
<div id="coin-click" onclick="handleTap(event)"></div>
<div class="energy-container">
<div id="energy-text">1000 / 1000</div>
<div id="energy-fill"></div>
</div>
</div>

<div id="tab-office" class="page">
<div class="cards-grid">
    <div class="card">
        <div class="card-image" style="background-image: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/jolti_king.png');"></div>
        <div class="card-content">
            <div class="card-title">ملك الطاقة</div>
            <div class="card-profit">💰 +2,500/ساعة</div>
            <div style="font-size:10px; opacity:0.5">Lvl 1</div>
        </div>
    </div>
    <div class="card">
        <div class="card-image" style="background-color:#222"></div>
        <div class="card-content">
            <div class="card-title">جولتي المهندس</div>
            <div class="card-profit">💰 +600/ساعة</div>
            <div style="font-size:10px; opacity:0.5">Lvl 0</div>
        </div>
    </div>
</div>
</div>

<div class="footer">
<div class="nav-btn" onclick="showPage('tap', this)">
<span>💰</span>
<span>نقر</span>
</div>
<div class="nav-btn" onclick="showPage('office', this)">
<span>🛋️</span>
<span>مكتب</span>
</div>
</div>

<script>
let score = 0;
let energy = 1000;
const maxEnergy = 1000;

function initApp() {
setInterval(() => {
if(energy < maxEnergy) energy = Math.min(maxEnergy, energy + 1);
updateUI();
}, 1000);
}

function updateUI() {
document.getElementById('main-balance').innerText = Math.floor(score).toLocaleString();
document.getElementById('energy-text').innerText = `${Math.floor(energy)} / ${maxEnergy}`;
document.getElementById('energy-fill').style.width = (energy / maxEnergy * 100) + "%";
}

function handleTap(e) {
if(energy >= 1) {
score++;
energy--;
updateUI();
}
}

function showPage(pageId, btn) {
// إخفاء كل الصفحات
document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
// إلغاء تفعيل كل الأزرار
document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
// إظهار الصفحة المطلوبة
document.getElementById('tab-' + pageId).classList.add('page-active');
// تفعيل الزر المختار
btn.classList.add('nav-active');
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin Global</title>
    <style>
        /* Base Configuration */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; }
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; text-align: center; }

        /* Loader Screen Styles */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 25%; }
        #pct { color: #FFD700; font-size: 42px; font-weight: bold; margin-bottom: 10px; }
        .bar-o { width: 250px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 20px; border: 1px solid #FFD700; overflow: hidden; }
        #bar-i { width: 0%; height: 100%; background: #FFD700; }

        /* Page Layouts */
        .page { display: none; height: 100vh; flex-direction: column; align-items: center; padding-top: 50px; padding-bottom: 120px; }
        .active { display: flex !important; }
        .score { font-size: 72px; font-weight: bold; margin-bottom: 5px; }
        #level-label { font-weight: bold; font-size: 14px; margin-bottom: 25px; letter-spacing: 1px; }

        /* Main Coin Area Fix */
        #tap-area { 
            width: 280px; height: 280px; border-radius: 50%; 
            border: 6px solid #cd7f32; box-shadow: 0 0 50px #cd7f32;
            background-image: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/coin.png');
            background-position: center; background-size: 80%; background-repeat: no-repeat;
            position: relative; transition: transform 0.05s; display: flex; align-items: center; justify-content: center;
        }

        /* Energy UI */
        .energy-box { width: 80%; margin-top: 40px; }
        .energy-bar-bg { width: 100%; height: 14px; background: #151515; border-radius: 30px; border: 1px solid #222; overflow: hidden; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); }

        /* Navigation Menu Fix */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 85px; background: #0f0f0f; display: flex; border-radius: 25px; border: 1px solid #222; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 10px; font-weight: bold; cursor: pointer; }
        .nav-btn.active-nav { color: #FFD700; }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        /* Tap Animation */
        .tap-pop { position: absolute; color: #FFD700; font-size: 40px; font-weight: bold; animation: floatUp 0.7s forwards; pointer-events: none; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-150px); opacity: 0; } }
    </style>
</head>
<body onload="initApp()">

    <div id="loader">
        <div id="pct">0%</div>
        <div class="bar-o"><div id="bar-i"></div></div>
    </div>

    <div id="page-tap" class="page active">
        <div id="score-display" class="score">0</div>
        <div id="level-label">BRONZE LEVEL</div>
        <div id="tap-area"></div>
        <div class="energy-box">
            <div style="display:flex; justify-content:space-between; font-size:12px; color:#888; margin-bottom:5px">
                <span>⚡ ENERGY</span><span id="energy-val">2000 / 2000</span>
            </div>
            <div class="energy-bar-bg"><div id="energy-fill"></div></div>
        </div>
    </div>

    <div id="page-tasks" class="page"><h1>TASKS</h1></div>
    <div id="page-boost" class="page"><h1>BOOST</h1></div>
    <div id="page-lead" class="page"><h1>TOP</h1></div>

    <div class="nav-bar">
        <div class="nav-btn active-nav" onclick="switchPage('tap', this)"><span class="nav-icon">💰</span>TAP</div>
        <div class="nav-btn" onclick="switchPage('tasks', this)"><span class="nav-icon">📜</span>TASKS</div>
        <div class="nav-btn" onclick="switchPage('boost', this)"><span class="nav-icon">🚀</span>BOOST</div>
        <div class="nav-btn" onclick="switchPage('lead', this)"><span class="nav-icon">🏆</span>TOP</div>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('bal')) || 0;
        let energy = parseFloat(localStorage.getItem('nrg')) || 2000;
        let power = 1;
        const maxEnergy = 2000;

        const levels = [
            { name: "BRONZE", min: 0, color: "#cd7f32" },
            { name: "SILVER", min: 5000, color: "#C0C0C0" },
            { name: "GOLD", min: 25000, color: "#FFD700" }
        ];

        function initApp() {
            let p = 0;
            let t = setInterval(() => {
                p += 2;
                document.getElementById('bar-i').style.width = p + "%";
                document.getElementById('pct').innerText = p + "%";
                if(p >= 100) { clearInterval(t); document.getElementById('loader').style.display = 'none'; updateUI(); }
            }, 30);
            setInterval(() => { save(); updateUI(); }, 1000);
        }

        function updateUI() {
            document.getElementById('score-display').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('energy-val').innerText = Math.floor(energy) + " / 2000";
            document.getElementById('energy-fill').style.width = (energy/20) + "%";
            
            let lvl = levels[0];
            levels.forEach(l => { if(balance >= l.min) lvl = l; });
            
            const label = document.getElementById('level-label');
            const coin = document.getElementById('tap-area');
            label.innerText = lvl.name + " LEVEL";
            label.style.color = lvl.color;
            coin.style.borderColor = lvl.color;
            coin.style.boxShadow = "0 0 50px " + lvl.color;
        }

        function switchPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('page-' + id).classList.add('active');
            btn.classList.add('active-nav');
        }

        function save() {
            localStorage.setItem('bal', balance);
            localStorage.setItem('nrg', energy);
        }

        document.getElementById('tap-area').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(energy >= power) {
                balance += power; energy -= power; updateUI();
                let t = e.changedTouches[0];
                let pop = document.createElement('div');
                pop.className = 'tap-pop'; pop.innerText = '+' + power;
                pop.style.left = t.pageX + 'px'; pop.style.top = t.pageY + 'px';
                document.body.appendChild(pop); setTimeout(() => pop.remove(), 600);
            }
            e.target.style.transform = "scale(0.95)";
            setTimeout(() => e.target.style.transform = "scale(1)", 50);
        }, {passive: false});

        setInterval(() => { if(energy < maxEnergy) energy = Math.min(maxEnergy, energy + 1); }, 1000);
    </script>
</body>
</html>

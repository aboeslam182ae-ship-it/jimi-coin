<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jimi Coin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        
        body { 
            background: radial-gradient(circle at center, #1b3d5e 0%, #081125 100%); 
            color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; 
            display: flex; flex-direction: column;
        }

        .header { text-align: center; padding: 50px 0 10px; }
        #balance { font-size: 55px; font-weight: 900; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        .game-zone { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }

        .char-box {
            position: relative; display: flex; flex-direction: column; align-items: center;
            transition: transform 0.1s ease; will-change: transform;
        }
        .char-box:active { transform: scale(0.95); }

        /* استخدام الرابط المباشر الصحيح للصورة المرفوعة */
        .char-image {
            width: 320px; height: 400px;
            background: url('https://raw.githubusercontent.com/aboeslam182ae-ship-it/jimi-coin/main/Jolt_pockets.png?v=3') center bottom/contain no-repeat;
            z-index: 5;
            margin-bottom: -55px;
        }

        .podium {
            width: 260px; height: 45px;
            background: radial-gradient(circle, #00f2fe 0%, #004e92 100%);
            border-radius: 50%; border: 2px solid #4facfe;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transform: perspective(500px) rotateX(35deg);
            z-index: 4;
        }

        .energy-wrap { width: 100%; padding-bottom: 110px; text-align: center; }
        .energy-bar { width: 85%; height: 18px; background: rgba(0,0,0,0.5); border-radius: 10px; margin: 0 auto; overflow: hidden; border: 1px solid #4facfe; }
        #energy-fill { height: 100%; background: #00f2fe; width: 100%; transition: width 0.3s; }
        #energy-text { margin-top: 8px; color: #00f2fe; font-weight: bold; }

        .footer { position: fixed; bottom: 0; width: 100%; height: 80px; background: #050d1f; display: flex; border-top: 1px solid #1e4a9e; }
        .btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.6; color: #fff; font-size: 12px; }
        .btn.active { opacity: 1; color: #FFD700; }

        .plus-one { position: absolute; font-size: 45px; font-weight: 900; animation: up 0.8s forwards; pointer-events: none; text-shadow: 0 0 10px #00f2fe; }
        @keyframes up { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-160px); } }
    </style>
</head>
<body onload="init()">

    <div class="header"><div id="balance">0</div></div>

    <div class="game-zone">
        <div class="char-box" id="tap-target">
            <div class="char-image"></div>
            <div class="podium"></div>
        </div>
    </div>

    <div class="energy-wrap">
        <div class="energy-bar"><div id="energy-fill"></div></div>
        <div id="energy-text">1000 / 1000</div>
    </div>

    <nav class="footer">
        <div class="btn"><i>🏠</i>مكتب</div>
        <div class="btn active"><i>💰</i>نقر</div>
        <div class="btn"><i>⛏️</i>تعدين</div>
    </nav>

<script>
    const fbConfig = {
        apiKey: "AIzaSyDAf1rFiwTwZmEkWv6ykgr2msEmIaOELs",
        authDomain: "jolt-coin.firebaseapp.com",
        databaseURL: "https://jolt-coin-default-rtdb.firebaseio.com",
        projectId: "jolt-coin",
        appId: "1:523210485636:web:30a3f782afdbddfb4037d1"
    };
    firebase.initializeApp(fbConfig);
    const db = firebase.database();
    const uid = window.Telegram.WebApp.initDataUnsafe.user ? window.Telegram.WebApp.initDataUnsafe.user.id : "user_test";
    let score = 0, nrg = 1000;

    function init() {
        db.ref('users/' + uid).once('value', (s) => {
            if(s.val()) { score = s.val().score || 0; nrg = s.val().energy || 1000; }
            upd();
        });
        setInterval(() => { if(nrg < 1000) { nrg += 1.5; upd(); } }, 1000);
        setInterval(() => db.ref('users/' + uid).update({ score, energy: Math.floor(nrg) }), 4000);
    }

    function upd() {
        document.getElementById('balance').innerText = Math.floor(score).toLocaleString();
        document.getElementById('energy-text').innerText = `${Math.floor(nrg)} / 1000`;
        document.getElementById('energy-fill').style.width = (nrg / 10) + "%";
    }

    document.getElementById('tap-target').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(nrg >= 1) {
            score++; nrg--; upd();
            const t = e.touches[0];
            const p = document.createElement('div');
            p.className = 'plus-one'; p.innerText = '+1';
            p.style.left = t.pageX + 'px'; p.style.top = t.pageY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
            if(window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jimi Coin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #051937; color: #fff; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        
        /* 1. النصوص العلوية والتواصل */
        .header { padding: 15px 0; }
        .title { color: #f3ba2f; font-size: 22px; font-weight: bold; margin: 0; }
        .sub-title { font-size: 12px; color: #ccc; margin: 5px 0; }
        .socials { display: flex; justify-content: center; gap: 15px; margin: 10px 0; }
        .socials i { font-size: 24px; color: #fff; background: #102a51; padding: 10px; border-radius: 50%; width: 45px; }

        /* 2. الهيدر (بروفايل يسار + شريط يمين) */
        .user-nav { display: flex; align-items: center; background: rgba(0,0,0,0.3); padding: 10px 15px; border-bottom: 2px solid #f3ba2f; }
        
        /* البروفايل يسار */
        .p-side { display: flex; flex-direction: column; align-items: center; margin-left: 15px; }
        .p-img { width: 55px; height: 55px; border-radius: 12px; border: 2px solid #f3ba2f; cursor: pointer; }
        .p-lvl { background: #f3ba2f; color: #000; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 5px; margin-top: -10px; }

        /* الشريط يمين */
        .s-side { flex-grow: 1; text-align: right; }
        .s-info { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; font-weight: bold; }
        .bar-bg { width: 100%; height: 12px; background: #000; border: 1px solid #fff; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #f3ba2f, #ffea00); width: 40%; }
        .rem-pts { font-size: 10px; color: #00ff00; margin-top: 3px; display: block; }

        /* 3. الجاكوار الكبير */
        .main-coin { width: 230px; margin: 30px auto; display: block; cursor: pointer; transition: 0.1s; }
        .main-coin:active { transform: scale(0.95); }

        /* 4. المربعات السفلية (Skins & Friends) */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px; }
        .card { background: #102a51; border-radius: 15px; padding: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .card img { width: 100%; border-radius: 10px; height: 80px; object-fit: cover; }
        .card span { display: block; color: #f3ba2f; font-weight: bold; margin-top: 8px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="title">GREAT NEW HIT</h1>
        <p class="sub-title">More info on our official channels</p>
        <div class="socials">
            <i class="fab fa-telegram"></i>
            <i class="fab fa-youtube"></i>
            <i class="fab fa-x-twitter"></i>
        </div>
    </div>

    <div class="user-nav">
        <div class="p-side" onclick="alert('سوف يفتح Friends')">
            <img src="https://i.ibb.co/L6M7XmF/DALL-E-2025-10-27-21-44-33-A-realistic-cinematic-portrait-of-a-fierce-jaguar-made-of-solid-polished.webp" class="p-img">
            <div class="p-lvl">LVL 32</div>
        </div>

        <div class="s-side">
            <div class="s-info">
                <span style="color:#f3ba2f">19.45B <i class="fas fa-coins"></i></span>
                <span>Syria [A&A]</span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill"></div>
            </div>
            <span class="rem-pts">3.48B to next level</span>
        </div>
    </div>

    <img src="https://i.ibb.co/L6M7XmF/DALL-E-2025-10-27-21-44-33-A-realistic-cinematic-portrait-of-a-fierce-jaguar-made-of-solid-polished.webp" class="main-coin">

    <div class="grid">
        <div class="card">
            <img src="https://i.ibb.co/L6M7XmF/DALL-E-2025-10-27-21-44-33-A-realistic-cinematic-portrait-of-a-fierce-jaguar-made-of-solid-polished.webp">
            <span>👕 Skins</span>
        </div>
        <div class="card">
            <img src="https://i.ibb.co/F4Zp8mX/DALL-E-2024-04-22-Jaguars-shaking-hands.webp">
            <span>👥 Friends</span>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jimi Coin - Sonic Edition</title>
    <style>
        /* إعدادات الخلفية ومنع التحديد */
        body { 
            background-color: #000; 
            color: #fff; 
            text-align: center; 
            font-family: 'Arial', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: none; 
        }

        /* تصميم العداد */
        .score-container { 
            font-size: 80px; 
            font-weight: bold; 
            color: #00bcff; 
            text-shadow: 0 0 20px #00bcff, 0 0 40px #0056b3; 
            margin-bottom: 30px; 
            pointer-events: none; 
        }

        /* حاوية الشخصية والحركة */
        .character-container {
            width: 300px;
            height: 300px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.05s ease; /* سرعة استجابة الحركة */
            -webkit-tap-highlight-color: transparent;
        }

        /* تأثير القفز عند اللمس */
        .character-container:active {
            transform: scale(0.9) translateY(-25px);
        }

        img {
            width: 100%;
            height: auto;
            pointer-events: none; /* لمنع سحب الصورة */
            filter: drop-shadow(0 0 15px #00bcff);
        }
    </style>
</head>
<body>

    <div class="score-container" id="score">0</div>
    
    <div class="character-container" id="gameArea">
        <img src="https://vignette.wikia.nocookie.net/sonic/images/2/2d/Sonic_the_Hedgehog_1_artwork.png" alt="Sonic">
    </div>

    <script>
        // استعادة النقاط من ذاكرة الهاتف
        let count = parseInt(localStorage.getItem('jimiScore')) || 0;
        const scoreElement = document.getElementById('score');
        const gameArea = document.getElementById('gameArea');
        scoreElement.innerText = count;

        // دالة التعامل مع النقر المتعدد
        function handleTap(e) {
            // منع المتصفح من القيام بحركاته الافتراضية (مثل الزووم)
            if (e.cancelable) e.preventDefault();

            // حساب عدد الأصابع التي لمست الشاشة حالياً
            let tapCount = e.changedTouches ? e.changedTouches.length : 1;
            
            // زيادة العداد بعدد الأصابع
            count += tapCount;
            scoreElement.innerText = count;

            // حفظ النقاط الجديدة
            localStorage.setItem('jimiScore', count);

            // اهتزاز بسيط للهاتف (لو يدعم)
            if (navigator.vibrate) {
                navigator.vibrate(15);
            }
        }

        // تشغيل اللمس المتعدد
        gameArea.addEventListener('touchstart', handleTap, { passive: false });
        
        // دعم النقر بالماوس (للتجربة من الكمبيوتر)
        gameArea.addEventListener('mousedown', (e) => {
            if (!('ontouchstart' in window)) handleTap(e);
        });
    </script>
</body>
</html>
